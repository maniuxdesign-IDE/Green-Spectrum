 { border-bottom: 0; border-top: 1px solid var(--gs-border); justify-content: flex-end; }\n    .modal-title { margin: 0; font-size: 18px; letter-spacing: -0.03em; }\n    .modal-body { padding: 20px; }\n\n    .toast-region {\n      position: fixed;\n      right: 20px;\n      bottom: 20px;\n      display: grid;\n      gap: 10px;\n      z-index: 120;\n    }\n\n    .toast {\n      width: min(380px, calc(100vw - 40px));\n      border: 1px solid var(--gs-border);\n      background: white;\n      border-radius: var(--gs-radius);\n      padding: 13px 14px;\n      box-shadow: var(--gs-shadow);\n      display: flex;\n      gap: 12px;\n      align-items: flex-start;\n      animation: slideIn 180ms ease-out;\n    }\n\n    .toast-dot {\n      width: 10px;\n      height: 10px;\n      border-radius: 999px;\n      background: var(--gs-green);\n      margin-top: 5px;\n      flex: 0 0 auto;\n    }\n\n    .toast strong { display: block; font-size: 14px; margin-bottom: 2px; }\n    .toast p { margin: 0; color: var(--gs-text-muted); font-size: 13px; line-height: 1.45; }\n\n    @keyframes slideIn {\n      from { opacity: 0; transform: translateY(8px); }\n      to { opacity: 1; transform: translateY(0); }\n    }\n\n    .mobile-overlay {\n      display: none;\n      position: fixed;\n      inset: 0;\n      background: rgba(14, 59, 46, 0.28);\n      z-index: 35;\n    }\n\n    .kbd {\n      font-size: 11px;\n      font-weight: 800;\n      color: var(--gs-text-muted);\n      border: 1px solid var(--gs-border);\n      border-bottom-width: 2px;\n      border-radius: 6px;\n      padding: 2px 5px;\n      background: white;\n    }\n\n    .token-grid {\n      display: grid;\n      grid-template-columns: repeat(4, minmax(0, 1fr));\n      gap: 12px;\n      margin-top: 14px;\n    }\n\n    .token {\n      border: 1px solid var(--gs-border);\n      border-radius: var(--gs-radius);\n      overflow: hidden;\n      background: white;\n    }\n\n    .swatch { height: 54px; border-bottom: 1px solid var(--gs-border); }\n    .token-code { padding: 10px; font-size: 12px; color: var(--gs-text-muted); }\n    .token-code strong { display: block; color: var(--gs-text); margin-bottom: 2px; }\n\n    .skeleton {\n      display: inline-block;\n      border-radius: 999px;\n      background: linear-gradient(90deg, #EEF3EF 25%, #F7FAF7 50%, #EEF3EF 75%);\n      background-size: 200% 100%;\n      animation: shimmer 1.25s infinite;\n    }\n\n    @keyframes shimmer {\n      from { background-position: 200% 0; }\n      to { background-position: -200% 0; }\n    }\n\n    .utility-list {\n      list-style: none;\n      padding: 0;\n      margin: 14px 0 0;\n      display: grid;\n      gap: 10px;\n    }\n\n    .utility-list li {\n      display: flex;\n      justify-content: space-between;\n      gap: 14px;\n      border-bottom: 1px solid var(--gs-border);\n      padding-bottom: 10px;\n      color: var(--gs-text-muted);\n      font-size: 13px;\n    }\n\n    .utility-list li:last-child { border-bottom: 0; padding-bottom: 0; }\n\n    @media (max-width: 1180px) {\n      .grid-4 { grid-template-columns: repeat(2, minmax(0, 1fr)); }\n      .grid-3 { grid-template-columns: repeat(2, minmax(0, 1fr)); }\n      .hero-panel { grid-template-columns: 1fr; }\n    }\n\n    @media (max-width: 860px) {\n      .app-shell { grid-template-columns: 1fr; }\n      .main-wrapper { grid-column: 1; }\n      .sidebar {\n        transform: translateX(-100%);\n        transition: transform 180ms ease;\n        box-shadow: var(--gs-shadow);\n      }\n      body.sidebar-open .sidebar { transform: translateX(0); }\n      body.sidebar-open .mobile-overlay { display: block; }\n      .mobile-menu-btn { display: inline-flex; }\n      .topbar { padding: 0 18px; }\n      .content { padding: 24px 18px 42px; }\n      .grid-2, .grid-3, .grid-4, .form-grid, .token-grid { grid-template-columns: 1fr; }\n      .topbar-actions .user-pill { display: none; }\n      .section-header { align-items: flex-start; flex-direction: column; }\n    }\n\n    @media (max-width: 480px) {\n      .hero-panel { padding: 20px; }\n      .hero-actions, .component-demo { flex-direction: column; align-items: stretch; }\n      .btn { width: 100%; }\n      .page-title { font-size: 17px; }\n      .topbar { height: 64px; }\n    }\n  </style>\n\n\n<style id=\"gs-cohesive-inner-style\">\n  html, body { background:#F7FAF7 !important; min-width:0 !important; }\n  body { margin:0 !important; overflow-x:hidden !important; }\n  /* Hide original per-page chrome so the outer all-in-one shell is the only shell. */\n  .sidebar, aside.sidebar, .topbar, header.topbar, .overlay, .mobile-menu, .side-foot, .brand,\n  .skip-link, a[href=\"#main-content\"], body > header, .site-header, .app > aside:first-child,\n  .app-shell > aside:first-child, .mobile-overlay, .sidebar-footer, .side-footer {\n    display:none !important;\n  }\n  .app, .app-shell, .page { display:block !important; min-height:auto !important; grid-template-columns:1fr !important; }\n  .main, main.main, .main-wrapper { grid-column:1 !important; margin:0 !important; width:100% !important; min-width:0 !important; }\n  .content { padding:28px 34px 96px !important; max-width:1540px !important; margin:0 auto !important; }\n  .hero, .hero-panel { margin-top:0 !important; }\n  .hero-panel { grid-template-columns:minmax(0,1.35fr) minmax(280px,.65fr) !important; align-items:stretch !important; }\n  .section { scroll-margin-top:24px !important; }\n  .side, .rail, .preview-wrap, .section-nav, .checklist { top:18px !important; }\n  .toast-region { bottom:14px !important; right:14px !important; }\n  .drawer { top:0 !important; }\n  .token-grid { grid-template-columns:repeat(auto-fit,minmax(150px,1fr)) !important; }\n  .grid-4 { grid-template-columns:repeat(auto-fit,minmax(210px,1fr)) !important; }\n  .grid-3 { grid-template-columns:repeat(auto-fit,minmax(240px,1fr)) !important; }\n  .grid-2 { grid-template-columns:repeat(auto-fit,minmax(280px,1fr)) !important; }\n  table { min-width:720px; }\n  @media(max-width:1180px){ .hero-panel{grid-template-columns:1fr !important;} }\n  @media(max-width:900px){ .content{padding:22px 18px 96px !important;} .main,.main-wrapper{grid-column:1 !important;} }\n  @media(max-width:560px){ .content{padding:18px 14px 96px !important;} .hero-panel{padding:18px !important;} }\n  @media print{ .content{padding:0 !important;} }\n</style>\n\n\n</head>\n<body>\n  <a class=\"skip-link\" href=\"#main-content\">Skip to main content</a>\n  <div class=\"mobile-overlay\" id=\"mobileOverlay\" aria-hidden=\"true\"></div>\n\n  <div class=\"app-shell\">\n    <aside class=\"sidebar\" id=\"sidebar\" aria-label=\"Green Spectrum navigation\">\n      <div class=\"brand\">\n        <div class=\"brand-mark\" aria-hidden=\"true\">GS</div>\n        <div class=\"brand-text\">\n          <strong>Green Spectrum</strong>\n          <span>Decision Engine MVP</span>\n        </div>\n      </div>\n\n      <div class=\"sidebar-scroll\">\n        <div class=\"nav-section-title\">Core workflow</div>\n        <a class=\"nav-item active\" href=\"#overview\"><span class=\"nav-icon\">◼</span>Design System</a>\n        <a class=\"nav-item\" href=\"#navigation\"><span class=\"nav-icon\">☰</span>Navigation Shell</a>\n        <a class=\"nav-item\" href=\"#buttons\"><span class=\"nav-icon\">↗</span>Buttons & Actions</a>\n        <a class=\"nav-item\" href=\"#forms\"><span class=\"nav-icon\">✎</span>Forms & Inputs</a>\n        <a class=\"nav-item\" href=\"#cards\"><span class=\"nav-icon\">▣</span>Cards & Metrics</a>\n        <a class=\"nav-item\" href=\"#tables\"><span class=\"nav-icon\">≡</span>Tables</a>\n        <a class=\"nav-item\" href=\"#states\"><span class=\"nav-icon\">●</span>States & Feedback</a>\n\n        <div class=\"nav-section-title\">MVP pages</div>\n        <a class=\"nav-item\" href=\"#\"><span class=\"nav-icon\">1</span>Organisation Profile</a>\n        <a class=\"nav-item\" href=\"#\"><span class=\"nav-icon\">2</span>Evidence Upload</a>\n        <a class=\"nav-item\" href=\"#\"><span class=\"nav-icon\">3</span>Three Empathies</a>\n        <a class=\"nav-item\" href=\"#\"><span class=\"nav-icon\">4</span>Maturity Assessment</a>\n        <a class=\"nav-item\" href=\"#\"><span class=\"nav-icon\">5</span>Priority Problems</a>\n        <a class=\"nav-item\" href=\"#\"><span class=\"nav-icon\">6</span>Decision Cascade</a>\n        <a class=\"nav-item\" href=\"#\"><span class=\"nav-icon\">7</span>Export Package</a>\n      </div>\n\n      <div class=\"sidebar-footer\">\n        <div class=\"workspace-card\">\n          <strong>Demo workspace</strong>\n          <p>Static prototype shell. No server, no external APIs, no browser storage.</p>\n        </div>\n      </div>\n    </aside>\n\n    <main class=\"main-wrapper\">\n      <header class=\"topbar\">\n        <div style=\"display:flex; align-items:center; gap:14px; min-width:0;\">\n          <button class=\"btn btn-ghost btn-sm mobile-menu-btn\" id=\"menuBtn\" aria-label=\"Open navigation\">☰</button>\n          <div>\n            <div class=\"breadcrumb\">Dashboard / Green Spectrum</div>\n            <h1 class=\"page-title\">Dashboard / Design System & Application Shell</h1>\n          </div>\n        </div>\n        <div class=\"topbar-actions\">\n          <button class=\"btn btn-ghost btn-sm\" id=\"openModalBtn\">Preview modal</button>\n          <button class=\"btn btn-primary btn-sm\" id=\"showToastBtn\">Show toast</button>\n          <div class=\"user-pill\" aria-label=\"Current user\">\n            <div class=\"avatar\">AM</div>\n            <div style=\"line-height:1.1;\">\n              <div style=\"font-weight:750; font-size:13px;\">Amara Mensah</div>\n              <div style=\"color:var(--gs-text-muted); font-size:12px;\">Chief Sustainability Officer</div>\n            </div>\n          </div>\n        </div>\n      </header>\n\n      <div class=\"content\" id=\"main-content\">\n        <section class=\"hero-panel\" id=\"overview\">\n          <div>\n            <span class=\"eyebrow\">● MVP Foundation</span>\n            <h2>Clean, executive-grade interface for sustainability decision support.</h2>\n            <p class=\"lead\">This shell establishes the reusable visual language for every Green Spectrum page: navigation, layout, cards, forms, tables, badges, progress indicators, modals, toasts, and responsive behaviour.</p>\n            <div class=\"hero-actions\">\n              <button class=\"btn btn-primary\" id=\"startBtn\">Start prototype flow</button>\n              <button class=\"btn btn-secondary\" id=\"openModalBtn2\">View output preview</button>\n              <button class=\"btn btn-ghost\" onclick=\"window.print()\">Print shell</button>\n            </div>\n          </div>\n          <aside class=\"insight-panel\" aria-label=\"Prototype principles\">\n            <div class=\"metric-row\"><span>Primary background</span><strong>White</strong></div>\n            <div class=\"metric-row\"><span>Primary accent</span><strong>Green</strong></div>\n            <div class=\"metric-row\"><span>Viewport target</span><strong>1440px</strong></div>\n            <div class=\"metric-row\"><span>Mobile support</span><strong>375px+</strong></div>\n            <div class=\"alert alert-info\" style=\"margin-top:8px;\">\n              <span aria-hidden=\"true\">ⓘ</span>\n              <div><strong>UX principle</strong>Every screen should clarify what the user is doing, why it matters, and what comes next.</div>\n            </div>\n          </aside>\n        </section>\n\n        <section class=\"section\" id=\"tokens\">\n          <div class=\"section-header\">\n            <div>\n              <h3>Design tokens</h3>\n              <p>Core colours and spacing rules to keep all Green Spectrum pages visually consistent.</p>\n            </div>\n            <span class=\"badge badge-success\">WCAG-aware palette</span>\n          </div>\n          <div class=\"card\">\n            <div class=\"token-grid\">\n              <div class=\"token\"><div class=\"swatch\" style=\"background:#FFFFFF\"></div><div class=\"token-code\"><strong>Background</strong>#FFFFFF</div></div>\n              <div class=\"token\"><div class=\"swatch\" style=\"background:#F7FAF7\"></div><div class=\"token-code\"><strong>Soft background</strong>#F7FAF7</div></div>\n              <div class=\"token\"><div class=\"swatch\" style=\"background:#1F7A4D\"></div><div class=\"token-code\"><strong>Primary green</strong>#1F7A4D</div></div>\n              <div class=\"token\"><div class=\"swatch\" style=\"background:#0E3B2E\"></div><div class=\"token-code\"><strong>Dark green</strong>#0E3B2E</div></div>\n              <div class=\"token\"><div class=\"swatch\" style=\"background:#DFF3E6\"></div><div class=\"token-code\"><strong>Light green</strong>#DFF3E6</div></div>\n              <div class=\"token\"><div class=\"swatch\" style=\"background:#5DBB7A\"></div><div class=\"token-code\"><strong>Mid green</strong>#5DBB7A</div></div>\n              <div class=\"token\"><div class=\"swatch\" style=\"background:#17231D\"></div><div class=\"token-code\"><strong>Primary text</strong>#17231D</div></div>\n              <div class=\"token\"><div class=\"swatch\" style=\"background:#DDE7DF\"></div><div class=\"token-code\"><strong>Border</strong>#DDE7DF</div></div>\n            </div>\n          </div>\n        </section>\n\n        <section class=\"section\" id=\"navigation\">\n          <div class=\"section-header\">\n            <div>\n              <h3>Navigation shell</h3>\n              <p>Fixed sidebar, sticky top header, responsive mobile drawer, and page-level action area.</p>\n            </div>\n            <span class=\"badge badge-neutral\">Reusable layout</span>\n          </div>\n          <div class=\"grid grid-3\">\n            <div class=\"card\">\n              <h4>Sidebar</h4>\n              <p>Use for primary journey stages and key MVP modules. Active state uses light green background.</p>\n            </div>\n            <div class=\"card\">\n              <h4>Top header</h4>\n              <p>Use for current page title, breadcrumb, global actions, and user/workspace context.</p>\n            </div>\n            <div class=\"card\">\n              <h4>Content canvas</h4>\n              <p>Use 40–48px desktop padding with white cards and subtle borders for executive readability.</p>\n            </div>\n          </div>\n        </section>\n\n        <section class=\"section\" id=\"buttons\">\n          <div class=\"section-header\">\n            <div>\n              <h3>Buttons, badges, and actions</h3>\n              <p>Action hierarchy for primary workflow progression, secondary support actions, and defensive states.</p>\n            </div>\n          </div>\n          <div class=\"grid grid-2\">\n            <div class=\"card\">\n              <h4>Buttons</h4>\n              <p>Use one primary button per screen wherever possible.</p>\n              <div class=\"component-demo\">\n                <button class=\"btn btn-primary\">Primary action</button>\n                <button class=\"btn btn-secondary\">Secondary action</button>\n                <button class=\"btn btn-ghost\">Ghost action</button>\n                <button class=\"btn btn-danger\">Danger action</button>\n              </div>\n            </div>\n            <div class=\"card\">\n              <h4>Status badges</h4>\n              <p>Use badges for maturity levels, confidence, domains, and workflow states.</p>\n              <div class=\"component-demo\">\n                <span class=\"badge badge-success\">High confidence</span>\n                <span class=\"badge badge-warning\">Needs evidence</span>\n                <span class=\"badge badge-error\">Risk flagged</span>\n                <span class=\"badge badge-info\">Business empathy</span>\n                <span class=\"badge badge-dark\">Dark Green</span>\n              </div>\n            </div>\n          </div>\n        </section>\n\n        <section class=\"section\" id=\"forms\">\n          <div class=\"section-header\">\n            <div>\n              <h3>Forms and inputs</h3>\n              <p>Executive-grade form patterns for organisation profile, evidence tagging, diagnostics, and assessment pages.</p>\n            </div>\n            <span class=\"badge badge-info\">Keyboard accessible</span>\n          </div>\n          <div class=\"grid grid-2\">\n            <div class=\"card\">\n              <h4>Profile form pattern</h4>\n              <div class=\"form-grid\" style=\"margin-top:14px;\">\n                <div class=\"field\">\n                  <label for=\"orgName\">Organisation name</label>\n                  <input class=\"input\" id=\"orgName\" placeholder=\"e.g. Northstar Manufacturing Group\" />\n                </div>\n                <div class=\"field\">\n                  <label for=\"industry\">Industry</label>\n                  <select class=\"select\" id=\"industry\">\n                    <option>Manufacturing</option>\n                    <option>Retail</option>\n                    <option>Financial services</option>\n                    <option>Technology</option>\n                  </select>\n                </div>\n                <div class=\"field\">\n                  <label for=\"framework\">Reporting framework</label>\n                  <select class=\"select\" id=\"framework\">\n                    <option>CSRD</option>\n                    <option>GRI</option>\n                    <option>ISSB</option>\n                    <option>CDP</option>\n                  </select>\n                </div>\n                <div class=\"field\">\n                  <label for=\"confidence\">Data confidence</label>\n                  <select class=\"select\" id=\"confidence\">\n                    <option>High</option>\n                    <option>Medium</option>\n                    <option>Low</option>\n                  </select>\n                </div>\n                <div class=\"field\" style=\"grid-column:1/-1;\">\n                  <label for=\"notes\">Evidence notes</label>\n                  <textarea class=\"textarea\" id=\"notes\" placeholder=\"Summarise the evidence or assumptions behind this entry.\"></textarea>\n                </div>\n              </div>\n            </div>\n            <div class=\"card\">\n              <h4>Controls</h4>\n              <div class=\"component-demo\" style=\"display:grid; align-items:start;\">\n                <label class=\"checkbox-row\"><input type=\"checkbox\" checked /> Mark as priority concern</label>\n                <label class=\"checkbox-row\"><input type=\"checkbox\" /> Include in export package</label>\n                <label class=\"radio-row\"><input type=\"radio\" name=\"maturity\" checked /> Light Green — Measure & Reduce</label>\n                <label class=\"radio-row\"><input type=\"radio\" name=\"maturity\" /> Mid Green — Embed & Integrate</label>\n              </div>\n              <div style=\"margin-top:18px;\" class=\"progress-wrap\">\n                <div class=\"progress-meta\"><span>Assessment completion</span><span id=\"progressLabel\">62%</span></div>\n                <div class=\"progress-track\"><div class=\"progress-fill\" id=\"progressFill\" style=\"width:62%\"></div></div>\n              </div>\n              <div class=\"component-demo\">\n                <button class=\"btn btn-secondary btn-sm\" id=\"increaseProgress\">Increase progress</button>\n                <button class=\"btn btn-ghost btn-sm\" id=\"resetProgress\">Reset</button>\n              </div>\n            </div>\n          </div>\n        </section>\n\n        <section class=\"section\" id=\"cards\">\n          <div class=\"section-header\">\n            <div>\n              <h3>Cards, metrics, and workflow steps</h3>\n              <p>Reusable cards for maturity dashboards, decision cascades, and opportunity portfolios.</p>\n            </div>\n          </div>\n          <div class=\"grid grid-4\">\n            <div class=\"card compact\">\n              <span class=\"badge badge-success\">Overall score</span>\n              <h4 style=\"font-size:30px; margin-top:12px; color:var(--gs-green-dark);\">2.1 / 3</h4>\n              <p>Mid Green trajectory with evidence gaps in supply chain traceability.</p>\n            </div>\n            <div class=\"card compact\">\n              <span class=\"badge badge-info\">Human</span>\n              <h4 style=\"font-size:30px; margin-top:12px; color:var(--gs-green-dark);\">1.8</h4>\n              <p>Strong leadership alignment, weaker incentive structures.</p>\n            </div>\n            <div class=\"card compact\">\n              <span class=\"badge badge-info\">Business</span>\n              <h4 style=\"font-size:30px; margin-top:12px; color:var(--gs-green-dark);\">2.4</h4>\n              <p>Governance and budget integration are developing well.</p>\n            </div>\n            <div class=\"card compact\">\n              <span class=\"badge badge-warning\">Planetary</span>\n              <h4 style=\"font-size:30px; margin-top:12px; color:var(--gs-green-dark);\">1.6</h4>\n              <p>Scope 3 visibility remains a priority problem area.</p>\n            </div>\n          </div>\n\n          <div class=\"grid grid-2\" style=\"margin-top:18px;\">\n            <div class=\"card\">\n              <h4>Step pattern</h4>\n              <div class=\"steps\" style=\"margin-top:14px;\">\n                <div class=\"step done\"><div class=\"step-number\">1</div><div><div class=\"step-title\">Organisation profile</div><div class=\"step-copy\">Baseline context captured.</div></div></div>\n                <div class=\"step done\"><div class=\"step-number\">2</div><div><div class=\"step-title\">Evidence upload</div><div class=\"step-copy\">Documents tagged manually.</div></div></div>\n                <div class=\"step\"><div class=\"step-number\">3</div><div><div class=\"step-title\">Three Empathies</di tion:fixed;right:20px;bottom:20px;display:grid;gap:10px;z-index:100}.toast{width:min(390px,calc(100vw - 40px));border:1px solid var(--border);background:#fff;border-radius:var(--radius);padding:13px 14px;box-shadow:var(--shadow);display:flex;gap:12px;animation:slideIn .18s ease-out}.toast-dot{width:10px;height:10px;border-radius:999px;background:var(--green);margin-top:5px;flex:0 0 auto}.toast strong{display:block;font-size:14px;margin-bottom:2px}.toast p{margin:0;color:var(--muted);font-size:13px;line-height:1.45}@keyframes slideIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}\n    @media(max-width:1040px){.hero-grid{grid-template-columns:1fr}.access-card{max-width:560px}.trust-strip{grid-template-columns:repeat(2,minmax(0,1fr))}.value-grid{grid-template-columns:1fr}.preview-grid{grid-template-columns:1fr}.top-actions .hide-sm{display:none}}\n    @media(max-width:640px){.topbar{padding:0 18px}.main{padding:28px 18px}.hero h1{font-size:42px}.hero-actions,.top-actions{align-items:stretch}.hero-actions .btn{width:100%}.trust-strip{grid-template-columns:1fr}.footer{padding:20px 18px}.modal-header,.modal-footer{padding:16px}.modal-body{padding:16px}.access-card{padding:20px}.brand span{display:none}}\n  </style>\n\n\n<style id=\"gs-cohesive-inner-style\">\n  html, body { background:#F7FAF7 !important; min-width:0 !important; }\n  body { margin:0 !important; overflow-x:hidden !important; }\n  /* Hide original per-page chrome so the outer all-in-one shell is the only shell. */\n  .sidebar, aside.sidebar, .topbar, header.topbar, .overlay, .mobile-menu, .side-foot, .brand,\n  .skip-link, a[href=\"#main-content\"], body > header, .site-header, .app > aside:first-child,\n  .app-shell > aside:first-child, .mobile-overlay, .sidebar-footer, .side-footer {\n    display:none !important;\n  }\n  .app, .app-shell, .page { display:block !important; min-height:auto !important; grid-template-columns:1fr !important; }\n  .main, main.main, .main-wrapper { grid-column:1 !important; margin:0 !important; width:100% !important; min-width:0 !important; }\n  .content { padding:28px 34px 96px !important; max-width:1540px !important; margin:0 auto !important; }\n  .hero, .hero-panel { margin-top:0 !important; }\n  .hero-panel { grid-template-columns:minmax(0,1.35fr) minmax(280px,.65fr) !important; align-items:stretch !important; }\n  .section { scroll-margin-top:24px !important; }\n  .side, .rail, .preview-wrap, .section-nav, .checklist { top:18px !important; }\n  .toast-region { bottom:14px !important; right:14px !important; }\n  .drawer { top:0 !important; }\n  .token-grid { grid-template-columns:repeat(auto-fit,minmax(150px,1fr)) !important; }\n  .grid-4 { grid-template-columns:repeat(auto-fit,minmax(210px,1fr)) !important; }\n  .grid-3 { grid-template-columns:repeat(auto-fit,minmax(240px,1fr)) !important; }\n  .grid-2 { grid-template-columns:repeat(auto-fit,minmax(280px,1fr)) !important; }\n  table { min-width:720px; }\n  @media(max-width:1180px){ .hero-panel{grid-template-columns:1fr !important;} }\n  @media(max-width:900px){ .content{padding:22px 18px 96px !important;} .main,.main-wrapper{grid-column:1 !important;} }\n  @media(max-width:560px){ .content{padding:18px 14px 96px !important;} .hero-panel{padding:18px !important;} }\n  @media print{ .content{padding:0 !important;} }\n</style>\n\n\n</head>\n<body>\n  <div class=\"page\">\n    <header class=\"topbar\" aria-label=\"Landing page header\">\n      <a class=\"brand\" href=\"#\" aria-label=\"Green Spectrum home\">\n        <div class=\"mark\" aria-hidden=\"true\">GS</div>\n        <div><strong>Green Spectrum</strong><span>Decision Engine MVP</span></div>\n      </a>\n      <nav class=\"top-actions\" aria-label=\"Top actions\">\n        <button class=\"btn btn-ghost hide-sm\" id=\"sampleTopBtn\">Sample output</button>\n        <button class=\"btn btn-secondary\" id=\"demoTopBtn\">Use demo</button>\n      </nav>\n    </header>\n\n    <main class=\"main\">\n      <div class=\"hero-grid\">\n        <section class=\"hero\" aria-labelledby=\"hero-title\">\n          <span class=\"eyebrow\"><span class=\"dot\"></span> Built for Chief Sustainability Officers</span>\n          <h1 id=\"hero-title\">Green Spectrum</h1>\n          <p class=\"one-liner\">A guided sustainability decision engine for evidence-based transformation strategy.</p>\n          <p class=\"desc\">Move from fragmented ESG data, stakeholder pressure, and framework overload to a prioritised transformation pathway: maturity profile, priority problems, decision cascade, prototype plan, experiment card, business case, and board-ready PDF export.</p>\n          <div class=\"hero-actions\">\n            <button class=\"btn btn-primary\" id=\"startAssessmentBtn\">Start new assessment</button>\n            <button class=\"btn btn-secondary\" id=\"sampleOutputBtn\">View sample output</button>\n          </div>\n          <div class=\"status-panel\" id=\"startStatus\" role=\"status\" aria-live=\"polite\"></div>\n        </section>\n\n        <aside class=\"access-card\" aria-labelledby=\"access-title\">\n          <h2 id=\"access-title\">Access workspace</h2>\n          <p>Continue into your organisation’s Green Spectrum assessment workspace.</p>\n          <form class=\"form\" id=\"loginForm\" novalidate>\n            <div class=\"field\">\n              <label for=\"email\">Email address</label>\n              <input class=\"input\" id=\"email\" name=\"email\" type=\"email\" placeholder=\"amara@organisation.com\" autocomplete=\"email\" />\n              <div class=\"error-text\" id=\"emailError\">Enter an email address to continue.</div>\n            </div>\n            <div class=\"field\">\n              <label for=\"password\">Password</label>\n              <input class=\"input\" id=\"password\" name=\"password\" type=\"password\" placeholder=\"Enter password\" autocomplete=\"current-password\" />\n              <div class=\"error-text\" id=\"passwordError\">Enter your password to continue.</div>\n            </div>\n            <button class=\"btn btn-primary btn-wide\" type=\"submit\" id=\"continueBtn\">Continue</button>\n            <div class=\"divider\">or</div>\n            <button class=\"btn btn-secondary btn-wide\" type=\"button\" id=\"demoWorkspaceBtn\">Use demo workspace</button>\n          </form>\n          <div class=\"privacy\"><span class=\"lock\" aria-hidden=\"true\">●</span><span>Sensitive organisational data is handled confidentially. This prototype uses in-memory demo data only.</span></div>\n          <div class=\"login-success\" id=\"loginSuccess\" role=\"status\">Demo workspace ready. You can now begin the organisation profile and assessment flow.</div>\n        </aside>\n      </div>\n\n      <section class=\"trust-strip\" aria-label=\"Trust indicators\">\n        <div class=\"trust-item\"><span class=\"dot\"></span>GDPR-aware</div>\n        <div class=\"trust-item\"><span class=\"dot\"></span>Evidence-based</div>\n        <div class=\"trust-item\"><span class=\"dot\"></span>Export-ready</div>\n        <div class=\"trust-item\"><span class=\"dot\"></span>Designed for CSOs</div>\n      </section>\n\n      <section class=\"section\" aria-labelledby=\"workflow-title\">\n        <div class=\"section-head\">\n          <div><h3 id=\"workflow-title\">Guided MVP journey</h3><p>The prototype demonstrates the complete path from organisation context to board-ready action plan.</p></div>\n          <span class=\"badge badge-success\">9-step walkthrough</span>\n        </div>\n        <div class=\"workflow\">\n          <div class=\"steps\" aria-label=\"MVP journey steps\">\n            <div class=\"step\"><div class=\"step-num\">1</div><div class=\"step-title\">Organisation Profile</div><div class=\"step-copy\">Context, risks, frameworks, capacity.</div></div>\n            <div class=\"step\"><div class=\"step-num\">2</div><div class=\"step-title\">Evidence Upload</div><div class=\"step-copy\">Manual document tagging.</div></div>\n            <div class=\"step\"><div class=\"step-num\">3</div><div class=\"step-title\">Three Empathies</div><div class=\"step-copy\">Human, business, planetary lens.</div></div>\n            <div class=\"step\"><div class=\"step-num\">4</div><div class=\"step-title\">Maturity Score</div><div class=\"step-copy\">25-category assessment.</div></div>\n            <div class=\"step\"><div class=\"step-num\">5</div><div class=\"step-title\">Priority Problems</div><div class=\"step-copy\">Ranked issue areas.</div></div>\n            <div class=\"step\"><div class=\"step-num\">6</div><div class=\"step-title\">Decision Cascade</div><div class=\"step-copy\">Next action logic.</div></div>\n            <div class=\"step\"><div class=\"step-num\">7</div><div class=\"step-title\">Prototype Plan</div><div class=\"step-copy\">Immediate, 3-month, 6-month tests.</div></div>\n            <div class=\"step\"><div class=\"step-num\">8</div><div class=\"step-title\">Business Case</div><div class=\"step-copy\">Executive-ready rationale.</div></div>\n            <div class=\"step\"><div class=\"step-num\">9</div><div class=\"step-title\">PDF Export</div><div class=\"step-copy\">Board-ready action plan.</div></div>\n          </div>\n        </div>\n      </section>\n\n      <section class=\"section\" aria-labelledby=\"proof-title\">\n        <div class=\"section-head\">\n          <div><h3 id=\"proof-title\">What Green Spectrum helps a CSO prove</h3><p>Three value promises define the prototype experience.</p></div>\n        </div>\n        <div class=\"value-grid\">\n          <article class=\"value-card\"><div class=\"icon-box\">01</div><h4>From fragmented data to clear priorities</h4><p>Bring ESG reports, stakeholder insight, business risk, and sustainability context into a guided decision pathway that identifies what matters first.</p></article>\n          <article class=\"value-card\"><div class=\"icon-box\">02</div><h4>Matched to maturity and complexity</h4><p>Recommendations are shaped by Green Spectrum maturity level, Three Empathies domain, priority score, and Cynefin problem classification.</p></article>\n          <article class=\"value-card\"><div class=\"icon-box\">03</div><h4>Board-ready experiment cards and business cases</h4><p>Translate sustainability ambition into practical tests, evidence plans, decision gates, and executive-ready investment rationale.</p></article>\n        </div>\n      </section>\n    </main>\n\n    <footer class=\"footer\">\n      <span>Green Spectrum MVP prototype.</span>\n      <span>No external APIs · No server-side processing · No browser storage</span>\n    </footer>\n  </div>\n\n  <div class=\"modal-backdrop\" id=\"sampleModal\" role=\"dialog\" aria-modal=\"true\" aria-labelledby=\"sampleModalTitle\">\n    <div class=\"modal\">\n      <div class=\"modal-header\">\n        <h2 class=\"modal-title\" id=\"sampleModalTitle\">Sample Green Spectrum output</h2>\n        <button class=\"btn btn-ghost\" id=\"closeModalBtn\" aria-label=\"Close sample output modal\">×</button>\n      </div>\n      <div class=\"modal-body\">\n        <div class=\"preview-grid\">\n          <article class=\"preview-card\"><span class=\"badge badge-success\">Maturity profile</span><h4>Mid Green trajectory</h4><p>Overall score, Human / Business / Planetary scores, confidence level, gaps, strengths, and priority improvement areas.</p></article>\n          <article class=\"preview-card\"><span class=\"badge badge-warning\">Experiment card</span><h4>Supplier traceability pilot</h4><p>Hypothesis, target stakeholders, intervention, data required, timeline, success metrics, and scale / adapt / stop gate.</p></article>\n          <article class=\"preview-card\"><span class=\"badge badge-dark\">Business case</span><h4>Board-ready rationale</h4><p>Why now, expected benefits, cost estimate, risk assessment, evidence plan, and executive recommendation.</p></article>\n        </div>\n        <div class=\"sample-output\">\n          <strong>Example export package includes:</strong>\n          <ul>\n            <li>Executive maturity summary and confidence score</li>\n            <li>Ranked priority problem list with classification tags</li>\n            <li>Decision cascade and recommended response type</li>\n            <li>Opportunity portfolio and prototype recommendation</li>\n            <li>Experiment card, business case, and 6-month action roadmap</li>\n          </ul>\n        </div>\n      </div>\n      <div class=\"modal-footer\">\n        <button class=\"btn btn-ghost\" id=\"cancelModalBtn\">Close</button>\n        <button class=\"btn btn-primary\" id=\"modalStartBtn\">Start new assessment</button>\n      </div>\n    </div>\n  </div>\n\n  <div class=\"toast-region\" id=\"toastRegion\" aria-live=\"polite\" aria-atomic=\"true\"></div>\n\n  <script>\n    const sampleModal = document.getElementById('sampleModal');\n    const sampleButtons = [document.getElementById('sampleOutputBtn'), document.getElementById('sampleTopBtn')];\n    const closeModalBtn = document.getElementById('closeModalBtn');\n    const cancelModalBtn = document.getElementById('cancelModalBtn');\n    const modalStartBtn = document.getElementById('modalStartBtn');\n    const startAssessmentBtn = document.getElementById('startAssessmentBtn');\n    const startStatus = document.getElementById('startStatus');\n    const demoWorkspaceBtn = document.getElementById('demoWorkspaceBtn');\n    const demoTopBtn = document.getElementById('demoTopBtn');\n    const loginForm = document.getElementById('loginForm');\n    const continueBtn = document.getElementById('continueBtn');\n    const email = document.getElementById('email');\n    const password = document.getElementById('password');\n    const emailError = document.getElementById('emailError');\n    const passwordError = document.getElementById('passwordError');\n    const loginSuccess = document.getElementById('loginSuccess');\n    const toastRegion = document.getElementById('toastRegion');\n\n    function openModal(){sampleModal.classList.add('open');closeModalBtn.focus();}\n    function closeModal(){sampleModal.classList.remove('open');}\n    sampleButtons.forEach(btn=>btn?.addEventListener('click',openModal));\n    closeModalBtn.addEventListener('click',closeModal);\n    cancelModalBtn.addEventListener('click',closeModal);\n    sampleModal.addEventListener('click',e=>{if(e.target===sampleModal)closeModal();});\n    document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal();});\n\n    function toast(title,msg){\n      const t=document.createElement('div');t.className='toast';\n      t.innerHTML=`<div class=\"toast-dot\" aria-hidden=\"true\"></div><div><strong>${title}</strong><p>${msg}</p></div>`;\n      toastRegion.appendChild(t);setTimeout(()=>{t.style.opacity='0';t.style.transform='translateY(8px)';t.style.transition='opacity .18s ease, transform .18s ease';setTimeout(()=>t.remove(),220)},3600);\n    }\n\n    function startDemoFlow(){\n      closeModal();\n      startStatus.className='status-panel show';\n      startStatus.innerHTML='<div class=\"spinner\" aria-hidden=\"true\"></div><div><div class=\"status-title\">Demo workspace starting…</div><div class=\"status-copy\">Preparing organisation profile, diagnostic modules, and sample output package.</div></div>';\n      startAssessmentBtn.disabled=true;\n      setTimeout(()=>{\n        startStatus.innerHTML='<div class=\"check\" aria-hidden=\"true\">✓</div><div><div class=\"status-title\">Demo workspace ready</div><div class=\"status-copy\">You can now continue to the organisation profile and begin the Green Spectrum assessment.</div></div>';\n        startAssessmentBtn.disabled=false;\n        loginSuccess.classList.add('show');\n        toast('Workspace ready','The Green Spectrum demo assessment flow has been prepared.');\n      },1200);\n    }\n\n    startAssessmentBtn.addEventListener('click',startDemoFlow);\n    modalStartBtn.addEventListener('click',startDemoFlow);\n    demoWorkspaceBtn.addEventListener('click',startDemoFlow);\n    demoTopBtn.addEventListener('click',startDemoFlow);\n\n    function setError(input,errorEl,hasError){input.classList.toggle('error',hasError);errorEl.classList.toggle('show',hasError);}\n    loginForm.addEventListener('submit',e=>{\n      e.preventDefault();\n      const emailMissing=!email.value.trim();\n      const pwMissing=!password.value.trim();\n      setError(email,emailError,emailMissing);\n      setError(password,passwordError,pwMissing);\n      loginSuccess.classList.remove('show');\n      if(emailMissing||pwMissing){toast('Check required fields','Email and password are required to continue.');return;}\n      continueBtn.disabled=true;continueBtn.innerHTML='<span class=\"spinner\" aria-hidden=\"true\"></span> Continuing…';\n      setTimeout(()=>{continueBtn.disabled=false;continueBtn.textContent='Continue';loginSuccess.classList.add('show');toast('Signed in','Workspace access confirmed for this prototype session.');},1100);\n    });\n    [email,password].forEach(input=>input.addEventListener('input',()=>{\n      if(input===email) setError(email,emailError,false);\n      if(input===password) setError(password,passwordError,false);\n    }));\n  <\/script>\n\n<script id=\"gs-cohesive-router-bridge\">\n(function(){\n  const targets = [[/design system|foundation/i,0],[/landing|login|home|start/i,1],[/organisation profile|organization profile|profile setup/i,2],[/evidence upload|data upload|evidence tagging|upload/i,3],[/three empathies|empathies/i,4],[/maturity assessment|25-category|25 category/i,5],[/maturity dashboard|dashboard/i,6],[/priority problem|problems/i,7],[/cynefin|classifier|classification/i,8],[/decision cascade/i,9],[/opportunity mapping/i,10],[/opportunity portfolio|leverage points|opportunities/i,11],[/prototype recommendation|prototypes/i,12],[/experiment card/i,13],[/business case/i,14],[/export|pdf|action plan/i,15]];\n  function matchPage(text){ text=(text||'').replace(/\\s+/g,' ').trim(); for(const [rx,n] of targets){ if(rx.test(text)) return n; } return null; }\n  function go(n){ if(parent && parent.gsNavigate){ parent.gsNavigate(n); } }\n  document.querySelectorAll('a').forEach(a=>{ const n=matchPage(a.textContent||a.getAttribute('aria-label')||''); if(n!==null){ a.href='javascript:void(0)'; a.addEventListener('click',e=>{e.preventDefault();go(n);}); }});\n  const ctas=[[/start new assessment|use demo workspace|continue$/i,0],[/continue to evidence upload/i,3],[/continue to maturity assessment/i,5],[/review priority problems/i,7],[/continue to cynefin|cynefin classification/i,8],[/continue to decision cascade/i,9],[/begin opportunity mapping/i,10],[/generate opportunity portfolio/i,11],[/continue to prototype recommendations/i,12],[/generate experiment card/i,13],[/generate business case/i,14],[/add to export package|export package|export pdf/i,15]];\n  document.querySelectorAll('button').forEach(btn=>{ const txt=(btn.textContent||'').replace(/\\s+/g,' ').trim(); for(const [rx,n] of ctas){ if(rx.test(txt)){ btn.title=(btn.title?btn.title+' · ':'')+'Double-click to move to the linked step'; btn.addEventListener('dblclick',()=>{ if(!btn.disabled) go(n); }); break; } } });\n})();\n<\/script>\n\n\n<script id=\"gs-login-to-dashboard-bridge\">\n(function(){\n  function goDashboard(){ if(parent && parent.gsNavigate){ parent.gsNavigate(0); } }\n  ['startAssessmentBtn','demoWorkspaceBtn','demoTopBtn','modalStartBtn'].forEach(id=>{\n    const el=document.getElementById(id); if(el){ el.addEventListener('click',()=>setTimeout(goDashboard,350)); }\n  });\n  const form=document.getElementById('loginForm');\n  if(form){ form.addEventListener('submit',()=>setTimeout(()=>{\n    const email=document.getElementById('email'); const password=document.getElementById('password');\n    if(email && password && email.value.trim() && password.value.trim()) goDashboard();\n  },450)); }\n})();\n<\/script>\n\n</body>\n</html>"}, {"n": 2, "title": "Green Spectr uired-note\"><span class=\"dot\"></span><span>Required fields are marked with a red asterisk. You can save a partial profile, but evidence upload unlocks after the core baseline is complete.</span></div>\n            </section>\n\n            <form id=\"profileForm\" novalidate>\n              <div class=\"accordion\">\n                <section class=\"section open\" data-section=\"basics\">\n                  <button class=\"section-header\" type=\"button\" aria-expanded=\"true\">\n                    <div class=\"section-left\"><div class=\"section-num\">1</div><div><div class=\"section-title\">Organisation basics</div><div class=\"section-copy\">Define the organisation Green Spectrum will assess.</div></div></div><span class=\"chevron\">⌄</span>\n                  </button>\n                  <div class=\"section-body\">\n                    <div class=\"form-grid\">\n                      <div class=\"field\"><label for=\"orgName\">Organisation name <span class=\"req\">*</span></label><input class=\"input required\" id=\"orgName\" placeholder=\"e.g. Northstar Manufacturing Group\" /><div class=\"error-text\">Organisation name is required.</div></div>\n                      <div class=\"field\"><label for=\"industry\">Industry <span class=\"req\">*</span></label><select class=\"select required\" id=\"industry\"><option value=\"\">Select industry</option><option>Manufacturing</option><option>Retail</option><option>Financial services</option><option>Technology</option><option>Energy</option><option>Food and agriculture</option><option>Transport and logistics</option></select><div class=\"error-text\">Select an industry.</div></div>\n                      <div class=\"field\"><label for=\"region\">Region <span class=\"req\">*</span></label><select class=\"select required\" id=\"region\"><option value=\"\">Select region</option><option>United Kingdom</option><option>European Union</option><option>North America</option><option>Asia-Pacific</option><option>Global / multi-region</option></select><div class=\"error-text\">Select a region.</div></div>\n                      <div class=\"field\"><label for=\"companySize\">Company size <span class=\"req\">*</span></label><select class=\"select required\" id=\"companySize\"><option value=\"\">Select size</option><option>250–999 employees</option><option>1,000–4,999 employees</option><option>5,000–19,999 employees</option><option>20,000+ employees</option></select><div class=\"error-text\">Select company size.</div></div>\n                      <div class=\"field full\"><label for=\"businessModel\">Business model <span class=\"req\">*</span></label><textarea class=\"textarea required\" id=\"businessModel\" placeholder=\"Summarise how the organisation creates value, serves customers, and operates across its value chain.\"></textarea><div class=\"error-text\">Business model context is required.</div></div>\n                    </div>\n                  </div>\n                </section>\n\n                <section class=\"section\" data-section=\"sustainability\">\n                  <button class=\"section-header\" type=\"button\" aria-expanded=\"false\">\n                    <div class=\"section-left\"><div class=\"section-num\">2</div><div><div class=\"section-title\">Sustainability context</div><div class=\"section-copy\">Capture existing strategy, reporting maturity, targets, and frameworks.</div></div></div><span class=\"chevron\">⌄</span>\n                  </button>\n                  <div class=\"section-body\">\n                    <div class=\"form-grid\">\n                      <div class=\"field\"><label for=\"teamStructure\">Sustainability team structure <span class=\"req\">*</span></label><select class=\"select required\" id=\"teamStructure\"><option value=\"\">Select structure</option><option>Single CSO / small central team</option><option>Central team with functional champions</option><option>Distributed cross-functional model</option><option>Dedicated transformation office</option></select><div class=\"error-text\">Select a team structure.</div></div>\n                      <div class=\"field\"><label for=\"strategyMaturity\">Strategy maturity <span class=\"req\">*</span></label><select class=\"select required\" id=\"strategyMaturity\"><option value=\"\">Select maturity</option><option>Early / awareness stage</option><option>Compliance and measurement focused</option><option>Integrated into strategy</option><option>Regenerative / systems leadership</option></select><div class=\"error-text\">Select current strategy maturity.</div></div>\n                      <div class=\"field full\"><label>Reporting frameworks used</label><div class=\"check-grid\">\n                        <label class=\"check-card\"><input type=\"checkbox\" class=\"framework\" value=\"CSRD\">CSRD</label><label class=\"check-card\"><input type=\"checkbox\" class=\"framework\" value=\"GRI\">GRI</label><label class=\"check-card\"><input type=\"checkbox\" class=\"framework\" value=\"ISSB\">ISSB</label><label class=\"check-card\"><input type=\"checkbox\" class=\"framework\" value=\"SBTi\">SBTi</label><label class=\"check-card\"><input type=\"checkbox\" class=\"framework\" value=\"CDP\">CDP</label><label class=\"check-card\"><input type=\"checkbox\" class=\"framework\" value=\"B Corp\">B Corp</label><label class=\"check-card\"><input type=\"checkbox\" class=\"framework\" value=\"Other\">Other</label>\n                      </div><div class=\"hint\">Frameworks help align outputs with the organisation’s existing reporting obligations.</div></div>\n                      <div class=\"field full\"><label for=\"targets\">Current targets and certifications</label><textarea class=\"textarea\" id=\"targets\" placeholder=\"e.g. Net zero by 2040, SBTi validation in progress, ISO 14001, B Corp assessment underway.\"></textarea></div>\n                    </div>\n                  </div>\n                </section>\n\n                <section class=\"section\" data-section=\"pressures\">\n                  <button class=\"section-header\" type=\"button\" aria-expanded=\"false\">\n                    <div class=\"section-left\"><div class=\"section-num\">3</div><div><div class=\"section-title\">Strategic pressures</div><div class=\"section-copy\">Identify what makes sustainability urgent for this organisation now.</div></div></div><span class=\"chevron\">⌄</span>\n                  </button>\n                  <div class=\"section-body\">\n                    <div class=\"form-grid\">\n                      <div class=\"field full\"><label for=\"challenges\">Known sustainability challenges <span class=\"req\">*</span></label><textarea class=\"textarea required\" id=\"challenges\" placeholder=\"Describe the main sustainability problems already visible to leadership.\"></textarea><div class=\"error-text\">Add at least one known challenge.</div></div>\n                      <div class=\"field\"><label for=\"risks\">Priority business risks <span class=\"req\">*</span></label><textarea class=\"textarea required\" id=\"risks\" placeholder=\"Regulatory, supply chain, operational, reputational, financial, market, or talent risks.\"></textarea><div class=\"error-text\">Priority business risks are required.</div></div>\n                      <div class=\"field\"><label for=\"deadlines\">Regulatory deadlines</label><textarea class=\"textarea\" id=\"deadlines\" placeholder=\"e.g. CSRD reporting cycle, investor reporting, board deadline, customer audit.\"></textarea></div>\n                      <div class=\"field full\"><label for=\"stakeholderConcerns\">Stakeholder concerns</label><textarea class=\"textarea\" id=\"stakeholderConcerns\" placeholder=\"Summarise concerns from board, investors, employees, communities, customers, suppliers, or regulators.\"></textarea></div>\n                    </div>\n                  </div>\n                </section>\n\n                <section class=\"section\" data-section=\"resources\">\n                  <button class=\"section-header\" type=\"button\" aria-expanded=\"false\">\n                    <div class=\"section-left\"><div class=\"section-num\">4</div><div><div class=\"section-title\">Resource context</div><div class=\"section-copy\">Ground recommendations in real constraints: budget, capacity, innovation readiness, and current pilots.</div></div></div><span class=\"chevron\">⌄</span>\n                  </button>\n                  <div class=\"section-body\">\n                    <div class=\"form-grid\">\n                      <div class=\"field\"><label for=\"budget\">Available budget range <span class=\"req\">*</span></label><select class=\"select required\" id=\"budget\"><option value=\"\">Select range</option><option>Under £50k</option><option>£50k–£250k</option><option>£250k–£1m</option><option>£1m+</option><option>Not confirmed</option></select><div class=\"error-text\">Select available budget range.</div></div>\n                      <div class=\"field\"><label for=\"capacity\">Internal capacity <span class=\"req\">*</span></label><select class=\"select required\" id=\"capacity\"><option value=\"\">Select capacity</option><option>Limited capacity / stretched team</option><option>Moderate capacity</option><option>Strong cross-functional capacity</option><option>Dedicated implementation capacity</option></select><div class=\"error-text\">Select internal capacity.</div></div>\n                      <div class=\"field\"><label for=\"innovation\">Current innovation capability</label><select class=\"select\" id=\"innovation\"><option value=\"\">Select capability</option><option>Low — limited experimentation</option><option>Medium — occasional pilots</option><option>High — structured innovation pipeline</option><option>Advanced — portfolio-based experimentation</option></select></div>\n                      <div class=\"field\"><label for=\"pilots\">Existing pilots or initiatives</label><textarea class=\"textarea\" id=\"pilots\" placeholder=\"List active sustainability pilots, initiatives, partnerships, or innovation workstreams.\"></textarea></div>\n                    </div>\n                  </div>\n                </section>\n\n                <section class=\"section\" data-section=\"confidence\">\n                  <button class=\"section-header\" type=\"button\" aria-expanded=\"false\">\n                    <div class=\"section-left\"><div class=\"section-num\">5</div><div><div class=\"section-title\">Confidence and completeness</div><div class=\"section-copy\">Record how reliable the profile is before moving into evidence upload.</div></div></div><span class=\"chevron\">⌄</span>\n                  </button>\n                  <div class=\"section-body\">\n                    <div class=\"form-grid\">\n                      <div class=\"field\"><label for=\"dataConfidence\">Data confidence selector <span class=\"req\">*</span></label><select class=\"select required\" id=\"dataConfidence\"><option value=\"\">Select confidence</option><option>High — evidence is current and reliable</option><option>Medium — some assumptions remain</option><option>Low — significant evidence gaps</option></select><div class=\"error-text\">Select data confidence.</div></div>\n                      <div class=\"field\"><label for=\"completionReadonly\">Completion percentage</label><input class=\"input\" id=\"completionReadonly\" value=\"0%\" readonly /></div>\n                      <div class=\"field full\"><label for=\"evidenceNotes\">Evidence notes</label><textarea class=\"textarea\" id=\"evidenceNotes\" placeholder=\"Summarise assumptions, evidence gaps, or areas that need validation during evidence upload.\"></textarea></div>\n                    </div>\n                  </div>\n                </section>\n              </div>\n\n              <div class=\"actions\">\n                <div class=\"action-copy\" id=\"actionCopy\">Complete the required baseline fields to unlock evidence upload.</div>\n                <div style=\"display:flex;gap:10px;flex-wrap:wrap\">\n                  <button type=\"button\" class=\"btn btn-ghost\" id=\"saveBtn\">Save profile</button>\n                  <button type=\"button\" class=\"btn btn-primary\" id=\"continueBtn\" disabled>Continue to evidence upload</button>\n                </div>\n              </div>\n            </form>\n          </div>\n\n          <aside class=\"guide\" aria-label=\"Guidance panel\">\n            <section class=\"panel guide-card\">\n              <h3>Why this profile matters</h3>\n              <p>The organisation profile becomes the context layer for every downstream recommendation. It tells Green Spectrum what kind of organisation is being assessed, what pressures are material, and what level of ambition is realistic.</p>\n              <ul class=\"guide-list\">\n                <li><span class=\"dot\"></span><div><strong>Maturity scoring</strong>Industry, region, strategy maturity, and frameworks shape the assessment interpretation.</div></li>\n                <li><span class=\"dot\"></span><div><strong>Priority ranking</strong>Risks, deadlines, and stakeholder concerns influence what gets flagged first.</div></li>\n                <li><span class=\"dot\"></span><div><strong>Prototype matching</strong>Budget, capacity, and innovation capability constrain what can be tested safely.</div></li>\n              </ul>\n            </section>\n\n            <section class=\"panel guide-card\">\n              <h3>Profile summary</h3>\n              <div class=\"summary-row\"><span>Required fields</span><strong id=\"requiredSummary\">0 / 12</strong></div>\n              <div class=\"summary-row\"><span>Frameworks selected</span><strong id=\"frameworkSummary\">0</strong></div>\n              <div class=\"summary-row\"><span>Evidence confidence</span><strong id=\"confidenceSummary\">Not set</strong></div>\n              <div class=\"summary-row\"><span>Status</span><strong id=\"statusSummary\">Incomplete</strong></div>\n            </section>\n\n            <section class=\"alert alert-warning\" id=\"incompleteWarning\">\n              <span aria-hidden=\"true\">⚠</span><div><strong>Incomplete profile</strong>Save is available, but evidence upload requires the core baseline fields.</div>\n            </section>\n          </aside>\n        </div>\n      </div>\n    </main>\n  </div>\n\n  <div class=\"toast-region\" id=\"toastRegion\" aria-live=\"polite\" aria-atomic=\"true\"></div>\n\n  <script>\n    const body=document.body;\n    const menuBtn=document.getElementById('menuBtn');\n    const mobileOverlay=document.getElementById('mobileOverlay');\n    menuBtn?.addEventListener('click',()=>body.classList.add('sidebar-open'));\n    mobileOverlay?.addEventListener('click',()=>body.classList.remove('sidebar-open'));\n    document.addEventListener('keydown',e=>{if(e.key==='Escape')body.classList.remove('sidebar-open')});\n\n    const sections=[...document.querySelectorAll('.section')];\n    sections.forEach(section=>{\n      const header=section.querySelector('.section-header');\n      header.addEventListener('click',()=>{\n        const open=section.classList.toggle('open');\n        header.setAttribute('aria-expanded',open?'true':'false');\n      });\n    });\n\n    const required=[...document.querySelectorAll('.required')];\n    const allInputs=[...document.querySelectorAll('input:not([readonly]), select, textarea')];\n    const frameworks=[...document.querySelectorAll('.framework')];\n    const completionLabel=document.getElementById('completionLabel');\n    const completionFill=document.getElementById('completionFill');\n    const completionReadonly=document.getElementById('completionReadonly');\n    const requiredSummary=document.getElementById('requiredSummary');\n    const frameworkSummary=document.getElementById('frameworkSummary');\n    const confidenceSummary=document.getElementById('confidenceSummary');\n    const statusSummary=document.getElementById('statusSummary');\n    const profileStatus=document.getElementById('profileStatus');\n    const continueBtn=document.getElementById('continueBtn');\n    const actionCopy=document.getElementById('actionCopy');\n    const toastRegion=document.getElementById('toastRegion');\n    const incompleteWarning=document.getElementById('incompleteWarning');\n\n    function toast(title,message){\n      const t=document.createElement('div');t.className='toast';\n      t.innerHTML=`<div class=\"toast-dot\" aria-hidden=\"true\"></div><div><strong>${title}</strong><p>${message}</p></div>`;\n      toastRegion.appendChild(t);\n      setTimeout(()=>{t.style.opacity='0';t.style.transform='translateY(8px)';t.style.transition='opacity .18s ease, transform .18s ease';setTimeout(()=>t.remove(),220)},3800);\n    }\n\n    function fieldHasValue(el){\n      if(el.type==='checkbox') return el.checked;\n      return Boolean(el.value.trim());\n    }\n\n    function updateCompletion(){\n      const requiredFilled=required.filter(fieldHasValue).length;\n      const totalRequired=required.length;\n      const optional=[...allInputs].filter(el=>!el.classList.contains('required') && el.id!=='completionReadonly');\n      const optionalFilled=optional.filter(fieldHasValue).length;\n      const frameworkCount=frameworks.filter(f=>f.checked).length;\n      const weighted=Math.round(((requiredFilled/totalRequired)*78) + Math.min(22, optionalFilled*3 + frameworkCount*2));\n      const pct=Math.min(100, weighted);\n      completionLabel.textContent=pct+'%';\n      completionFill.style.width=pct+'%';\n      completionReadonly.value=pct+'%';\n      requiredSummary.textContent=`${requiredFilled} / ${totalRequired}`;\n      frameworkSummary.textContent=frameworkCount;\n      const conf=document.getElementById('dataConfidence').value;\n      confidenceSummary.textContent=conf?conf.split(' — ')[0]:'Not set';\n      const complete=requiredFilled===totalRequired;\n      continueBtn.disabled=!complete;\n      incompleteWarning.style.display=complete?'none':'flex';\n      if(complete){\n        statusSummary.textContent='Ready';\n        profileStatus.textContent='Ready for evidence upload';\n        profileStatus.className='badge badge-success';\n        actionCopy.textContent='Core baseline complete. Continue to evidence upload when ready.';\n      }else{\n        statusSummary.textContent='Incomplete';\n        profileStatus.textContent='Profile incomplete';\n        profileStatus.className='badge badge-info';\n        actionCopy.textContent='Complete the required baseline fields to unlock evidence upload.';\n      }\n    }\n\n    function validateRequired(showToast=true){\n      let firstInvalid=null;\n      required.forEach(el=>{\n        const invalid=!fieldHasValue(el);\n        el.classList.toggle('error',invalid);\n        const err=el.parentElement.querySelector('.error-text');\n        if(err) err.classList.toggle('show',invalid);\n        if(invalid && !firstInvalid) firstInvalid=el;\n      });\n      updateCompletion();\n      if(firstInvalid){\n        const parentSection=firstInvalid.closest('.section');\n        if(parentSection && !parentSection.classList.contains('open')){\n          parentSection.classList.add('open');\n          parentSection.querySelector('.section-header').setAttribute('aria-expanded','true');\n        }\n        firstInvalid.focus();\n        if(showToast) toast('Incomplete profile','Complete the highlighted required fields before continuing.');\n        return false;\n      }\n      if(showToast) toast('Profile check complete','All required organisation baseline fields are complete.');\n      return true;\n    }\n\n    allInputs.forEach(el=>{\n      el.addEventListener('input',()=>{el.classList.remove('error');const err=el.parentElement?.querySelector('.error-text');if(err)err.classList.remove('show');updateCompletion();});\n      el.addEventListener('change',updateCompletion);\n    });\n    frameworks.forEach(el=>el.addEventListener('change',updateCompletion));\n\n    document.getElementById('saveBtn').addEventListener('click',()=>{updateCompletion();toast('Profile saved','Your organisation profile has been saved for this prototype session.');});\n    document.getElementById('saveTopBtn').addEventListener('click',()=>{updateCompletion();toast('Profile saved','Partial profiles can be saved before all required fields are complete.');});\n    document.getElementById('validateBtn').addEventListener('click',()=>validateRequired(true));\n    continueBtn.addEventListener('click',()=>{if(!validateRequired(true))return;continueBtn.disabled=true;continueBtn.innerHTML='<span class=\"spinner\" aria-hidden=\"true\"></span> Preparing evidence upload…';setTimeout(()=>{continueBtn.disabled=false;continueBtn.textContent='Continue to evidence upload';toast('Evidence upload unlocked','The organisation baseline is ready for document upload and evidence tagging.');},1000);});\n\n    updateCompletion();\n  <\/script>\n\n<script id=\"gs-cohesive-router-bridge\">\n(function(){\n  const targets = [[/design system|foundation/i,0],[/landing|login|home|start/i,1],[/organisation profile|organization profile|profile setup/i,2],[/evidence upload|data upload|evidence tagging|upload/i,3],[/three empathies|empathies/i,4],[/maturity assessment|25-category|25 category/i,5],[/maturity dashboard|dashboard/i,6],[/priority problem|problems/i,7],[/cynefin|classifier|classification/i,8],[/decision cascade/i,9],[/opportunity mapping/i,10],[/opportunity portfolio|leverage points|opportunities/i,11],[/prototype recommendation|prototypes/i,12],[/experiment card/i,13],[/business case/i,14],[/export|pdf|action plan/i,15]];\n  function matchPage(text){ text=(text||'').replace(/\\s+/g,' ').trim(); for(const [rx,n] of targets){ if(rx.test(text)) return n; } return null; }\n  function go(n){ if(parent && parent.gsNavigate){ parent.gsNavigate(n); } }\n  document.querySelectorAll('a').forEach(a=>{ const n=matchPage(a.textContent||a.getAttribute('aria-label')||''); if(n!==null){ a.href='javascript:void(0)'; a.addEventListener('click',e=>{e.preventDefault();go(n);}); }});\n  const ctas=[[/start new assessment|use demo workspace|continue$/i,0],[/continue to evidence upload/i,3],[/continue to maturity assessment/i,5],[/review priority problems/i,7],[/continue to cynefin|cynefin classification/i,8],[/continue to decision cascade/i,9],[/begin opportunity mapping/i,10],[/generate opportunity portfolio/i,11],[/continue to prototype recommendations/i,12],[/generate experiment card/i,13],[/generate business case/i,14],[/add to export package|export package|export pdf/i,15]];\n  document.querySelectorAll('button').forEach(btn=>{ const txt=(btn.textContent||'').replace(/\\s+/g,' ').trim(); for(const [rx,n] of ctas){ if(rx.test(txt)){ btn.title=(btn.title?btn.title+' · ':'')+'Double-click to move to the linked step'; btn.addEventListener('dblclick',()=>{ if(!btn.disabled) go(n); }); break; } } });\n})();\n<\/script>\n\n</body>\n</html>"}, {"n": 3, "title": "Green Spectrum — Data Upload & Evidence Tagging", "html": "<!DOCTYPE html>\n<html lang=\"en\">\n<head>\n  <meta charset=\"UTF-8\" />\n  <meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\" />\n  <title>Green Spectrum — Data Upload & Evidence Tagging</title>\n  <style>\n    :root{--bg:#fff;--soft:#F7FAF7;--panel:#fff;--green:#1F7A4D;--dark:#0E3B2E;--mid:#5DBB7A;--light:#DFF3E6;--text:#17231D;--muted:#5B6B61;--border:#DDE7DF;--strong:#C4D4C9;--warn:#B7791F;--warnbg:#FFF7E6;--err:#B42318;--errbg:#FEF3F2;--succ:#1F7A4D;--succbg:#ECFDF3;--info:#2563EB;--infobg:#EFF6FF;--shadow:0 10px 30px rgba(14,59,46,.08);--softshadow:0 4px 16px rgba(14,59,46,.06);--r:12px;--rl:18px;--side:260px;--head:72px;--focus:0 0 0 3px rgba(31,122,77,.18);font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,\"Segoe UI\",sans-serif}\n    *{box-sizing:border-box}body{margin:0;color:var(--text);background:var(--soft);font-family:inherit}button,input,select,textarea{font:inherit}button{cursor:pointer}a{text-deco lay:flex;gap:10px;align-items:center;padding:8px 10px;border:1px solid var(--border);border-radius:999px;background:#fff}.avatar{width:30px;height:30px;border-radius:999px;background:var(--dark);color:#fff;display:grid;place-items:center;font-size:12px;font-weight:850}.mobile-menu{display:none}\n    .content{padding:34px 40px 54px;max-width:1520px;margin:0 auto}.hero{display:flex;justify-content:space-between;gap:20px;align-items:flex-end;margin-bottom:22px}.eyebrow{display:inline-flex;gap:8px;align-items:center;border:1px solid rgba(31,122,77,.14);background:var(--light);color:var(--dark);border-radius:999px;padding:6px 10px;font-size:12px;font-weight:850;margin-bottom:12px}.dot{width:8px;height:8px;border-radius:999px;background:var(--green)}.hero h2{font-size:34px;line-height:1.08;letter-spacing:-.055em;color:var(--dark);margin:0 0 8px}.hero p{margin:0;color:var(--muted);font-size:15px;line-height:1.6;max-width:820px}.badge{display:inline-flex;align-items:center;gap:6px;border-radius:999px;padding:5px 9px;font-size:12px;font-weight:850;border:1px solid transparent;white-space:nowrap}.badge-success{background:var(--succbg);color:var(--succ);border-color:#BBF7D0}.badge-warning{background:var(--warnbg);color:var(--warn);border-color:#FED7AA}.badge-error{background:var(--errbg);color:var(--err);border-color:#FECDCA}.badge-info{background:var(--infobg);color:var(--info);border-color:#BFDBFE}.badge-neutral{background:var(--soft);color:var(--muted);border-color:var(--border)}\n    .layout{display:grid;grid-template-columns:minmax(0,1fr) 340px;gap:22px;align-items:start}.panel{background:#fff;border:1px solid var(--border);border-radius:var(--rl);box-shadow:var(--softshadow)}.banner{display:flex;gap:12px;padding:15px 16px;margin-bottom:18px;border-radius:var(--r);border:1px solid #BFDBFE;background:var(--infobg);color:#1E3A8A;font-size:13px;line-height:1.5}.banner strong{display:block;margin-bottom:2px}.upload{padding:22px;margin-bottom:18px}.upload-zone{border:2px dashe )) !important; }\n  .grid-2 { grid-template-columns:repeat(auto-fit,minmax(280px,1fr)) !important; }\n  table { min-width:720px; }\n  @media(max-width:1180px){ .hero-panel{grid-template-columns:1fr !important;} }\n  @media(max-width:900px){ .content{padding:22px 18px 96px !important;} .main,.main-wrapper{grid-column:1 !important;} }\n  @media(max-width:560px){ .content{padding:18px 14px 96px !important;} .hero-panel{padding:18px !important;} }\n  @media print{ .content{padding:0 !important;} }\n</style>\n\n\n</head>\n<body>\n  <div class=\"overlay\" id=\"overlay\"></div>\n  <div class=\"app\">\n    <aside class=\"sidebar\" id=\"sidebar\">\n      <div class=\"brand\"><div class=\"mark\">GS</div><div><strong>Green Spectrum</strong><span>Decision Engine MVP</span></div></div>\n      <nav class=\"nav\" aria-label=\"Workspace navigation\">\n        <div class=\"nav-title\">Workspace</div>\n        <a class=\"nav-item\" href=\"#\"><span class=\"nav-icon\">◼</span>Dashboard</a>\n        <a class=\"nav-item\" href=\"#\"><span class=\"nav-icon\">01</span>Organisation Profile</a>\n        <a class=\"nav-item active\" href=\"#\"><span class=\"nav-icon\">02</span>Evidence Upload</a>\n        <a class=\"nav-item\" href=\"#\"><span class=\"nav-icon\">03</span>Three Empathies</a>\n        <a class=\"nav-item\" href=\"#\"><span class=\"nav-icon\">04</span>Maturity Assessment</a>\n        <a class=\"nav-item\" href=\"#\"><span class=\"nav-icon\">05</span>Problems</a>\n        <a class=\"nav-item\" href=\"#\"><span class=\"nav-icon\">06</span>Decision Cascade</a>\n        <a class=\"nav-item\" href=\"#\"><span class=\"nav-icon\">07</span>Opportunities</a>\n        <a class=\"nav-item\" href=\"#\"><span class=\"nav-icon\">08</span>Prototypes</a>\n        <a class=\"nav-item\" href=\"#\"><span class=\"nav-icon\">09</span>Business Case</a>\n        <a class=\"nav-item\" href=\"#\"><span class=\"nav-icon\">10</span>Export</a>\n      </nav>\n      <div class=\"side-foot\"><div class=\"workspace\"><strong>Evidence workspace</strong><p>Manual upload and tagging only. No extraction is performed in this MVP.</p></div></div>\n    </aside>\n\n    <main class=\"main\">\n      <header class=\"topbar\">\n        <div style=\"display:flex;align-items:center;gap:14px;min-width:0\"><button class=\"btn btn-ghost btn-sm mobile-menu\" id=\"menuBtn\">☰</button><div><div class=\"crumb\">Assessment setup / Evidence upload</div><h1 class=\"title\">Data Upload & Evidence Tagging</h1></div></div>\n        <div class=\"top-actions\"><button class=\"btn btn-ghost btn-sm\" id=\"clearBtn\">Clear demo data</button><button class=\"btn btn-secondary btn-sm\" id=\"sampleBtn\">Add sample evidence</button><div class=\"avatar-pill\"><div class=\"avatar\">AM</div><div style=\"line-height:1.1\"><div style=\"font-weight:800;font-size:13px\">Amara Mensah</div><div style=\"color:var(--muted);font-size:12px\">Chief Sustainability Officer</div></div></div></div>\n      </header>\n\n      <div class=\"content\">\n        <section class=\"hero\">\n          <div><span class=\"eyebrow\"><span class=\"dot\"></span> Step 2 of 14</span><h2>Upload and tag defensible evidence.</h2><p>Organise sustainability reports, risk registers, supplier files, board materials, and stakeholder research so the maturity assessment can be grounded in traceable evidence.</p></div>\n          <span class=\"badge badge-warning\" id=\"pageStatus\">No evidence uploaded</span>\n        </section>\n\n        <div class=\"banner\"><span aria-hidden=\"true\">ⓘ</span><div><strong>MVP limitation</strong>In this MVP, documents are uploaded and tagged manually. Automated extraction and classification are planned for a future phase.</div></div>\n        <div class=\"alert alert-error invalid\" id=\"invalidAlert\"><span>!</span><div><strong>Invalid file type</strong>Accepted formats are PDF, Word, Excel/CSV, PowerPoint, and TXT.</div></div>\n\n        <div class=\"layout\">\n          <div>\n            <section class=\"panel upload\">\n              <div class=\"upload-zone\" id=\"dropZone\" tabindex=\"0\" role=\"button\" aria-label=\"Drag and drop files or choose files\">\n                <div class=\"upload-icon\">↑</div>\n                <h3>Drag and drop evidence files here</h3>\n                <p>Upload organisational documents, then manually tag each file by document type, empathy domain, maturity category, and evidence confidence.</p>\n                <div class=\"accepted\">Accepted: PDF, Word, Excel/CSV, PowerPoint, TXT</div>\n                <div class=\"upload-actions\"><button class=\"btn btn-primary\" id=\"chooseBtn\" type=\"button\">Choose files</button><button class=\"btn btn-ghost\" id=\"simulateBtn\" type=\"button\">Simulate upload</button></div>\n                <input class=\"file-input\" id=\"fileInput\" type=\"file\" multiple accept=\".pdf,.doc,.docx,.xls,.xlsx,.csv,.ppt,.pptx,.txt\" />\n              </div>\n            </section>\n\n            <section class=\"panel tagging\">\n              <div class=\"panel-head\"><div><h3>Document type tags</h3><p>Use these categories to make evidence easier to review during maturity scoring.</p></div><span class=\"badge badge-neutral\">Manual tagging</span></div>\n              <div class=\"tag-grid\" id=\"tagGrid\"></div>\n            </section>\n\n            <section class=\"panel table-panel\">\n              <div class=\"panel-head\"><div><h3>Uploaded documents</h3><p>Each document should have a type, related empathy domain, maturity category, confidence level, and note.</p></div><span class=\"badge badge-info\" id=\"tableCount\">0 documents</span></div>\n              <div id=\"emptyState\" class=\"empty\"><h3>No evidence documents yet</h3><p>Upload ESG reports, annual reports, risk registers, supplier records, strategy documents, or workshop notes to improve the credibility of Green Spectrum outputs.</p></div>\n              <div class=\"table-wrap\" id=\"tableWrap\" style=\"display:none\">\n                <table aria-label=\"Uploaded document table\">\n                  <thead><tr><th>File name</th><th>Document type</th><th>Related empathy domain</th><th>Related maturity category</th><th>Evidence confidence</th><th>Notes</th><th>Status</th><th>Actions</th></tr></thead>\n                  <tbody id=\"docBody\"></tbody>\n                </table>\n              </div>\n            </section>\n          </div>\n\n          <aside class=\"summary\" aria-label=\"Evidence summary\">\n            <section class=\"panel summary-card\">\n              <h3>Evidence summary</h3><p>Use this panel to check whether evidence coverage is balanced enough for a credible assessment.</p>\n              <div class=\"metric\"><span>Total documents</span><strong id=\"totalDocs\">0</strong></div>\n              <div class=\"metric\"><span>Human evidence</span><strong id=\"humanDocs\">0</strong></div>\n              <div class=\"metric\"><span>Business evidence</span><strong id=\"businessDocs\">0</strong></div>\n              <div class=\"metric\"><span>Planetary evidence</span><strong id=\"planetaryDocs\">0</strong></div>\n              <div class=\"metric\"><span>Average confidence</span><strong id=\"avgConfidence\">—</strong></div>\n              <div class=\"progress\"><div class=\"progress-meta\"><span>Evidence coverage</span><span id=\"coverageLabel\">0%</span></div><div class=\"track\"><div class=\"fill\" id=\"coverageFill\" style=\"width:0%\"></div></div></div>\n            </section>\n            <section class=\"panel summary-card\">\n              <h3>Evidence gaps</h3><p>Green Spectrum flags gaps when evidence is missing across Human, Business, or Planetary domains.</p>\n              <ul class=\"gap-list\" id=\"gapList\"></ul>\n            </section>\n            <section class=\"alert alert-warning\" id=\"gapWarning\"><span>⚠</span><div><strong>Evidence gap warning</strong>At least one empathy domain has no supporting evidence yet.</div></section>\n          </aside>\n        </div>\n      </div>\n    </main>\n  </div>\n\n  <div class=\"toast-region\" id=\"toastRegion\" aria-live=\"polite\" aria-atomic=\"true\"></div>\n\n  <script>\n    const docTypes=['ESG report','Annual report','Sustainability report','Supplier report','Procurement policy','Governance document','Materiality assessment','Risk register','Lifecycle assessment','Carbon report','Strategy document','Board presentation','Stakeholder research','Workshop notes'];\n    const categories=['Strategy and Purpose Alignment','Governance and Leadership','Organisational Culture and Engagement','Stakeholder Engagement and Co-Design','Materiality and Systems Risk Mapping','Transparency and Accountability','Metrics and Impact Measurement','Product and Service Innovation','Operational Integration and Circularity','Finance, Budgeting and Investment','Data Systems and Digital Enablement','Policy and Regulatory Alignment','Value Chain Integration and Traceability','Climate and Biodiversity Integration','Human and Community Wellbeing'];\n    const allowed=['pdf','doc','docx','xls','xlsx','csv','ppt','pptx','txt'];\n    let docs=[];\n    const tagGrid=document.getElementById('tagGrid'), docBody=document.getElementById('docBody'), emptyState=document.getElementById('emptyState'), tableWrap=document.getElementById('tableWrap'), tableCount=document.getElementById('tableCount');\n    const totalDocs=document.getElementById('totalDocs'), humanDocs=document.getElementById('humanDocs'), businessDocs=document.getElementById('businessDocs'), planetaryDocs=document.getElementById('planetaryDocs'), avgConfidence=document.getElementById('avgConfidence'), coverageLabel=document.getElementById('coverageLabel'), coverageFill=document.getElementById('coverageFill'), gapList=document.getElementById('gapList'), gapWarning=document.getElementById('gapWarning'), pageStatus=document.getElementById('pageStatus'), invalidAlert=document.getElementById('invalidAlert');\n    const toastRegion=document.getElementById('toastRegion');\n    function toast(title,msg){const t=document.createElement('div');t.className='toast';t.innerHTML=`<div class=\"toast-dot\"></div><div><strong>${title}</strong><p>${msg}</p></div>`;toastRegion.appendChild(t);setTimeout(()=>{t.style.opacity='0';t.style.transform='translateY(8px)';t.style.transition='opacity .18s ease, transform .18s ease';setTimeout(()=>t.remove(),220)},3600)}\n    docTypes.forEach((t,i)=>{const el=document.createElement('div');el.className='tag'+(i<4?' active':'');el.textContent=t;tagGrid.appendChild(el)});\n    function ext(name){return (name.split('.').pop()||'').toLowerCase()}\n    function addFiles(files){invalidAlert.classList.remove('show');let added=0, invalid=0;[...files].forEach(file=>{if(!allowed.includes(ext(file.name))){invalid++;return;}docs.push({id:Date.now()+Math.random(),name:file.name,type:guessType(file.name),domain:guessDomain(file.name),category:guessCategory(file.name),confidence:'Medium',notes:'Manual tag required before assessment review.',status:'Tagged'});added++;});if(invalid)invalidAlert.classList.add('show');if(added){render();toast('Upload complete',`${added} document${added>1?'s':''} added for manual evidence tagging.`)}else if(invalid){toast('Invalid file type','One or more files could not be added to the evidence table.')}}\n    function guessType(name){const n=name.toLowerCase();if(n.includes('esg'))return 'ESG report';if(n.includes('annual'))return 'Annual report';if(n.includes('supplier'))return 'Supplier report';if(n.includes('risk'))return 'Risk register';if(n.includes('carbon'))return 'Carbon report';if(n.includes('board'))return 'Board presentation';return 'Sustainability report'}\n    function guessDomain(name){const n=name.toLowerCase();if(n.includes('employee')||n.includes('stakeholder')||n.includes('workshop'))return 'Human';if(n.includes('carbon')||n.includes('supplier')||n.includes('lca')||n.includes('waste'))return 'Planetary';return 'Business'}\n    function guessCategory(name){const n=name.toLowe
