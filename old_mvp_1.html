24px 18px 42px}.avatar-pill{display:none}.hero{flex-direction:column;align-items:flex-start}.cards,.side,.summary,.filter-grid{grid-template-columns:1fr}}@media(max-width:560px){.hero h2{font-size:28px}.top-actions .btn-ghost{display:none}}\n</style>\n\n<style id=\"gs-cohesive-inner-style\">\n  html, body { background:#F7FAF7 !important; min-width:0 !important; }\n  body { margin:0 !important; overflow-x:hidden !important; }\n  /* Hide original per-page chrome so the outer all-in-one shell is the only shell. */\n  .sidebar, aside.sidebar, .topbar, header.topbar, .overlay, .mobile-menu, .side-foot, .brand,\n  .skip-link, a[href=\"#main-content\"], body > header, .site-header, .app > aside:first-child,\n  .app-shell > aside:first-child, .mobile-overlay, .sidebar-footer, .side-footer {\n    display:none !important;\n  }\n  .app, .app-shell, .page { display:block !important; min-height:auto !important; grid-template-columns:1fr !important; }\n  .main, main.main, .main-wrapper { grid-column:1 !important; margin:0 !important; width:100% !important; min-width:0 !important; }\n  .content { padding:28px 34px 96px !important; max-width:1540px !important; margin:0 auto !important; }\n  .hero, .hero-panel { margin-top:0 !important; }\n  .hero-panel { grid-template-columns:minmax(0,1.35fr) minmax(280px,.65fr) !important; align-items:stretch !important; }\n  .section { scroll-margin-top:24px !important; }\n  .side, .rail, .preview-wrap, .section-nav, .checklist { top:18px !important; }\n  .toast-region { bottom:14px !important; right:14px !important; }\n  .drawer { top:0 !important; }\n  .token-grid { grid-template-columns:repeat(auto-fit,minmax(150px,1fr)) !important; }\n  .grid-4 { grid-template-columns:repeat(auto-fit,minmax(210px,1fr)) !important; }\n  .grid-3 { grid-template-columns:repeat(auto-fit,minmax(240px,1fr)) !important; }\n  .grid-2 { grid-template-columns:repeat(auto-fit,minmax(280px,1fr)) !important; }\n  table { min-width:720px; }\n  @media(max-width:1180px){ .hero-panel{grid-template-columns:1fr !important;} }\n  @media(max-width:900px){ .content{padding:22px 18px 96px !important;} .main,.main-wrapper{grid-column:1 !important;} }\n  @media(max-width:560px){ .content{padding:18px 14px 96px !important;} .hero-panel{padding:18px !important;} }\n  @media print{ .content{padding:0 !important;} }\n</style>\n\n\n</head><body><div class=\"overlay\" id=\"overlay\"></div><div class=\"app\"><aside class=\"sidebar\"><div class=\"brand\"><div class=\"mark\">GS</div><div><strong>Green Spectrum</strong><span>Decision Engine MVP</span></div></div><nav class=\"nav\"><div class=\"nav-title\">Workspace</div><a class=\"nav-item\" href=\"#\"><span class=\"nav-icon\">◼</span>Dashboard</a><a class=\"nav-item\" href=\"#\"><span class=\"nav-icon\">01</span>Organisation Profile</a><a class=\"nav-item\" href=\"#\"><span class=\"nav-icon\">02</span>Evidence Upload</a><a class=\"nav-item\" href=\"#\"><span class=\"nav-icon\">03</span>Three Empathies</a><a class=\"nav-item\" href=\"#\"><span class=\"nav-icon\">04</span>Maturity Assessment</a><a class=\"nav-item\" href=\"#\"><span class=\"nav-icon\">05</span>Maturity Dashboard</a><a class=\"nav-item active\" href=\"#\"><span class=\"nav-icon\">06</span>Problems</a><a class=\"nav-item\" href=\"#\"><span class=\"nav-icon\">07</span>Decision Cascade</a><a class=\"nav-item\" href=\"#\"><span class=\"nav-icon\">08</span>Opportunities</a><a class=\"nav-item\" href=\"#\"><span class=\"nav-icon\">09</span>Business Case</a><a class=\"nav-item\" href=\"#\"><span class=\"nav-icon\">10</span>Export</a></nav><div class=\"side-foot\"><div class=\"workspace\"><strong>Problem engine</strong><p>Rank weak categories into decision-ready priority problems.</p></div></div></aside><main class=\"main\"><header class=\"topbar\"><div style=\"display:flex;align-items:center;gap:14px\"><button class=\"btn btn-ghost btn-sm mobile-menu\" id=\"menuBtn\">☰</button><div><div class=\"crumb\">Decision pathway / Priority problems</div><h1 class=\"title\">Priority Problem List</h1></div></div><div class=\"top-actions\"><button class=\"btn btn-ghost btn-sm\" id=\"resetBtn\">Reset filters</button><button class=\"btn btn-secondary btn-sm\" id=\"demoBtn\">Demo warning</button><div class=\"avatar-pill\"><div class=\"avatar\">AM</div><div style=\"line-height:1.1\"><div style=\"font-weight:800;font-size:13px\">Amara Mensah</div><div style=\"color:var(--muted);font-size:12px\">Chief Sustainability Officer</div></div></div></div></header><div class=\"content\"><section class=\"hero\"><div><span class=\"eyebrow\"><span class=\"dot\"></span> Step 6 of 14</span><h2>Turn maturity gaps into decision-ready problems.</h2><p>Review why each category was flagged, compare problem areas, and select the highest-priority issue for Cynefin complexity classification and decision guidance.</p></div><span class=\"badge badge-warning\">9 flagged areas</span></section><section class=\"summary\"><div class=\"panel metric\"><span>Flagged problems</span><strong id=\"flaggedMetric\">9</strong></div><div class=\"panel metric\"><span>Selected problem</span><strong id=\"selectedMetric\">—</strong></div><div class=\"panel metric\"><span>Compare slots</span><strong id=\"compareMetric\">0 / 2</strong></div><div class=\"panel metric\"><span>Highest priority</span><strong>92</strong></div></section><div class=\"layout\"><div><section class=\"panel filters\"><div class=\"panel-head\"><div><h3>Filters</h3><p>Reduce the list by maturity, empathy domain, problem type, urgency, or confidence.</p></div><span class=\"badge badge-neutral\" id=\"resultCount\">0 results</span></div><div class=\"filter-grid\"><div class=\"field\"><label>Maturity level</label><select class=\"select filter\" data-field=\"maturity\"><option>All</option><option>White</option><option>Light Green</option><option>Mid Green</option></select></div><div class=\"field\"><label>Empathy domain</label><select class=\"select filter\" data-field=\"domain\"><option>All</option><option>Human</option><option>Business</option><option>Planetary</option><option>Hybrid</option></select></div><div class=\"field\"><label>Problem type</label><select class=\"select filter\" data-field=\"type\"><option>All</option><option>Supply chain</option><option>Behaviour</option><option>Operational</option><option>Governance</option><option>Data</option><option>Regulatory</option><option>Product or service</option></select></div><div class=\"field\"><label>Urgency</label><select class=\"select filter\" data-field=\"urgency\"><option>All</option><option>High</option><option>Medium</option><option>Low</option></select></div><div class=\"field\"><label>Confidence</label><select class=\"select filter\" data-field=\"confidence\"><option>All</option><option>High</option><option>Medium</option><option>Low</option></select></div></div></section><section class=\"panel table-panel\"><div class=\"panel-head\"><div><h3>Ranked problem table</h3><p>Select one problem to continue, or compare two before deciding.</p></div><button class=\"btn btn-primary btn-sm\" id=\"continueTop\" disabled>Continue to Cynefin</button></div><div class=\"empty\" id=\"emptyState\"><h3>No priority problems found</h3><p>Adjust filters or return to the maturity dashboard to review category scores.</p></div><div class=\"table-wrap\" id=\"tableWrap\"><table><thead><tr><th>Rank</th><th>Problem title</th><th>Maturity</th><th>Empathy</th><th>Problem type</th><th>Priority</th><th>Urgency</th><th>Feasibility</th><th>Confidence</th><th>Action</th></tr></thead><tbody id=\"rows\"></tbody></table></div></section><div class=\"tabs\"><button class=\"tab active\" id=\"allCards\">Problem cards</button><button class=\"tab\" id=\"compareCards\">Compare selected</button></div><section class=\"cards\" id=\"cards\"></section></div><aside class=\"side\"><section class=\"panel side-card\"><h3>Priority score logic</h3><p>Priority considers impact, urgency, strategic relevance, leverage potential, feasibility, risk, and data confidence.</p><div class=\"formula\"><strong>Displayed logic</strong><br>High impact + urgent regulation + strategic relevance + strong leverage + feasible action = higher priority score.</div></section><section class=\"panel side-card\"><h3>Selected problem</h3><div class=\"selected-box\" id=\"selectedBox\">No problem selected yet. Select a row or card to continue.</div><button class=\"btn btn-primary\" style=\"width:100%;margin-top:12px\" id=\"continueBtn\" disabled>Continue to Cynefin classification</button></section><section class=\"panel side-card\"><h3>Compare two problems</h3><p>Select “Compare” on up to two cards.</p><div class=\"compare-box\" id=\"compareBox\"></div></section><section class=\"alert alert-warning\"><span>⚠</span><div><strong>Low confidence warning</strong>Some high-priority problems are driven by low evidence confidence and should be validated before board use.</div></section><section class=\"alert alert-warning\"><span>⚠</span><div><strong>Too many flagged areas</strong>Nine problem areas are flagged. Select one or two to keep the next step focused.</div></section><section class=\"alert alert-info\"><span>ⓘ</span><div><strong>Flagging logic</strong>A category may be flagged due to low score, strategic importance, weak evidence, industry risk, stakeholder concern, or regulatory urgency.</div></section></aside></div></div></main></div><aside class=\"drawer\" id=\"drawer\"><button class=\"btn btn-ghost btn-sm\" id=\"closeDrawer\">Close</button><h2 id=\"drawerTitle\">Problem detail</h2><div id=\"drawerBody\"></div></aside><div class=\"toast-region\" id=\"toastRegion\"></div><script>\nconst problems=[\n{title:'Value chain traceability is insufficient for Scope 3 confidence',maturity:'Light Green',domain:'Planetary',type:'Supply chain',score:92,urgency:'High',feasibility:'Medium',confidence:'Medium',impact:9,relevance:9,leverage:8,effort:'Medium',flags:['Light Green score','High industry risk','Supplier evidence gap','Regulatory urgency'],summary:'Supplier footprint visibility is not strong enough to support confident Scope 3 decisions or credible external disclosure.'},\n{title:'Circular design is not embedded in product development',maturity:'Light Green',domain:'Planetary',type:'Product or service',score:88,urgency:'High',feasibility:'Medium',confidence:'Medium',impact:9,relevance:8,leverage:8,effort:'Medium',flags:['Low maturity','Strategic importance','Material environmental impact'],summary:'Circularity remains project-based rather than integrated into materials, design gates, and product lifecycle decisions.'},\n{title:'Internal incentives do not reinforce sustainability behaviours',maturity:'Light Green',domain:'Human',type:'Behaviour',score:84,urgency:'Medium',feasibility:'High',confidence:'High',impact:7,relevance:8,leverage:9,effort:'Low',flags:['Light Green score','Stakeholder concern','Strong leverage potential'],summary:'Employees understand sustainability priorities but incentives, goals, and performance routines do not yet support adoption.'},\n{title:'Ecosystem stewardship lacks measurable regenerative targets',maturity:'Light Green',domain:'Planetary',type:'Operational',score:81,urgency:'Medium',feasibility:'Medium',confidence:'Low',impact:8,relevance:7,leverage:7,effort:'Medium',flags:['Low confidence','Planetary gap','Future stakeholder concern'],summary:'Nature-positive ambition is visible, but ecosystem impact metrics and regenerative targets are not yet operational.'},\n{title:'Stakeholder co-design is inconsistent across transformation work',maturity:'Light Green',domain:'Human',type:'Governance',score:77,urgency:'Medium',feasibility:'High',confidence:'Medium',impact:7,relevance:7,leverage:8,effort:'Low',flags:['Stakeholder concern','Low maturity','Adoption risk'],summary:'Affected stakeholders are consulted unevenly, limiting trust, adoption, and quality of sustainability interventions.'},\n{title:'Data systems do not yet support integrated decision-making',maturity:'Mid Green',domain:'Business',type:'Data',score:74,urgency:'Medium',feasibility:'Medium',confidence:'Medium',impact:7,relevance:8,leverage:7,effort:'Medium',flags:['Evidence fragmentation','Strategic dependency'],summary:'Sustainability, finance, procurement, and operations data remain partly disconnected, slowing prioritisation.'},\n{title:'Equity and justice are underdeveloped in sustainability planning',maturity:'Light Green',domain:'Human',type:'Behaviour',score:72,urgency:'Medium',feasibility:'Medium',confidence:'Low',impact:7,relevance:7,leverage:6,effort:'Medium',flags:['Low maturity','Low evidence confidence','Stakeholder concern'],summary:'Equity impacts are acknowledged but not consistently assessed in decision gates or intervention design.'},\n{title:'Disclosure governance is not ready for assurance demands',maturity:'Mid Green',domain:'Business',type:'Regulatory',score:70,urgency:'High',feasibility:'High',confidence:'High',impact:6,relevance:9,leverage:6,effort:'Medium',flags:['Regulatory urgency','Board relevance'],summary:'Reporting structures exist, but assurance readiness and accountability routines need strengthening.'},\n{title:'Operational circularity pilots are not scaling into core processes',maturity:'Light Green',domain:'Planetary',type:'Operational',score:68,urgency:'Low',feasibility:'Medium',confidence:'Medium',impact:6,relevance:6,leverage:7,effort:'Medium',flags:['Low maturity','Scaling barrier'],summary:'Pilot activity exists, but circularity is not yet embedded into operating model, procurement, and supplier routines.'}\n].map((p,i)=>({...p,id:i+1,selected:false,compare:false}));let filters={}, compareMode=false;function toast(t,m){const el=document.createElement('div');el.className='toast';el.innerHTML=`<div class=\"toast-dot\"></div><div><strong>${t}</strong><p style=\"margin:0;color:var(--muted);font-size:13px\">${m}</p></div>`;toastRegion.appendChild(el);setTimeout(()=>el.remove(),3600)}function badge(val){let cls=val==='High'||val==='Planetary'?'badge-warning':val==='Human'?'badge-info':val==='Business'||val==='High confidence'?'badge-success':'badge-neutral';return `<span class=\"badge ${cls}\">${val}</span>`}function data(){return problems.filter(p=>Object.entries(filters).every(([k,v])=>!v||v==='All'||p[k]===v))}function render(){const rowsData=data();resultCount.textContent=rowsData.length+' results';flaggedMetric.textContent=rowsData.length;emptyState.style.display=rowsData.length?'none':'block';tableWrap.style.display=rowsData.length?'block':'none';rows.innerHTML=rowsData.map((p,i)=>`<tr class=\"${p.selected?'selected-row':''}\"><td>${i+1}</td><td><strong>${p.title}</strong></td><td>${badge(p.maturity)}</td><td>${badge(p.domain)}</td><td>${p.type}</td><td><span class=\"score\">${p.score}</span></td><td>${badge(p.urgency)}</td><td>${p.feasibility}</td><td>${badge(p.confidence)}</td><td><button class=\"btn btn-secondary btn-sm\" onclick=\"selectProblem(${p.id})\">Select</button> <button class=\"btn btn-ghost btn-sm\" onclick=\"openDrawer(${p.id})\">Details</button></td></tr>`).join('');let cardData=compareMode?problems.filter(p=>p.compare):rowsData;cards.innerHTML=cardData.length?cardData.map(p=>`<article class=\"panel card ${p.selected?'selected':''} ${p.compare?'compare':''}\"><h4>${p.title}</h4><p>${p.summary}</p><div class=\"flag-list\">${p.flags.map(f=>`<span class=\"badge badge-warning\">${f}</span>`).join('')}</div><div class=\"score-grid\"><div class=\"mini\"><span>Impact</span><strong>${p.impact}/10</strong></div><div class=\"mini\"><span>Urgency</span><strong>${p.urgency}</strong></div><div class=\"mini\"><span>Strategic relevance</span><strong>${p.relevance}/10</strong></div><div class=\"mini\"><span>Leverage</span><strong>${p.leverage}/10</strong></div><div class=\"mini\"><span>Effort / feasibility</span><strong>${p.effort}</strong></div><div class=\"mini\"><span>Priority</span><strong>${p.score}</strong></div></div><div style=\"display:flex;gap:8px;margin-top:14px;flex-wrap:wrap\"><button class=\"btn btn-primary btn-sm\" onclick=\"selectProblem(${p.id})\">Select</button><button class=\"btn btn-secondary btn-sm\" onclick=\"toggleCompare(${p.id})\">${p.compare?'Remove compare':'Compare'}</button><button class=\"btn btn-ghost btn-sm\" onclick=\"openDrawer(${p.id})\">Details</button></div><div style=\"margin-top:10px\">${badge(p.maturity)} ${badge(p.domain)} ${badge(p.type)}</div></article>`).join(''):'<div class=\"panel empty\" style=\"display:block;grid-column:1/-1\">No compared problems selected.</div>';updateSide()}function updateSide(){const selected=problems.find(p=>p.selected);selectedMetric.textContent=selected?('#'+selected.id):'—';selectedBox.innerHTML=selected?`<strong>${selected.title}</strong><br><br>${selected.summary}<br><br>${badge(selected.domain)} ${badge(selected.urgency)} <span class=\"badge badge-dark\">Priority ${selected.score}</span>`:'No problem selected yet. Select a row or card to continue.';continueBtn.disabled=continueTop.disabled=!selected;const compared=problems.filter(p=>p.compare);compareMetric.textContent=compared.length+' / 2';compareBox.innerHTML=compared.length?compared.map(p=>`<div class=\"selected-box\"><strong>${p.title}</strong><br><span class=\"badge badge-dark\">${p.score}</span> ${badge(p.domain)}</div>`).join(''):'<div class=\"selected-box\">No problems selected for comparison.</div>'}function selectProblem(id){problems.forEach(p=>p.selected=p.id===id);toast('Problem selected','This problem is ready for Cynefin complexity classification.');render()}function toggleCompare(id){const p=problems.find(x=>x.id===id);if(!p.compare&&problems.filter(x=>x.compare).length>=2){toast('Compare limit reached','Remove one compared problem before adding another.');return}p.compare=!p.compare;render()}function openDrawer(id){const p=problems.find(x=>x.id===id);drawerTitle.textContent=p.title;drawerBody.innerHTML=`<p>${p.summary}</p><p><strong>Why flagged:</strong></p><div class=\"flag-list\">${p.flags.map(f=>`<span class=\"badge badge-warning\">${f}</span>`).join('')}</div><p><strong>Priority score:</strong> ${p.score}</p><p><strong>Decision value:</strong> This problem is suitable for deeper classification because it combines material impact, organisational relevance, and a realistic intervention pathway.</p><button class=\"btn btn-primary\" onclick=\"selectProblem(${p.id});drawer.classList.remove('open')\">Select this problem</button>`;drawer.classList.add('open')}document.querySelectorAll('.filter').forEach(f=>f.onchange=()=>{filters[f.dataset.field]=f.value;render()});resetBtn.onclick=()=>{filters={};document.querySelectorAll('.filter').forEach(f=>f.value='All');render();toast('Filters reset','All priority problems are visible again.')};demoBtn.onclick=()=>toast('No problem selected validation','Select a priority problem before continuing to Cynefin classification.');continueBtn.onclick=continueTop.onclick=()=>{const s=problems.find(p=>p.selected);if(!s){toast('No problem selected','Select a problem before continuing.');return}toast('Cynefin classification ready',s.title+' will be classified in the next step.')};allCards.onclick=()=>{compareMode=false;allCards.classList.add('active');compareCards.classList.remove('active');render()};compareCards.onclick=()=>{compareMode=true;compareCards.classList.add('active');allCards.classList.remove('active');render()};closeDrawer.onclick=()=>drawer.classList.remove('open');menuBtn?.addEventListener('click',()=>document.body.classList.add('sidebar-open'));overlay.onclick=()=>document.body.classList.remove('sidebar-open');render();\n<\/script>\n<script id=\"gs-cohesive-router-bridge\">\n(function(){\n  const targets = [[/design system|foundation/i,0],[/landing|login|home|start/i,1],[/organisation profile|organization profile|profile setup/i,2],[/evidence upload|data upload|evidence tagging|upload/i,3],[/three empathies|empathies/i,4],[/maturity assessment|25-category|25 category/i,5],[/maturity dashboard|dashboard/i,6],[/priority problem|problems/i,7],[/cynefin|classifier|classification/i,8],[/decision cascade/i,9],[/opportunity mapping/i,10],[/opportunity portfolio|leverage points|opportunities/i,11],[/prototype recommendation|prototypes/i,12],[/experiment card/i,13],[/business case/i,14],[/export|pdf|action plan/i,15]];\n  function matchPage(text){ text=(text||'').replace(/\\s+/g,' ').trim(); for(const [rx,n] of targets){ if(rx.test(text)) return n; } return null; }\n  function go(n){ if(parent && parent.gsNavigate){ parent.gsNavigate(n); } }\n  document.querySelectorAll('a').forEach(a=>{ const n=matchPage(a.textContent||a.getAttribute('aria-label')||''); if(n!==null){ a.href='javascript:void(0)'; a.addEventListener('click',e=>{e.preventDefault();go(n);}); }});\n  const ctas=[[/start new assessment|use demo workspace|continue$/i,0],[/continue to evidence upload/i,3],[/continue to maturity assessment/i,5],[/review priority problems/i,7],[/continue to cynefin|cynefin classification/i,8],[/continue to decision cascade/i,9],[/begin opportunity mapping/i,10],[/generate opportunity portfolio/i,11],[/continue to prototype recommendations/i,12],[/generate experiment card/i,13],[/generate business case/i,14],[/add to export package|export package|export pdf/i,15]];\n  document.querySelectorAll('button').forEach(btn=>{ const txt=(btn.textContent||'').replace(/\\s+/g,' ').trim(); for(const [rx,n] of ctas){ if(rx.test(txt)){ btn.title=(btn.title?btn.title+' · ':'')+'Double-click to move to the linked step'; btn.addEventListener('dblclick',()=>{ if(!btn.disabled) go(n); }); break; } } });\n})();\n<\/script>\n\n</body></html>"}, {"n": 8, "title": "Green Spectrum — Cynefin Problem Classifier", "html": "<!DOCTYPE html><html lang=\"en\"><head><meta charset=\"UTF-8\"><meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\"><title>Green Spectrum — Cynefin Problem Classifier</title><style>\n:root{--soft:#F7FAF7;--green:#1F7A4D;--dark:#0E3B2E;--light:#DFF3E6;--text:#17231D;--muted:#5B6B61;--border:#DDE7DF;--warn:#B7791F;--warnbg:#FFF7E6;--err:#B42318;--errbg:#FEF3F2;--succbg:#ECFDF3;--info:#2563EB;--infobg:#EFF6FF;--shadow:0 8px 24px rgba(14,59,46,.07);--r:12px;--rl:18px;--side:260px;--head:72px;--focus:0 0 0 3px rgba(31,122,77,.18);font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,\"Segoe UI\",sans-serif}*{box-sizing:border-box}body{margin:0;background:var(--soft);color:var(--text);font-family:inherit}button,select,textarea{font:inherit}button{cursor:pointer}a{text-decoration:none;color:inherit}:focus-visible{outline:none;box-shadow:var(--focus)}.app{display:grid;grid-template-columns:var(--side) 1fr;min-height:100vh}.sidebar{position:fixed;inset:0 auto 0 0;width:var(--side);background:#fff;border-right:1px solid var(--border);display:flex;flex-direction:column;z-index:40}.brand{height:var(--head);display:flex;align-items:center;gap:12px;padding:0 22px;border-bottom:1px solid var(--border)}.mark{width:38px;height:38px;border-radius:12px;background:var(--dark);color:white;display:grid;place-items:center;font-weight:850}.brand strong{display:block;font-size:15px}.brand span{display:block;color:var(--muted);font-size:12px}.nav{padding:16px 12px;overflow:auto;flex:1}.nav-title{font-size:11px;color:var(--muted);font-weight:850;text-transform:uppercase;letter-spacing:.08em;padding:12px 10px 8px}.nav-item{display:flex;gap:10px;align-items:center;padding:10px 12px;border-radius:10px;color:var(--muted);font-size:14px;font-weight:650;margin:2px 0}.nav-item.active,.nav-item:hover{background:var(--light);color:var(--dark)}.nav-icon{width:22px;height:22px;border-radius:7px;background:rgba(31,122,77,.08);color:var(--green);display:grid;place-items:center;font-size:12px}.side-foot{padding:14px;border-top:1px solid var(--border)}.workspace{background:var(--soft);border:1px solid var(--border);border-radius:var(--r);padding:12px}.workspace p{margin:5px 0 0;color:var(--muted);font-size:12px;line-height:1.45}.main{grid-column:2}.topbar{height:var(--head);position:sticky;top:0;background:rgba(255,255,255,.94);backdrop-filter:blur(14px);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 32px;z-index:30}.crumb{color:var(--muted);font-size:13px;margin-bottom:4px}.title{margin:0;font-size:20px;font-weight:780;letter-spacing:-.03em}.top-actions{display:flex;gap:10px;align-items:center}.avatar-pill{display:flex;gap:10px;align-items:center;padding:8px 10px;border:1px solid var(--border);border-radius:999px;background:white}.avatar{width:30px;height:30px;border-radius:999px;background:var(--dark);color:white;display:grid;place-items:center;font-size:12px;font-weight:850}.mobile-menu{display:none}.overlay{display:none;position:fixed;inset:0;background:rgba(14,59,46,.28);z-index:35}.content{padding:34px 40px 54px;max-width:1560px;margin:0 auto}.hero{display:flex;justify-content:space-between;gap:20px;align-items:flex-end;margin-bottom:18px}.eyebrow{display:inline-flex;gap:8px;align-items:center;background:var(--light);color:var(--dark);border-radius:999px;padding:6px 10px;font-size:12px;font-weight:850;margin-bottom:12px}.dot{width:8px;height:8px;border-radius:999px;background:var(--green)}.hero h2{font-size:34px;line-height:1.08;letter-spacing:-.055em;color:var(--dark);margin:0 0 8px}.hero p{margin:0;color:var(--muted);font-size:15px;line-height:1.6;max-width:860px}.badge{display:inline-flex;align-items:center;gap:6px;border-radius:999px;padding:5px 9px;font-size:12px;font-weight:850;border:1px solid transparent;white-space:nowrap}.badge-success{background:var(--succbg);color:var(--green);border-color:#BBF7D0}.badge-warning{background:var(--warnbg);color:var(--warn);border-color:#FED7AA}.badge-error{background:var(--errbg);color:var(--err);border-color:#FECDCA}.badge-info{background:var(--infobg);color:var(--info);border-color:#BFDBFE}.badge-neutral{background:var(--soft);color:var(--muted);border-color:var(--border)}.badge-dark{background:var(--dark);color:white}.btn{border:1px solid transparent;border-radius:10px;padding:10px 14px;display:inline-flex;align-items:center;justify-content:center;gap:8px;font-weight:800;font-size:14px;min-height:40px}.btn-primary{background:var(--green);color:white}.btn-primary:disabled{opacity:.5;cursor:not-allowed}.btn-secondary{background:var(--light);color:var(--dark);border-color:rgba(31,122,77,.16)}.btn-ghost{background:white;color:var(--text);border-color:var(--border)}.btn-sm{min-height:34px;padding:7px 10px;font-size:13px}.panel{background:white;border:1px solid var(--border);border-radius:var(--rl);box-shadow:var(--shadow)}.problem{padding:18px;margin-bottom:18px;display:grid;grid-template-columns:1fr auto;gap:18px}.problem h3{margin:0 0 8px;color:var(--dark);font-size:20px}.problem p{margin:0;color:var(--muted);font-size:14px;line-height:1.55}.layout{display:grid;grid-template-columns:minmax(0,1fr) 370px;gap:22px}.questions{padding:18px;margin-bottom:18px}.q{border:1px solid var(--border);border-radius:14px;padding:14px;margin-bottom:12px;background:#fff}.q h4{margin:0 0 8px;font-size:15px}.options{display:grid;grid-template-columns:repeat(5,1fr);gap:8px}.opt{border:1px solid var(--border);border-radius:10px;background:var(--soft);padding:9px;text-align:left;font-size:12px;font-weight:750}.opt.selected{border-color:var(--green);background:var(--light);box-shadow:var(--focus)}.domains{display:grid;grid-template-columns:repeat(5,1fr);gap:12px}.domain{padding:16px;text-align:left}.domain.active{border-color:var(--green);box-shadow:var(--focus)}.domain h4{margin:0 0 8px;color:var(--dark)}.domain p{margin:0;color:var(--muted);font-size:12px;line-height:1.45}.response{margin-top:12px;border:1px solid var(--border);border-radius:10px;background:var(--soft);padding:10px;font-size:12px;color:var(--muted)}.side{position:sticky;top:94px;display:grid;gap:14px}.side-card{padding:18px}.side-card h3{margin:0 0 10px;font-size:17px;letter-spacing:-.03em}.result{font-size:34px;font-weight:850;color:var(--dark);letter-spacing:-.04em}.bar{height:10px;background:var(--soft);border:1px solid var(--border);border-radius:999px;overflow:hidden}.fill{height:100%;background:var(--green);transition:.2s}.explain{color:var(--muted);font-size:13px;line-height:1.55}.metric{display:flex;justify-content:space-between;border-bottom:1px solid var(--border);padding:9px 0;color:var(--muted);font-size:13px}.metric:last-child{border:0}.metric strong{color:var(--dark)}.override{display:none;margin-top:12px}.override.show{display:grid;gap:8px}.textarea{width:100%;border:1px solid var(--border);border-radius:10px;padding:10px;min-height:88px;resize:vertical}.alert{border-radius:var(--r);border:1px solid var(--border);padding:13px 14px;display:flex;gap:10px;font-size:13px;line-height:1.5}.alert-warning{background:var(--warnbg);border-color:#FED7AA;color:#7C2D12}.alert-info{background:var(--infobg);border-color:#BFDBFE;color:#1E3A8A}.alert-success{background:var(--succbg);border-color:#BBF7D0;color:#14532D}.actions{position:sticky;bottom:0;margin-top:18px;background:rgba(247,250,247,.94);backdrop-filter:blur(12px);border:1px solid var(--border);border-radius:var(--rl);padding:14px;display:flex;justify-content:space-between;gap:12px;align-items:center}.toast-region{position:fixed;right:20px;bottom:20px;display:grid;gap:10px;z-index:120}.toast{width:min(390px,calc(100vw - 40px));border:1px solid var(--border);background:white;border-radius:var(--r);padding:13px 14px;box-shadow:0 10px 30px rgba(14,59,46,.08);display:flex;gap:12px}.toast-dot{width:10px;height:10px;border-radius:999px;background:var(--green);margin-top:5px}\n@media(max-width:1260px){.layout{grid-template-columns:1fr}.side{position:static}.domains{grid-template-columns:repeat(2,1fr)}.options{grid-template-columns:repeat(2,1fr)}}@media(max-width:900px){.app{grid-template-columns:1fr}.main{grid-column:1}.sidebar{transform:translateX(-100%);transition:.18s ease;box-shadow:var(--shadow)}body.sidebar-open .sidebar{transform:translateX(0)}body.sidebar-open .overlay{display:block}.mobile-menu{display:inline-flex}.topbar{padding:0 18px}.content{padding:24px 18px 42px}.avatar-pill{display:none}.hero,.problem,.actions{flex-direction:column;display:flex;align-items:flex-start}.domains,.options{grid-template-columns:1fr}.actions .btn{width:100%}}\n</style>\n\n<style id=\"gs-cohesive-inner-style\">\n  html, body { background:#F7FAF7 !important; min-width:0 !important; }\n  body { margin:0 !important; overflow-x:hidden !important; }\n  /* Hide original per-page chrome so the outer all-in-one shell is the only shell. */\n  .sidebar, aside.sidebar, .topbar, header.topbar, .overlay, .mobile-menu, .side-foot, .brand,\n  .skip-link, a[href=\"#main-content\"], body > header, .site-header, .app > aside:first-child,\n  .app-shell > aside:first-child, .mobile-overlay, .sidebar-footer, .side-footer {\n    display:none !important;\n  }\n  .app, .app-shell, .page { display:block !important; min-height:auto !important; grid-template-columns:1fr !important; }\n  .main, main.main, .main-wrapper { grid-column:1 !important; margin:0 !important; width:100% !important; min-width:0 !important; }\n  .content { padding:28px 34px 96px !important; max-width:1540px !important; margin:0 auto !important; }\n  .hero, .hero-panel { margin-top:0 !important; }\n  .hero-panel { grid-template-columns:minmax(0,1.35fr) minmax(280px,.65fr) !important; align-items:stretch !important; }\n  .section { scroll-margin-top:24px !important; }\n  .side, .rail, .preview-wrap, .section-nav, .checklist { top:18px !important; }\n  .toast-region { bottom:14px !important; right:14px !important; }\n  .drawer { top:0 !important; }\n  .token-grid { grid-template-columns:repeat(auto-fit,minmax(150px,1fr)) !important; }\n  .grid-4 { grid-template-columns:repeat(auto-fit,minmax(210px,1fr)) !important; }\n  .grid-3 { grid-template-columns:repeat(auto-fit,minmax(240px,1fr)) !important; }\n  .grid-2 { grid-template-columns:repeat(auto-fit,minmax(280px,1fr)) !important; }\n  table { min-width:720px; }\n  @media(max-width:1180px){ .hero-panel{grid-template-columns:1fr !important;} }\n  @media(max-width:900px){ .content{padding:22px 18px 96px !important;} .main,.main-wrapper{grid-column:1 !important;} }\n  @media(max-width:560px){ .content{padding:18px 14px 96px !important;} .hero-panel{padding:18px !important;} }\n  @media print{ .content{padding:0 !important;} }\n</style>\n\n\n</head><body><div class=\"overlay\" id=\"overlay\"></div><div class=\"app\"><aside class=\"sidebar\"><div class=\"brand\"><div class=\"mark\">GS</div><div><strong>Green Spectrum</strong><span>Decision Engine MVP</span></div></div><nav class=\"nav\"><div class=\"nav-title\">Workspace</div><a class=\"nav-item\" href=\"#\"><span class=\"nav-icon\">◼</span>Dashboard</a><a class=\"nav-item\" href=\"#\"><span class=\"nav-icon\">01</span>Organisation Profile</a><a class=\"nav-item\" href=\"#\"><span class=\"nav-icon\">02</span>Evidence Upload</a><a class=\"nav-item\" href=\"#\"><span class=\"nav-icon\">03</span>Three Empathies</a><a class=\"nav-item\" href=\"#\"><span class=\"nav-icon\">04</span>Maturity Assessment</a><a class=\"nav-item\" href=\"#\"><span class=\"nav-icon\">05</span>Maturity Dashboard</a><a class=\"nav-item\" href=\"#\"><span class=\"nav-icon\">06</span>Problems</a><a class=\"nav-item active\" href=\"#\"><span class=\"nav-icon\">07</span>Cynefin Classifier</a><a class=\"nav-item\" href=\"#\"><span class=\"nav-icon\">08</span>Decision Cascade</a><a class=\"nav-item\" href=\"#\"><span class=\"nav-icon\">09</span>Opportunities</a><a class=\"nav-item\" href=\"#\"><span class=\"nav-icon\">10</span>Export</a></nav><div class=\"side-foot\"><div class=\"workspace\"><strong>Complexity engine</strong><p>Classify response type before recommending action.</p></div></div></aside><main class=\"main\"><header class=\"topbar\"><div style=\"display:flex;align-items:center;gap:14px\"><button class=\"btn btn-ghost btn-sm mobile-menu\" id=\"menuBtn\">☰</button><div><div class=\"crumb\">Decision pathway / Cynefin classification</div><h1 class=\"title\">Cynefin Problem Classifier</h1></div></div><div class=\"top-actions\"><button class=\"btn btn-ghost btn-sm\" id=\"resetBtn\">Reset answers</button><button class=\"btn btn-secondary btn-sm\" id=\"overrideTop\">Manual override</button><div class=\"avatar-pill\"><div class=\"avatar\">AM</div><div style=\"line-height:1.1\"><div style=\"font-weight:800;font-size:13px\">Amara Mensah</div><div style=\"color:var(--muted);font-size:12px\">Chief Sustainability Officer</div></div></div></div></header><div class=\"content\"><section class=\"hero\"><div><span class=\"eyebrow\"><span class=\"dot\"></span> Step 7 of 14</span><h2>Classify the problem’s complexity before deciding how to act.</h2><p>The same sustainability issue can require a checklist, expert analysis, experimentation, triage, or clarification. This step matches the response to the problem type.</p></div><span class=\"badge badge-warning\" id=\"statusBadge\">Insufficient answers</span></section><section class=\"panel problem\"><div><span class=\"badge badge-warning\">Selected problem</span><h3>Value chain traceability is insufficient for Scope 3 confidence</h3><p>Supplier footprint visibility is not strong enough to support confident Scope 3 decisions or credible external disclosure. Priority score: <strong>92</strong>. Empathy domain: <strong>Planetary</strong>. Maturity: <strong>Light Green</strong>.</p></div><button class=\"btn btn-ghost\" id=\"changeProblem\">Change problem</button></section><div class=\"layout\"><div><section class=\"panel questions\"><h3 style=\"margin:0 0 12px\">Guided classification questions</h3><div id=\"questions\"></div></section><section class=\"domains\" id=\"domains\"></section><div class=\"actions\"><div class=\"explain\" id=\"actionCopy\">Answer at least four questions to generate a reliable classification.</div><button class=\"btn btn-primary\" id=\"continueBtn\" disabled>Continue to Decision Cascade</button></div></div><aside class=\"side\"><section class=\"panel side-card\"><h3>Live classification result</h3><div class=\"result\" id=\"result\">—</div><p class=\"explain\" id=\"why\">Answer the questions to identify whether this is Clear, Complicated, Complex, Chaotic, or Confused.</p><div class=\"bar\"><div class=\"fill\" id=\"confidenceFill\" style=\"width:0%\"></div></div><div class=\"metric\"><span>Confidence</span><strong id=\"confidenceText\">0%</strong></div><div class=\"metric\"><span>Recommended response</span><strong id=\"responseText\">—</strong></div></section><section class=\"panel side-card\"><h3>Manual override</h3><p>If leadership context contradicts the guided result, override the classification and explain why.</p><button class=\"btn btn-secondary\" id=\"overrideBtn\">Enable override</button><div class=\"override\" id=\"overrideBox\"><select id=\"overrideSelect\" class=\"textarea\" style=\"min-height:42px\"><option value=\"\">Select domain</option><option>Clear / Simple</option><option>Complicated</option><option>Complex</option><option>Chaotic</option><option>Confused / Disorder</option></select><textarea class=\"textarea\" id=\"overrideReason\" placeholder=\"Explain rationale for manual override.\"></textarea><button class=\"btn btn-primary\" id=\"applyOverride\">Apply override</button></div></section><section class=\"alert alert-warning\" id=\"warning\"><span>⚠</span><div><strong>Insufficient answers</strong>Classification may be unreliable until more signals are provided.</div></section><section class=\"alert alert-info\"><span>ⓘ</span><div><strong>Why this matters</strong>Complex problems should be prototyped and learned from; clear problems should use established practices.</div></section></aside></div></div></main></div><div class=\"toast-region\" id=\"toastRegion\"></div><script>\nconst domainInfo={Clear:{title:'Clear / Simple',signals:'Known problem, known solution, repeatable process, best practice exists.',response:'Checklists, standard procedures, established frameworks.'},Complicated:{title:'Complicated',signals:'Requires expert knowledge, several solution options, analysis and planning needed.',response:'Expert consultation, diagnostic analysis, modelling, benchmark comparison.'},Complex:{title:'Complex',signals:'Many stakeholders, unclear cause/effect, behavioural dynamics, emergent outcomes.',response:'Pilots, prototypes, feedback loops, iterative learning.'},Chaotic:{title:'Chaotic',signals:'Immediate disruption, crisis, breach, urgent stabilisation needed.',response:'Stabilise, triage, communicate, contain damage, then reassess.'},Confused:{title:'Confused / Disorder',signals:'Problem unclear, data missing, ownership unclear, stakeholders disagree.',response:'Clarify, map, gather data, define ownership.'}};\nconst qs=[['How well is the problem defined?',{Clear:'Very clearly defined',Complicated:'Mostly clear, needs expert analysis',Complex:'Defined, but causes are uncertain',Chaotic:'Currently unstable or urgent',Confused:'Not yet clearly defined'}],['Is there a known best-practice solution?',{Clear:'Yes, repeatable best practice exists',Complicated:'Several expert options exist',Complex:'No single correct solution',Chaotic:'No time for full analysis',Confused:'Unclear what solution applies'}],['How predictable is cause and effect?',{Clear:'Highly predictable',Complicated:'Knowable through analysis',Complex:'Emergent and uncertain',Chaotic:'Unpredictable due to disruption',Confused:'Not enough data to tell'}],['How many stakeholders must change behaviour?',{Clear:'Few stakeholders',Complicated:'Specialist stakeholders',Complex:'Many stakeholders with competing incentives',Chaotic:'Crisis response group',Confused:'Ownership is unclear'}],['What is the appropriate first response?',{Clear:'Use checklist or standard process',Complicated:'Commission expert analysis',Complex:'Run a low-risk pilot',Chaotic:'Stabilise immediately',Confused:'Clarify ownership and gather data'}],['What is the evidence condition?',{Clear:'Evidence is sufficient',Complicated:'Evidence needs expert interpretation',Complex:'Evidence must be generated through testing',Chaotic:'Evidence is changing rapidly',Confused:'Evidence is missing or contradictory'}]];\nconst scores={Clear:0,Complicated:0,Complex:0,Chaotic:0,Confused:0};const answers={};let override=false;function toast(t,m){const el=document.createElement('div');el.className='toast';el.innerHTML=`<div class=\"toast-dot\"></div><div><strong>${t}</strong><p style=\"margin:0;color:var(--muted);font-size:13px\">${m}</p></div>`;toastRegion.appendChild(el);setTimeout(()=>el.remove(),3600)}function renderQuestions(){questions.innerHTML=qs.map((q,i)=>`<div class=\"q\"><h4>${i+1}. ${q[0]}</h4><div class=\"options\">${Object.entries(q[1]).map(([k,v])=>`<button class=\"opt ${answers[i]===k?'selected':''}\" data-q=\"${i}\" data-d=\"${k}\">${v}</button>`).join('')}</div></div>`).join('')}function renderDomains(active){domains.innerHTML=Object.entries(domainInfo).map(([k,d])=>`<button class=\"panel domain ${active===k?'active':''}\" onclick=\"showDomain('${k}')\"><h4>${d.title}</h4><p>${d.signals}</p><div class=\"response\"><strong>Response:</strong> ${d.response}</div></button>`).join('')}function calculate(){Object.keys(scores).forEach(k=>scores[k]=0);Object.values(answers).forEach(v=>scores[v]++);const answered=Object.keys(answers).length;let top=Object.entries(scores).sort((a,b)=>b[1]-a[1])[0];const tied=Object.values(scores).filter(v=>v===top[1]&&v>0).length>1;if(!answered){result.textContent='—';why.textContent='Answer the questions to identify whether this is Clear, Complicated, Complex, Chaotic, or Confused.';responseText.textContent='—';confidenceFill.style.width='0%';confidenceText.textContent='0%';continueBtn.disabled=true;statusBadge.textContent='Insufficient answers';return}let conf=Math.round((top[1]/answered)*100);result.textContent=domainInfo[top[0]].title;responseText.textContent=domainInfo[top[0]].response.split(',')[0];confidenceFill.style.width=conf+'%';confidenceText.textContent=conf+'%';why.textContent=tied?'Signals are conflicting. Review assumptions or use manual override with rationale.':`Most answers indicate ${domainInfo[top[0]].signals.toLowerCase()} Recommended response: ${domainInfo[top[0]].response}`;continueBtn.disabled=answered<4;warning.style.display=answered<4||tied?'flex':'none';statusBadge.textContent=answered<4?'Insufficient answers':tied?'Conflicting signals':'Classification complete';statusBadge.className='badge '+(answered>=4&&!tied?'badge-success':'badge-warning');actionCopy.textContent=answered>=4?'Classification is ready for the Decision Cascade.':'Answer at least four questions to generate a reliable classification.';renderDomains(top[0])}function showDomain(k){result.textContent=domainInfo[k].title;why.textContent=`${domainInfo[k].signals} Recommended response: ${domainInfo[k].response}`;responseText.textContent=domainInfo[k].response.split(',')[0];renderDomains(k)}document.addEventListener('click',e=>{const o=e.target.closest('.opt');if(o){answers[o.dataset.q]=o.dataset.d;renderQuestions();calculate()}});overrideBtn.onclick=overrideTop.onclick=()=>{overrideBox.classList.toggle('show');toast('Manual override opened','Add a rationale if you override the guided classification.')};applyOverride.onclick=()=>{if(!overrideSelect.value||!overrideReason.value.trim()){toast('Override rationale required','Select a domain and explain why.');return}result.textContent=overrideSelect.value;why.textContent='Manual override applied: '+overrideReason.value;statusBadge.textContent='Manual override applied';statusBadge.className='badge badge-warning';continueBtn.disabled=false;warning.style.display='flex';toast('Manual override applied','Classification has been overridden with rationale.')};continueBtn.onclick=()=>toast('Decision Cascade ready','The selected problem and Cynefin classification will feed the next step.');resetBtn.onclick=()=>{Object.keys(answers).forEach(k=>delete answers[k]);renderQuestions();calculate();toast('Answers reset','Classification answers cleared.')};changeProblem.onclick=()=>toast('Problem selector','Return to Priority Problem List to choose a different problem.');menuBtn?.addEventListener('click',()=>document.body.classList.add('sidebar-open'));overlay.onclick=()=>document.body.classList.remove('sidebar-open');renderQuestions();renderDomains();calculate();\n<\/script>\n<script id=\"gs-cohesive-router-bridge\">\n(function(){\n  const targets = [[/design system|foundation/i,0],[/landing|login|home|start/i,1],[/organisation profile|organization profile|profile setup/i,2],[/evidence upload|data upload|evidence tagging|upload/i,3],[/three empathies|empathies/i,4],[/maturity assessment|25-category|25 category/i,5],[/maturity dashboard|dashboard/i,6],[/priority problem|problems/i,7],[/cynefin|classifier|classification/i,8],[/decision cascade/i,9],[/opportunity mapping/i,10],[/opportunity portfolio|leverage points|opportunities/i,11],[/prototype recommendation|prototypes/i,12],[/experiment card/i,13],[/business case/i,14],[/export|pdf|action plan/i,15]];\n  function matchPage(text){ text=(text||'').replace(/\\s+/g,' ').trim(); for(const [rx,n] of targets){ if(rx.test(text)) return n; } return null; }\n  function go(n){ if(parent && parent.gsNavigate){ parent.gsNavigate(n); } }\n  document.querySelectorAll('a').forEach(a=>{ const n=matchPage(a.textContent||a.getAttribute('aria-label')||''); if(n!==null){ a.href='javascript:void(0)'; a.addEventListener('click',e=>{e.preventDefault();go(n);}); }});\n  const ctas=[[/start new assessment|use demo workspace|continue$/i,0],[/continue to evidence upload/i,3],[/continue to maturity assessment/i,5],[/review priority problems/i,7],[/continue to cynefin|cynefin classification/i,8],[/continue to decision cascade/i,9],[/begin opportunity mapping/i,10],[/generate opportunity portfolio/i,11],[/continue to prototype recommendations/i,12],[/generate experiment card/i,13],[/generate business case/i,14],[/add to export package|export package|export pdf/i,15]];\n  document.querySelectorAll('button').forEach(btn=>{ const txt=(btn.textContent||'').replace(/\\s+/g,' ').trim(); for(const [rx,n] of ctas){ if(rx.test(txt)){ btn.title=(btn.title?btn.title+' · ':'')+'Double-click to move to the linked step'; btn.addEventListener('dblclick',()=>{ if(!btn.disabled) go(n); }); break; } } });\n})();\n<\/script>\n\n</body></html>"}, {"n": 9, "title": "Green Spectrum — Decision Cascade", "html": "<!DOCTYPE html><html lang=\"en\"><head><meta charset=\"UTF-8\"><meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\"><title>Green Spectrum — Decision Cascade</title><style>\n:root{--soft:#F7FAF7;--green:#1F7A4D;--dark:#0E3B2E;--light:#DFF3E6;--text:#17231D;--muted:#5B6B61;--border:#DDE7DF;--warn:#B7791F;--warnbg:#FFF7E6;--err:#B42318;--errbg:#FEF3F2;--succbg:#ECFDF3;--info:#2563EB;--infobg:#EFF6FF;--shadow:0 8px 24px rgba(14,59,46,.07);--r:12px;--rl:18px;--side:260px;--head:72px;--focus:0 0 0 3px rgba(31,122,77,.18);font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,\"Segoe UI\",sans-serif}*{box-sizing:border-box}body{margin:0;background:var(--soft);color:var(--text);font-family:inherit}button,input,textarea{font:inherit}button{cursor:pointer}a{text-decoration:none;color:inherit}:focus-visible{outline:none;box-shadow:var(--focus)}.app{display:grid;grid-template-columns:var(--side) 1fr;min-height:100vh}.sidebar{position:fixed;inset:0 auto 0 0;width:var(--side);background:#fff;border-right:1px solid var(--border);display:flex;flex-direction:column;z-index:40}.brand{height:var(--head);display:flex;align-items:center;gap:12px;padding:0 22px;border-bottom:1px solid var(--border)}.mark{width:38px;height:38px;border-radius:12px;background:var(--dark);color:#fff;display:grid;place-items:center;font-weight:850}.brand strong{display:block;font-size:15px}.brand span{display:block;color:var(--muted);font-size:12px}.nav{padding:16px 12px; r(--muted)}.toast-region{position:fixed;right:20px;bottom:20px;display:grid;gap:10px;z-index:120}.toast{width:min(390px,calc(100vw - 40px));border:1px solid var(--border);background:white;border-radius:var(--r);padding:13px 14px;box-shadow:0 10px 30px rgba(14,59,46,.08);display:flex;gap:12px}.toast-dot{width:10px;height:10px;border-radius:999px;background:var(--green);margin-top:5px}\n@media(max-width:1260px){.layout{grid-template-columns:1fr}.side{position:static;grid-template-columns:repeat(2,1fr)}}@media(max-width:900px){.app{grid-template-columns:1fr}.main{grid-column:1}.sidebar{transform:translateX(-100%);transition:.18s ease;box-shadow:var(--shadow)}body.sidebar-open .sidebar{transform:translateX(0)}body.sidebar-open .overlay{display:block}.mobile-menu{display:inline-flex}.topbar{padding:0 18px}.content{padding:24px 18px 42px}.avatar-pill{display:none}.hero,.problem,.actions{flex-direction:column;display:flex;align-items:flex-start}.side{grid-template-columns:1fr}.actions .btn{width:100%}.input-row{flex-direction:column}}@media(max-width:560px){.hero h2{font-size:28px}.top-actions .btn-ghost{display:none}}\n</style>\n\n<style id=\"gs-cohesive-inner-style\">\n  html, body { background:#F7FAF7 !important; min-width:0 !important; }\n  body { margin:0 !important; overflow-x:hidden !important; }\n  /* Hide original per-page chrome so the outer all-in-one shell is the only shell. */\n  .sidebar, aside.sidebar, .topbar, header.topbar, .overlay, .mobile-menu, .side-foot, .brand,\n  .skip-link, a[href=\"#main-content\"], body > header, .site-header, .app > aside:first-child,\n  .app-shell > aside:first-child, .mobile-overlay, .sidebar-footer, .side-footer {\n    display:none !important;\n  }\n  .app, .app-shell, .page { display:block !important; min-height:auto !important; grid-template-columns:1fr !important; }\n  .main, main.main, .main-wrapper { grid-column:1 !important; margin:0 !important; width:100% !important; min-width:0 !important; }\n  .content { padding:28px class=\"nav-icon\">05</span>Maturity Dashboard</a><a class=\"nav-item\" href=\"#\"><span class=\"nav-icon\">06</span>Problems</a><a class=\"nav-item\" href=\"#\"><span class=\"nav-icon\">07</span>Cynefin Classifier</a><a class=\"nav-item active\" href=\"#\"><span class=\"nav-icon\">08</span>Decision Cascade</a><a class=\"nav-item\" href=\"#\"><span class=\"nav-icon\">09</span>Opportunities</a><a class=\"nav-item\" href=\"#\"><span class=\"nav-icon\">10</span>Export</a></nav><div class=\"side-foot\"><div class=\"workspace\"><strong>Decision engine</strong><p>Turn complexity classification into a practical next-step pathway.</p></div></div></aside><main class=\"main\"><header class=\"topbar\"><div style=\"display:flex;align-items:center;gap:14px\"><button class=\"btn btn-ghost btn-sm mobile-menu\" id=\"menuBtn\">☰</button><div><div class=\"crumb\">Decision pathway / Cascade</div><h1 class=\"title\">Decision Cascade</h1></div></div><div class=\"top-actions\"><button class=\"btn btn-ghost btn-sm\" id=\"noProblemBtn\">No problem state</button><button class=\"btn btn-secondary btn-sm\" id=\"summaryTop\">Generate summary</button><div class=\"avatar-pill\"><div class=\"avatar\">AM</div><div style=\"line-height:1.1\"><div style=\"font-weight:800;font-size:13px\">Amara Mensah</div><div style=\"color:var(--muted);font-size:12px\">Chief Sustainability Officer</div></div></div></div></header><div class=\"content\"><section class=\"hero\"><div><span class=\"eyebrow\"><span class=\"dot\"></span> Step 8 of 14</span><h2>Convert classification into a defensible decision pathway.</h2><p>The cascade tells the CSO what to do first, who to involve, what evidence is missing, what risks to manage, and what output to create.</p></div><span class=\"badge badge-success\" id=\"cascadeStatus\">Cascade generated</span></section><section class=\"panel problem\" id=\"problemHeader\"><div><span class=\"badge badge-warning\">Selected problem · Complex</span><h3>Value chain traceability is insufficient for Scope 3 confidence</h3><p>Supplier footprint visibility is not strong enough to support confident Scope 3 decisions or credible external disclosure. The Cynefin classifier indicates a <strong>Complex</strong> response: prototype, learn, iterate.</p></div><button class=\"btn btn-ghost\" id=\"changeProblem\">Change problem</button></section><section class=\"panel empty\" id=\"emptyState\"><h3>No selected problem</h3><p>Select a priority problem and complete Cynefin classification before generating a decision cascade.</p></section><div class=\"layout\" id=\"mainLayout\"><div><section class=\"cascade\" id=\"cascade\"></section><div class=\"actions\"><div style=\"color:var(--muted);font-size:13px\" id=\"actionCopy\">Review missing information and generate the cascade summary before opportunity mapping.</div><div style=\"display:flex;gap:10px;flex-wrap:wrap\"><button class=\"btn btn-secondary\" id=\"summaryBtn\">Generate cascade summary</button><button class=\"btn btn-primary\" id=\"continueBtn\">Begin opportunity mapping</button></div></div></div><aside class=\"side\"><section class=\"alert alert-warning\" id=\"missingWarning\"><span>⚠</span><div><strong>Missing information warning</strong>Supplier-level emissions quality and ownership model still need follow-up.</div></section><section class=\"alert alert-warning\"><span>⚠</span><div><strong>Low confidence recommendation warning</strong>Recommendations are credible for exploration, but evidence must improve before board approval.</div></section><section class=\"panel side-card\"><h3>Missing information</h3><div class=\"missing-list\" id=\"missingList\"></div></section><section class=\"panel side-card\"><h3>Stakeholders to involve</h3><div class=\"stakeholder-list\" id=\"stakeholders\"></div><div class=\"input-row\"><input class=\"input\" id=\"stakeholderInput\" placeholder=\"Add stakeholder\"><button class=\"btn btn-secondary\" id=\"addStakeholder\">Add</button></div></section><section class=\"panel side-card\"><h3>Recommended tools</h3><div class=\"tool-list\"><div class=\"row\"><span>Supplier data audit</span><strong>Immediate</strong></div><div class=\"row\"><span>Traceability map</span><strong>Workshop</strong></div><div class=\"row\"><span>Scope 3 evidence matrix</span><strong>Template</strong></div></div></section><section class=\"panel side-card\"><h3>Risk panel</h3><div class=\"risk-list\"><div class=\"row\"><span>Supplier resistance</span><strong>Medium</strong></div><div class=\"row\"><span>Data inconsistency</span><strong>High</strong></div><div class=\"row\"><span>Board overconfidence</span><strong>Medium</strong></div></div></section><section class=\"panel side-card\"><h3>Output package preview</h3><div class=\"output-list\"><div class=\"row\"><span>Decision memo</span><strong>Included</strong></div><div class=\"row\"><span>Evidence gap list</span><strong>Included</strong></div><div class=\"row\"><span>Prototype brief</span><strong>Next</strong></div></div><div class=\"summary-box\" id=\"summaryBox\"></div></section></aside></div></div></main></div><div class=\"toast-region\" id=\"toastRegion\"></div><script>\nconst answers=['The organisation lacks reliable supplier-level traceability for Scope 3 decisions and disclosure confidence.','Light Green — Measure & Reduce, because basic reporting exists but traceability is not embedded.','Planetary Empathy, with Business dependencies across procurement, data, finance, and governance.','Complex: many suppliers, unclear cause/effect, behavioural incentives, and uncertain data quality.','Experiment-and-learn decision: define what to test before scaling a full traceability programme.','Run a low-risk supplier traceability pilot, combine data audit with stakeholder engagement, and learn iteratively.','Supplier data quality, owner for supplier engagement, priority supplier segments, assurance requirements, and budget range.','Start with a 4-week supplier data audit and traceability mapping sprint for the highest-impact category.','Procurement, supply chain, sustainability, finance, operations, legal/compliance, and selected supplier partners.','Supplier data audit, Scope 3 evidence matrix, stakeholder map, traceability journey map, and pilot design canvas.','Supplier resistance, incomplete data, false precision, regulatory misinterpretation, and over-scaling before evidence.','Decision memo, evidence gap register, supplier pilot brief, prototype plan, and leadership update.','Immediate supplier questionnaire test, data quality audit, traceability dashboard mock-up, and procurement behaviour pilot.','Data completeness, supplier response rates, confidence scores, category coverage, and decision usefulness feedback.','Success means the CSO can identify which supplier categories are traceable, where evidence is weak, and what prototype should be run next.'];\nconst qs=['What is the problem?','Which maturity level does it belong to?','Which empathy domain does it affect?','Which Cynefin domain does it fall into?','What decision type is required?','What best-practice response is appropriate?','What information is missing?','What should the CSO do first?','Who needs to be involved?','What tools should be used?','What risks need to be managed?','What outputs should be created?','What experiments should be run?','What evidence should be collected?','What would success look like?'];\nconst missing=['Supplier emissions data quality','Priority supplier segment owner','Assurance expectations','Supplier engagement constraints'];let noProblem=false;function toast(t,m){const el=document.createElement('div');el.className='toast';el.innerHTML=`<div class=\"toast-dot\"></div><div><strong>${t}</strong><p style=\"margin:0;color:var(--muted);font-size:13px\">${m}</p></div>`;toastRegion.appendChild(el);setTimeout(()=>el.remove(),3600)}function renderCascade(){cascade.innerHTML=qs.map((q,i)=>`<article class=\"panel card ${i<3?'open':''}\"><button class=\"card-head\"><div class=\"head-left\"><div class=\"num\">${i+1}</div><div><div class=\"qtitle\">${q}</div><div class=\"qhint\">Decision cascade answer ${i+1}</div></div></div><span class=\"badge badge-neutral\">Expand</span></button><div class=\"card-body\">${answers[i]}</div></article>`).join('')}function renderMissing(){missingList.innerHTML=missing.map((m,i)=>`<div class=\"row ${m.known?'known':''}\"><span>${m.text||m}</span><button class=\"btn btn-ghost btn-sm\" onclick=\"toggleKnown(${i})\">${m.known?'Known':'Needs follow-up'}</button></div>`).join('');const open=missing.filter(m=>!m.known).length;missingWarning.style.display=open?'flex':'none'}function renderStakeholders(){const list=['Procurement Lead','Supply Chain Lead','Sustainability Manager','Finance Partner','Legal / Compliance','Selected suppliers'];stakeholders.innerHTML=list.map(s=>`<div class=\"row\"><span>${s}</span><strong>Involve</strong></div>`).join('')}function toggleKnown(i){if(typeof missing[i]==='string')missing[i]={text:missing[i],known:false};missing[i].known=!missing[i].known;renderMissing();toast('Missing information updated',missing[i].known?'Marked as known.':'Marked for follow-up.')}document.addEventListener('click',e=>{const h=e.target.closest('.card-head');if(h)h.parentElement.classList.toggle('open')});function generateSummary(){summaryBox.classList.add('show');summaryBox.innerHTML='<strong>Cascade summary generated</strong><br>The selected problem requires a complex response: begin with supplier traceability mapping, involve procurement and supply chain leaders, collect data quality evidence, and design a low-risk pilot before scaling.';cascadeStatus.textContent='Cascade summary ready';toast('Cascade generated','Decision cascade summary is ready for opportunity mapping.')}summaryBtn.onclick=summaryTop.onclick=generateSummary;continueBtn.onclick=()=>toast('Opportunity mapping ready','The decision cascade will now feed the opportunity mapping process.');changeProblem.onclick=()=>toast('Change problem','Return to Priority Problem List to select another problem.');noProblemBtn.onclick=()=>{noProblem=!noProblem;problemHeader.style.display=noProblem?'none':'grid';mainLayout.style.display=noProblem?'none':'grid';emptyState.style.display=noProblem?'block':'none';cascadeStatus.textContent=noProblem?'No selected problem':'Cascade generated'};addStakeholder.onclick=()=>{if(!stakeholderInput.value.trim()){toast('Stakeholder required','Enter a stakeholder name first.');return}const div=document.createElement('div');div.className='row';div.innerHTML=`<span>${stakeholderInput.value}</span><strong>Added</strong>`;stakeholders.appendChild(div);stakeholderInput.value='';toast('Stakeholder added','Stakeholder added to involvement list.')};menuBtn?.addEventListener('click',()=>document.body.classList.add('sidebar-open'));overlay.onclick=()=>document.body.classList.remove('sidebar-open');renderCascade();renderMissing();renderStakeholders();\n<\/script>\n<script id=\"gs-cohesive-router-bridge\">\n(function(){\n  const targets = [[/design system|foundation/i,0],[/landing|login|home|start/i,1],[/organisation profile|organization profile|profile setup/i,2],[/evidence upload|data upload|evidence tagging|upload/i,3],[/three empathies|empathies/i,4],[/maturity assessment|25-category|25 category/i,5],[/maturity dashboard|dashboard/i,6],[/priority problem|problems/i,7],[/cynefin|classifier|classification/i,8],[/decision cascade/i,9],[/opportunity mapping/i,10],[/opportunity portfolio|leverage points|opportunities/i,11],[/prototype recommendation|prototypes/i,12],[/experiment card/i,13],[/business case/i,14],[/export|pdf|action plan/i,15]];\n  function matchPage(text){ text=(text||'').replace(/\\s+/g,' ').trim(); for(const [rx,n] of targets){ if(rx.test(text)) return n; } return null; }\n  function go(n){ if(parent && parent.gsNavigate){ parent.gsNavigate(n); } }\n  document.querySelectorAll('a').forEach(a=>{ const n=matchPage(a.textContent||a.getAttribute('aria-label')||''); if(n!==null){ a.href='javascript:void(0)'; a.addEventListener('click',e=>{e.preventDefault();go(n);}); }});\n  const ctas=[[/start new assessment|use demo workspace|continue$/i,0],[/continue to evidence upload/i,3],[/continue to maturity assessment/i,5],[/review priority problems/i,7],[/continue to cynefin|cynefin classification/i,8],[/continue to decision cascade/i,9],[/begin opportunity mapping/i,10],[/generate opportunity portfolio/i,11],[/continue to prototype recommendations/i,12],[/generate experiment card/i,13],[/generate business case/i,14],[/add to export package|export package|export pdf/i,15]];\n  document.querySelectorAll('button').forEach(btn=>{ const txt=(btn.textContent||'').replace(/\\s+/g,' ').trim(); for(const [rx,n] of ctas){ if(rx.test(txt)){ btn.title=(btn.title?btn.title+' · ':'')+'Double-click to move to the linked step'; btn.addEventListener('dblclick',()=>{ if(!btn.disabled) go(n); }); break; } } });\n})();\n<\/script>\n\n</body></html>"}, {"n": 10, "title": "Green Spectrum — Opportunity Mapping", "html": "<!DOCTYPE html><html lang=\"en\"><head><meta charset=\"UTF-8\"><meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\"><title>Green Spectrum — Opportunity Mapping</title><style>\n:root{--soft:#F7FAF7;--green:#1F7A4D;--dark:#0E3B2E;--light:#DFF3E6;--text:#17231D;--muted:#5B6B61;--border:#DDE7DF;--warn:#B7791F;--warnbg:#FFF7E6;--err:#B42318;--errbg:#FEF3F2;--succbg:#ECFDF3;--info:#2563EB;--infobg:#EFF6FF;--shadow:0 8px 24px rgba(14,59,46,.07);--r:12px;--rl:18px;--side:260px;--head:72px;--focus:0 0 0 3px rgba(31,122,77,.18);font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,\"Segoe UI\",sans-serif}*{box-sizing:border-box}body{margin:0;background:var(--soft);color:var(--text);font-family:inherit}button,textarea,input{font:inherit}button{cursor:pointer}a{text-decoration:none;color:inherit}:focus-visible{outline:none;box-shadow:var(--focus)}.app{display:grid;grid-template-columns:var(--side) 1fr;min-height:100vh}.sidebar{position:fixed;inset:0 auto 0 0
