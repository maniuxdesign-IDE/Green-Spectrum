y shell. */\n  .sidebar, aside.sidebar, .topbar, header.topbar, .overlay, .mobile-menu, .side-foot, .brand,\n  .skip-link, a[href=\"#main-content\"], body > header, .site-header, .app > aside:first-child,\n  .app-shell > aside:first-child, .mobile-overlay, .sidebar-footer, .side-footer {\n    display:none !important;\n  }\n  .app, .app-shell, .page { display:block !important; min-height:auto !important; grid-template-columns:1fr !important; }\n  .main, main.main, .main-wrapper { grid-column:1 !important; margin:0 !important; width:100% !important; min-width:0 !important; }\n  .content { padding:28px 34px 96px !important; max-width:1540px !important; margin:0 auto !important; }\n  .hero, .hero-panel { margin-top:0 !important; }\n  .hero-panel { grid-template-columns:minmax(0,1.35fr) minmax(280px,.65fr) !important; align-items:stretch !important; }\n  .section { scroll-margin-top:24px !important; }\n  .side, .rail, .preview-wrap, .section-nav, .checklist { top:18px !important; }\n  .toast-region { bottom:14px !important; right:14px !important; }\n  .drawer { top:0 !important; }\n  .token-grid { grid-template-columns:repeat(auto-fit,minmax(150px,1fr)) !important; }\n  .grid-4 { grid-template-columns:repeat(auto-fit,minmax(210px,1fr)) !important; }\n  .grid-3 { grid-template-columns:repeat(auto-fit,minmax(240px,1fr)) !important; }\n  .grid-2 { grid-template-columns:repeat(auto-fit,minmax(280px,1fr)) !important; }\n  table { min-width:720px; }\n  @media(max-width:1180px){ .hero-panel{grid-template-columns:1fr !important;} }\n  @media(max-width:900px){ .content{padding:22px 18px 96px !important;} .main,.main-wrapper{grid-column:1 !important;} }\n  @media(max-width:560px){ .content{padding:18px 14px 96px !important;} .hero-panel{padding:18px !important;} }\n  @media print{ .content{padding:0 !important;} }\n</style>\n\n\n</head>\n<body>\n  <div class=\"overlay\" id=\"overlay\"></div>\n  <div class=\"app\">\n    <aside class=\"sidebar\" id=\"sidebar\">\n      <div class=\"brand\"><div class=\"mark\">GS</div><div><strong>Green Spectrum</strong><span>Decision Engine MVP</span></div></div>\n      <nav class=\"nav\" aria-label=\"Workspace navigation\">\n        <div class=\"nav-title\">Workspace</div>\n        <a class=\"nav-item\" href=\"#\"><span class=\"nav-icon\">◼</span>Dashboard</a>\n        <a class=\"nav-item\" href=\"#\"><span class=\"nav-icon\">01</span>Organisation Profile</a>\n        <a class=\"nav-item\" href=\"#\"><span class=\"nav-icon\">02</span>Evidence Upload</a>\n        <a class=\"nav-item active\" href=\"#\"><span class=\"nav-icon\">03</span>Three Empathies</a>\n        <a class=\"nav-item\" href=\"#\"><span class=\"nav-icon\">04</span>Maturity Assessment</a>\n        <a class=\"nav-item\" href=\"#\"><span class=\"nav-icon\">05</span>Problems</a>\n        <a class=\"nav-item\" href=\"#\"><span class=\"nav-icon\">06</span>Decision Cascade</a>\n        <a class=\"nav-item\" href=\"#\"><span class=\"nav-icon\">07</span>Opportunities</a>\n        <a class=\"nav-item\" href=\"#\"><span class=\"nav-icon\">08</span>Prototypes</a>\n        <a class=\"nav-item\" href=\"#\"><span class=\"nav-icon\">09</span>Business Case</a>\n        <a class=\"nav-item\" href=\"#\"><span class=\"nav-icon\">10</span>Export</a>\n      </nav>\n      <div class=\"side-foot\"><div class=\"workspace\"><strong>Diagnostic workspace</strong><p>Capture Human, Business, and Planetary evidence before maturity scoring.</p></div></div>\n    </aside>\n    <main class=\"main\">\n      <header class=\"topbar\">\n        <div style=\"display:flex;align-items:center;gap:14px;min-width:0\"><button class=\"btn btn-ghost btn-sm mobile-menu\" id=\"menuBtn\">☰</button><div><div class=\"crumb\">Assessment setup / Three Empathies</div><h1 class=\"title\">Three Empathies Diagnostic</h1></div></div>\n        <div class=\"top-actions\"><button class=\"btn btn-ghost btn-sm\" id=\"checkBtn\">Check domains</button><button class=\"btn btn-secondary btn-sm\" id=\"saveTopBtn\">Save diagnostic</button><div class=\"avatar-pill\"><div class=\"avatar\">AM</div><div style=\"line-height:1.1\"><div style=\"font-weight:800;font-size:13px\">Amara Mensah</div><div style=\"color:var(--muted);font-size:12px\">Chief Sustainability Officer</div></div></div></div>\n      </header>\n      <div class=\"content\">\n        <section class=\"hero\">\n          <div><span class=\"eyebrow\"><span class=\"dot\"></span> Step 3 of 14</span><h2>Diagnose sustainability through three lenses.</h2><p>Answer a focused set of questions across Human, Business, and Planetary Empathy. The diagnostic reduces survey fatigue by turning responses into a clear maturity profile and priority signals.</p></div>\n          <span class=\"badge badge-warning\" id=\"pageStatus\">Diagnostic incomplete</span>\n        </section>\n        <div class=\"layout\">\n          <div>\n            <section class=\"panel progress-panel\">\n              <div class=\"progress-head\"><strong>Diagnostic progress</strong><span id=\"progressLabel\">0 / 12 answered</span></div>\n              <div class=\"track\"><div class=\"fill\" id=\"progressFill\" style=\"width:0%\"></div></div>\n            </section>\n            <div class=\"domain-tabs\" id=\"tabs\"></div>\n            <section class=\"panel domain-intro\" id=\"domainIntro\"></section>\n            <div class=\"alert alert-warning warning-inline\" id=\"domainWarning\"><span>⚠</span><div><strong>Incomplete domain</strong>Answer all four questions in this empathy domain before moving forward.</div></div>\n            <section class=\"question-list\" id=\"questionList\"></section>\n            <div class=\"actions\">\n              <div class=\"action-copy\" id=\"actionCopy\">Answer each domain to build a credible maturity profile.</div>\n              <div style=\"display:flex;gap:10px;flex-wrap:wrap\"><button class=\"btn btn-ghost\" id=\"saveBtn\">Save diagnostic</button><button class=\"btn btn-primary\" id=\"continueBtn\" disabled>Continue to maturity assessment</button></div>\n            </div>\n          </div>\n          <aside class=\"help\">\n            <section class=\"panel help-card\">\n              <h3>How to answer calmly</h3>\n              <p>Choose the maturity option that best reflects current evidence, not aspiration. Add short notes where the answer may need validation.</p>\n              <ul class=\"help-list\">\n                <li><span class=\"dot\"></span><div><strong>Human Empathy</strong>People, culture, incentives, wellbeing, equity, and adoption readiness.</div></li>\n                <li><span class=\"dot\"></span><div><strong>Business Empathy</strong>Governance, budget, viability, risk, resilience, and strategy integration.</div></li>\n                <li><span class=\"dot\"></span><div><strong>Planetary Empathy</strong>Climate, biodiversity, circularity, pollution, waste, and planetary boundaries.</div></li>\n              </ul>\n            </section>\n            <section class=\"panel help-card\">\n              <h3>Domain completion</h3>\n              <div class=\"status-list\" id=\"statusList\"></div>\n            </section>\n            <section class=\"panel help-card\">\n              <h3>Diagnostic summary</h3>\n              <div class=\"metric\"><span>Questions answered</span><strong id=\"answeredMetric\">0</strong></div>\n              <div class=\"metric\"><span>Priority concerns</span><strong id=\"priorityMetric\">0</strong></div>\n              <div class=\"metric\"><span>Low confidence answers</span><strong id=\"lowMetric\">0</strong></div>\n              <div class=\"metric\"><span>Average maturity</span><strong id=\"avgMetric\">—</strong></div>\n            </section>\n            <section class=\"alert alert-warning\" id=\"lowConfidenceWarning\"><span>⚠</span><div><strong>Low confidence warning</strong>Some diagnostic answers may need stronger evidence before board-level use.</div></section>\n          </aside>\n        </div>\n      </div>\n    </main>\n  </div>\n  <div class=\"toast-region\" id=\"toastRegion\" aria-live=\"polite\" aria-atomic=\"true\"></div>\n<script>\nconst domains={\n  human:{name:'Human Empathy',short:'Culture, incentives, leadership, community, wellbeing, equity, and adoption readiness.',definition:'Measures culture, employee incentives and barriers, leadership alignment, community impact, customer empowerment, wellbeing, equity, and internal adoption readiness.',questions:[\n    ['Leadership and cultural alignment','How clearly do leaders connect sustainability to everyday decisions, incentives, and behaviour?'],\n    ['Employee capability and engagement','How prepared are employees to participate in sustainability transformation rather than simply receive communications?'],\n    ['Stakeholder and community voice','How consistently are affected stakeholders, communities, customers, and employees involved in shaping sustainability priorities?'],\n    ['Equity, wellbeing, and adoption readiness','How well are wellbeing, equity, justice, and adoption barriers considered before launching sustainability interventions?']\n  ]},\n  business:{name:'Business Empathy',short:'Strategy, governance, budget, viability, risk, innovation, resilience, and regulation.',definition:'Measures strategic alignment, governance, budget and investment, operational integration, commercial viability, financial incentives, risk exposure, innovation readiness, supply chain resilience, and regulatory preparedness.',questions:[\n    ['Strategic alignment and governance','How strongly is sustainability embedded in core business strategy, governance rhythms, and board-level decision-making?'],\n    ['Budget and investment readiness','How clearly are sustainability investments funded, prioritised, and evaluated against business value and risk?'],\n    ['Operational integration','How consistently are sustainability goals translated into procurement, operations, finance, product, and performance management?'],\n    ['Risk, resilience, and regulatory preparedness','How ready is the organisation to respond to sustainability-related regulation, market shifts, and value-chain disruption?']\n  ]},\n  planetary:{name:'Planetary Empathy',short:'Climate, biodiversity, resources, circularity, pollution, waste, footprint, and boundaries.',definition:'Measures climate impact, biodiversity impact, resource use, circularity, pollution, waste, ecosystem health, supply chain footprint, environmental risk, and planetary boundaries alignment.',questions:[\n    ['Climate impact visibility','How complete and actionable is the organisation’s view of Scope 1, 2, and 3 emissions and decarbonisation priorities?'],\n    ['Resource use and circularity','How well does the organisation design out waste, reduce resource intensity, and move toward circular value flows?'],\n    ['Biodiversity and ecosystem impact','How clearly are biodiversity, land use, water, pollution, and ecosystem dependencies understood and managed?'],\n    ['Supply chain and planetary boundaries','How well are supplier footprints, environmental risk, and planetary boundary considerations integrated into decisions?']\n  ]}\n};\nconst levels=[['White / Awareness','No reliable system yet; activity is reactive or fragmented.',0,'white'],['Light Green / Measure & Reduce','Basic measurement, compliance, and harm reduction are in place.',1,'light'],['Mid Green / Embed & Integrate','Sustainability is integrated into systems, roles, and operations.',2,'mid'],['Dark Green / Regenerate & Transform','The organisation creates regenerative value and systems leadership.',3,'dark']];\nconst state={active:'human',answers:{}};Object.keys(domains).forEach(d=>domains[d].questions.forEach((_,i)=>state.answers[`${d}-${i}`]={level:null,notes:'',confidence:'',priority:false}));\nconst tabs=document.getElementById('tabs'), intro=document.getElementById('domainIntro'), list=document.getElementById('questionList'), toastRegion=document.getElementById('toastRegion');\nfunction toast(title,msg){const t=document.createElement('div');t.className='toast';t.innerHTML=`<div class=\"toast-dot\"></div><div><strong>${title}</strong><p>${msg}</p></div>`;toastRegion.appendChild(t);setTimeout(()=>{t.style.opacity='0';t.style.transform='translateY(8px)';t.style.transition='opacity .18s ease, transform .18s ease';setTimeout(()=>t.remove(),220)},3600)}\nfunction domainAnswered(d){return domains[d].questions.filter((_,i)=>state.answers[`${d}-${i}`].level!==null).length}\nfunction renderTabs(){tabs.innerHTML='';Object.keys(domains).forEach(key=>{const d=domains[key];const btn=document.createElement('button');btn.className='tab'+(state.active===key?' active':'');btn.innerHTML=`<div class=\"tab-top\"><span class=\"badge ${domainAnswered(key)===4?'badge-success':'badge-neutral'}\">${domainAnswered(key)}/4 answered</span><span class=\"tab-count\">${key==='human'?'01':key==='business'?'02':'03'}</span></div><h3>${d.name}</h3><p>${d.short}</p>`;btn.onclick=()=>{state.active=key;render()};tabs.appendChild(btn)})}\nfunction renderIntro(){const d=domains[state.active];intro.innerHTML=`<div><h3>${d.name}</h3><p>${d.definition}</p></div><span class=\"badge ${domainAnswered(state.active)===4?'badge-success':'badge-warning'}\">${domainAnswered(state.active)} / 4 complete</span>`}\nfunction renderQuestions(){list.innerHTML='';domains[state.active].questions.forEach((q,i)=>{const id=`${state.active}-${i}`, a=state.answers[id];const card=document.createElement('article');card.className='panel q-card';card.innerHTML=`<div class=\"q-head\"><div><h4>${q[0]}</h4><p>${q[1]}</p></div><span class=\"badge ${a.level!==null?'badge-success':'badge-neutral'}\">${a.level!==null?'Answered':'No answer'}</span></div><div class=\"maturity-grid\">${levels.map(l=>`<button class=\"maturity ${l[3]} ${a.level===l[2]?'selected':''}\" data-id=\"${id}\" data-level=\"${l[2]}\"><div class=\"level-dot\"></div><strong>${l[0]}</strong><span>${l[1]}</span></button>`).join('')}</div><div class=\"q-meta\"><div class=\"field\"><label>Evidence notes</label><textarea class=\"textarea\" data-id=\"${id}\" data-field=\"notes\" placeholder=\"Add short evidence notes, assumptions, or follow-up needs.\">${a.notes}</textarea></div><div class=\"field\"><label>Confidence</label><select class=\"select\" data-id=\"${id}\" data-field=\"confidence\"><option value=\"\">Select confidence</option><option ${a.confidence==='Low'?'selected':''}>Low</option><option ${a.confidence==='Medium'?'selected':''}>Medium</option><option ${a.confidence==='High'?'selected':''}>High</option></select></div><label class=\"toggle-card\"><input type=\"checkbox\" data-id=\"${id}\" data-field=\"priority\" ${a.priority?'checked':''}> Mark as priority concern</label></div>`;list.appendChild(card)});}\nfunction updateSummary(){const all=Object.values(state.answers);const answered=all.filter(a=>a.level!==null).length;const priority=all.filter(a=>a.priority).length;const low=all.filter(a=>a.confidence==='Low').length;document.getElementById('answeredMetric').textContent=answered;document.getElementById('priorityMetric').textContent=priority;document.getElementById('lowMetric').textContent=low;const levelsOnly=all.filter(a=>a.level!==null).map(a=>a.level);document.getElementById('avgMetric').textContent=levelsOnly.length?(levelsOnly.reduce((s,v)=>s+v,0)/levelsOnly.length).toFixed(1)+' / 3':'—';document.getElementById('progressLabel').textContent=`${answered} / 12 answered`;document.getElementById('progressFill').style.width=Math.round(answered/12*100)+'%';const complete=answered===12;document.getElementById('continueBtn').disabled=!complete;document.getElementById('pageStatus').textContent=complete?'Ready for maturity assessment':'Diagnostic incomplete';document.getElementById('pageStatus').className='badge '+(complete?'badge-success':'badge-warning');document.getElementById('actionCopy').textContent=complete?'Diagnostic complete. Continue to the 25-category maturity assessment.':'Answer each domain to build a credible maturity profile.';document.getElementById('lowConfidenceWarning').style.display=low?'flex':'none';document.getElementById('domainWarning').classList.toggle('show',domainAnswered(state.active)<4);const status=document.getElementById('statusList');status.innerHTML='';Object.keys(domains).forEach(k=>{const item=document.createElement('div');item.className='status-item';item.innerHTML=`<span>${domains[k].name}</span><strong>${domainAnswered(k)}/4</strong>`;status.appendChild(item)});}\nfunction render(){renderTabs();renderIntro();renderQuestions();updateSummary()}\ndocument.addEventListener('click',e=>{const m=e.target.closest('.maturity');if(m){state.answers[m.dataset.id].level=Number(m.dataset.level);render();}});\ndocument.addEventListener('input',e=>{const id=e.target.dataset.id, field=e.target.dataset.field;if(id&&field){state.answers[id][field]=e.target.value;updateSummary();}});\ndocument.addEventListener('change',e=>{const id=e.target.dataset.id, field=e.target.dataset.field;if(id&&field){state.answers[id][field]=field==='priority'?e.target.checked:e.target.value;updateSummary();}});\ndocument.getElementById('saveBtn').onclick=()=>toast('Diagnostic saved','Your Three Empathies diagnostic has been saved for this prototype session.');\ndocument.getElementById('saveTopBtn').onclick=()=>toast('Diagnostic saved','Partial diagnostic answers can be saved before all domains are complete.');\ndocument.getElementById('checkBtn').onclick=()=>{const incomplete=Object.keys(domains).filter(k=>domainAnswered(k)<4);toast(incomplete.length?'Incomplete domains':'Diagnostic complete', incomplete.length?`Complete: ${incomplete.map(k=>domains[k].name).join(', ')}.`:'All empathy domains are ready for maturity scoring.');};\ndocument.getElementById('continueBtn').onclick=()=>{toast('Maturity assessment unlocked','The Three Empathies diagnostic is ready to inform the 25-category assessment.');};\ndocument.getElementById('menuBtn')?.addEventListener('click',()=>document.body.classList.add('sidebar-open'));document.getElementById('overlay').onclick=()=>document.body.classList.remove('sidebar-open');document.addEventListener('keydown',e=>{if(e.key==='Escape')document.body.classList.remove('sidebar-open')});\nrender();\n<\/script>\n\n<script id=\"gs-cohesive-router-bridge\">\n(function(){\n  const targets = [[/design system|foundation/i,0],[/landing|login|home|start/i,1],[/organisation profile|organization profile|profile setup/i,2],[/evidence upload|data upload|evidence tagging|upload/i,3],[/three empathies|empathies/i,4],[/maturity assessment|25-category|25 category/i,5],[/maturity dashboard|dashboard/i,6],[/priority problem|problems/i,7],[/cynefin|classifier|classification/i,8],[/decision cascade/i,9],[/opportunity mapping/i,10],[/opportunity portfolio|leverage points|opportunities/i,11],[/prototype recommendation|prototypes/i,12],[/experiment card/i,13],[/business case/i,14],[/export|pdf|action plan/i,15]];\n  function matchPage(text){ text=(text||'').replace(/\\s+/g,' ').trim(); for(const [rx,n] of targets){ if(rx.test(text)) return n; } return null; }\n  function go(n){ if(parent && parent.gsNavigate){ parent.gsNavigate(n); } }\n  document.querySelectorAll('a').forEach(a=>{ const n=matchPage(a.textContent||a.getAttribute('aria-label')||''); if(n!==null){ a.href='javascript:void(0)'; a.addEventListener('click',e=>{e.preventDefault();go(n);}); }});\n  const ctas=[[/start new assessment|use demo workspace|continue$/i,0],[/continue to evidence upload/i,3],[/continue to maturity assessment/i,5],[/review priority problems/i,7],[/continue to cynefin|cynefin classification/i,8],[/continue to decision cascade/i,9],[/begin opportunity mapping/i,10],[/generate opportunity portfolio/i,11],[/continue to prototype recommendations/i,12],[/generate experiment card/i,13],[/generate business case/i,14],[/add to export package|export package|export pdf/i,15]];\n  document.querySelectorAll('button').forEach(btn=>{ const txt=(btn.textContent||'').replace(/\\s+/g,' ').trim(); for(const [rx,n] of ctas){ if(rx.test(txt)){ btn.title=(btn.title?btn.title+' · ':'')+'Double-click to move to the linked step'; btn.addEventListener('dblclick',()=>{ if(!btn.disabled) go(n); }); break; } } });\n})();\n<\/script>\n\n</body>\n</html>"}, {"n": 5, "title": "Green Spectrum — 25-Category Maturity Assessment", "html": "<!DOCTYPE html>\n<html lang=\"en\"><head><meta charset=\"UTF-8\"><meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\"><title>Green Spectrum — 25-Category Maturity Assessment</title><style>\n:root{--bg:#fff;--soft:#F7FAF7;--green:#1F7A4D;--dark:#0E3B2E;--mid:#5DBB7A;--light:#DFF3E6;--text:#17231D;--muted:#5B6B61;--border:#DDE7DF;--warn:#B7791F;--warnbg:#FFF7E6;--err:#B42318;--errbg:#FEF3F2;--succbg:#ECFDF3;--info:#2563EB;--infobg:#EFF6FF;--shadow:0 8px 24px rgba(14,59,46,.07);--r:12px;--rl:18px;--side:260px;--head:72px;--focus:0 0 0 3px rgba(31,122,77,.18);font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,\"Segoe UI\",sans-serif}*{box-sizing:border-box}body{margin:0;background:var(--soft);color:var(--text);font-family:inherit}button,input,select,textarea{font:inherit}button{cursor:pointer}a{text-decoration:none;color:inherit}:focus-visible{outline:none;box-shadow:var(--focus)}.app{display:grid;grid-template-columns:var(--side) 1fr;min-height:100vh}.sidebar{position:fixed;inset:0 auto 0 0;width:var(--side);background:#fff;border-right:1px solid var(--border);display:flex;flex-direction:column;z-index:40}.brand{height:var(--head);display:flex;align-items:center;gap:12px;padding:0 22px;border-bottom:1px solid var(--border)}.mark{width:38px;height:38px;border-radius:12px;background:var(--dark);color:white;display:grid;place-items:center;font-weight:850}.brand strong{display:block;font-size:15px}.brand span{display:block;color:var(--muted);font-size:12px}.nav{padding:16px 12px;overflow:auto;flex:1}.nav-title{font-size:11px;color:var(--muted);font-weight:850;text-transform:uppercase;letter-spacing:.08em;padding:12px 10px 8px}.nav-item{display:flex;gap:10px;align-items:center;padding:10px 12px;border-radius:10px;color:var(--muted);font-size:14px;font-weight:650;margin:2px 0}.nav-item.active,.nav-item:hover{background:var(--light);color:var(--dark)}.nav-icon{width:22px;height:22px;border-radius:7px;background:rgba(31,122,77,.08);color:var(--green);display:grid;place-items:center;font-size:12px}.side-foot{padding:14px;border-top:1px solid var(--border)}.workspace{background:var(--soft);border:1px solid var(--border);border-radius:var(--r);padding:12px}.workspace p{margin:5px 0 0;color:var(--muted);font-size:12px;line-height:1.45}.main{grid-column:2;min-width:0}.topbar{height:var(--head);position:sticky;top:0;background:rgba(255,255,255,.94);backdrop-filter:blur(14px);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 32px;z-index:30}.crumb{color:var(--muted);font-size:13px;margin-bottom:4px}.title{margin:0;font-size:20px;font-weight:780;letter-spacing:-.03em}.top-actions{display:flex;gap:10px;align-items:center}.avatar-pill{display:flex;gap:10px;align-items:center;padding:8px 10px;border:1px solid var(--border);border-radius:999px;background:white}.avatar{width:30px;height:30px;border-radius:999px;background:var(--dark);color:white;display:grid;place-items:center;font-size:12px;font-weight:850}.mobile-menu{display:none}.overlay{display:none;position:fixed;inset:0;background:rgba(14,59,46,.28);z-index:35}.content{padding:34px 40px 54px;max-width:1540px;margin:0 auto}.hero{display:flex;justify-content:space-between;gap:20px;align-items:flex-end;margin-bottom:18px}.eyebrow{display:inline-flex;gap:8px;align-items:center;background:var(--light);color:var(--dark);border-radius:999px;padding:6px 10px;font-size:12px;font-weight:850;margin-bottom:12px}.dot{width:8px;height:8px;border-radius:999px;background:var(--green)}.hero h2{font-size:34px;line-height:1.08;letter-spacing:-.055em;color:var(--dark);margin:0 0 8px}.hero p{margin:0;color:var(--muted);font-size:15px;line-height:1.6;max-width:860px}.badge{display:inline-flex;align-items:center;gap:6px;border-radius:999px;padding:5px 9px;font-size:12px;font-weight:850;border:1px solid transparent;white-space:nowrap}.badge-success{background:var(--succbg);color:var(--green);border-color:#BBF7D0}.badge-warning{background:var(--warnbg);color:var(--warn);border-color:#FED7AA}.badge-info{background:var(--infobg);color:var(--info);border-color:#BFDBFE}.badge-neutral{background:var(--soft);color:var(--muted);border-color:var(--border)}.layout{display:grid;grid-template-columns:minmax(0,1fr) 350px;gap:22px;align-items:start}.panel{background:white;border:1px solid var(--border);border-radius:var(--rl);box-shadow:var(--shadow)}.progress-panel{padding:18px;margin-bottom:18px}.progress-head{display:flex;justify-content:space-between;margin-bottom:10px}.track{height:10px;background:var(--soft);border:1px solid var(--border);border-radius:999px;overflow:hidden}.fill{height:100%;background:var(--green);transition:.22s ease}.tabs{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:16px}.tab{border:1px solid var(--border);background:white;border-radius:999px;padding:9px 12px;font-size:13px;font-weight:800;color:var(--muted)}.tab.active{background:var(--light);color:var(--dark);border-color:rgba(31,122,77,.3)}.group{margin-bottom:14px}.group-head{width:100%;background:white;border:1px solid var(--border);border-radius:var(--rl);padding:16px 18px;text-align:left;display:flex;justify-content:space-between;align-items:center;box-shadow:var(--shadow)}.group-title{font-weight:850;font-size:16px}.group-copy{font-size:13px;color:var(--muted);margin-top:3px}.group.done .group-head{background:linear-gradient(180deg,#fff,var(--soft))}.group-body{display:none;background:white;border:1px solid var(--border);border-top:0;border-radius:0 0 var(--rl) var(--rl);padding:16px}.group.open .group-body{display:block}.group.open .group-head{border-radius:var(--rl) var(--rl) 0 0}.cat-card{border:1px solid var(--border);border-radius:14px;padding:16px;margin-bottom:12px;background:#fff}.cat-card.priority{border-color:#FED7AA;background:#FFFCF5}.cat-top{display:flex;justify-content:space-between;gap:14px;margin-bottom:12px}.cat-title{font-weight:850}.cat-sub{color:var(--muted);font-size:12px;margin-top:4px}.maturity{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:12px}.maturity button{border:1px solid var(--border);border-radius:12px;background:white;padding:10px;text-align:left;min-height:74px}.maturity button.selected{border-color:var(--green);box-shadow:var(--focus)}.maturity strong{display:block;font-size:12px}.maturity span{display:block;font-size:11px;color:var(--muted);margin-top:3px}.meta{display:grid;grid-template-columns:minmax(0,1fr) 180px 170px;gap:10px}.field{display:grid;gap:6px}.field label{font-size:12px;font-weight:850}.textarea,.select{width:100%;border:1px solid var(--border);border-radius:10px;padding:9px 10px;background:white}.textarea{min-height:68px;resize:vertical}.toggle{display:flex;gap:8px;align-items:flex-start;border:1px solid var(--border);border-radius:10px;background:var(--soft);padding:10px;font-size:13px;font-weight:750}.toggle input{accent-color:var(--green)}.btn{border:1px solid transparent;border-radius:10px;padding:10px 14px;display:inline-flex;align-items:center;justify-content:center;gap:8px;font-weight:800;font-size:14px;min-height:40px}.btn-primary{background:var(--green);color:white}.btn-primary:disabled{opacity:.5;cursor:not-allowed}.btn-secondary{background:var(--light);color:var(--dark);border-color:rgba(31,122,77,.16)}.btn-ghost{background:white;color:var(--text);border-color:var(--border)}.btn-sm{min-height:34px;padding:7px 10px;font-size:13px}.actions{position:sticky;bottom:0;margin-top:18px;background:rgba(247,250,247,.94);backdrop-filter:blur(12px);border:1px solid var(--border);border-radius:var(--rl);padding:14px;display:flex;justify-content:space-between;gap:12px;align-items:center}.action-copy{font-size:13px;color:var(--muted)}.side{position:sticky;top:94px;display:grid;gap:14px}.side-card{padding:18px}.side-card h3{margin:0 0 8px;font-size:17px;letter-spacing:-.03em}.side-card p{margin:0;color:var(--muted);font-size:13px;line-height:1.55}.metric{display:flex;justify-content:space-between;border-bottom:1px solid var(--border);padding:10px 0;color:var(--muted);font-size:13px}.metric:last-child{border:0}.metric strong{color:var(--dark)}.alert{border-radius:var(--r);border:1px solid var(--border);padding:13px 14px;display:flex;gap:10px;font-size:13px;line-height:1.5}.alert-warning{background:var(--warnbg);border-color:#FED7AA;color:#7C2D12}.alert-info{background:var(--infobg);border-color:#BFDBFE;color:#1E3A8A}.toast-region{position:fixed;right:20px;bottom:20px;display:grid;gap:10px;z-index:120}.toast{width:min(390px,calc(100vw - 40px));border:1px solid var(--border);background:white;border-radius:var(--r);padding:13px 14px;box-shadow:0 10px 30px rgba(14,59,46,.08);display:flex;gap:12px}.toast-dot{width:10px;height:10px;border-radius:999px;background:var(--green);margin-top:5px}.empty{padding:24px;text-align:center;color:var(--muted)}\n@media(max-width:1220px){.layout{grid-template-columns:1fr}.side{position:static;grid-template-columns:repeat(2,1fr)}.meta{grid-template-columns:1fr}.maturity{grid-template-columns:repeat(2,1fr)}}@media(max-width:860px){.app{grid-template-columns:1fr}.main{grid-column:1}.sidebar{transform:translateX(-100%);transition:.18s ease;box-shadow:var(--shadow)}body.sidebar-open .sidebar{transform:translateX(0)}body.sidebar-open .overlay{display:block}.mobile-menu{display:inline-flex}.topbar{padding:0 18px}.content{padding:24px 18px 42px}.avatar-pill{display:none}.side{grid-template-columns:1fr}.hero{flex-direction:column;align-items:flex-start}.actions{flex-direction:column;align-items:stretch}.actions .btn{width:100%}}@media(max-width:560px){.hero h2{font-size:28px}.maturity{grid-template-columns:1fr}.top-actions .btn-ghost{display:none}}\n  </style>\n\n<style id=\"gs-cohesive-inner-style\">\n  html, body { background:#F7FAF7 !important; min-width:0 !important; }\n  body { margin:0 !important; overflow-x:hidden !important; }\n  /* Hide original per-page chrome so the outer all-in-one shell is the only shell. */\n  .sidebar, aside.sidebar, .topbar, header.topbar, .overlay, .mobile-menu, .side-foot, .brand,\n  .skip-link, a[href=\"#main-content\"], body > header, .site-header, .app > aside:first-child,\n  .app-shell > aside:first-child, .mobile-overlay, .sidebar-footer, .side-footer {\n    display:none !important;\n  }\n  .app, .app-shell, .page { display:block !important; min-height:auto !important; grid-template-columns:1fr !important; }\n  .main, main.main, .main-wrapper { grid-column:1 !important; margin:0 !important; width:100% !important; min-width:0 !important; }\n  .content { padding:28px 34px 96px !important; max-width:1540px !important; margin:0 auto !important; }\n  .hero, .hero-panel { margin-top:0 !important; }\n  .hero-panel { grid-template-columns:minmax(0,1.35fr) minmax(280px,.65fr) !important; align-items:stretch !important; }\n  .section { scroll-margin-top:24px !important; }\n  .side, .rail, .preview-wrap, .section-nav, .checklist { top:18px !important; }\n  .toast-region { bottom:14px !important; right:14px !important; }\n  .drawer { top:0 !important; }\n  .token-grid { grid-template-columns:repeat(auto-fit,minmax(150px,1fr)) !important; }\n  .grid-4 { grid-template-columns:repeat(auto-fit,minmax(210px,1fr)) !important; }\n  .grid-3 { grid-template-columns:repeat(auto-fit,minmax(240px,1fr)) !important; }\n  .grid-2 { grid-template-columns:repeat(auto-fit,minmax(280px,1fr)) !important; }\n  table { min-width:720px; }\n  @media(max-width:1180px){ .hero-panel{grid-template-columns:1fr !important;} }\n  @media(max-width:900px){ .content{padding:22px 18px 96px !important;} .main,.main-wrapper{grid-column:1 !important;} }\n  @media(max-width:560px){ .content{padding:18px 14px 96px !important;} .hero-panel{padding:18px !important;} }\n  @media print{ .content{padding:0 !important;} }\n</style>\n\n\n</head><body><div class=\"overlay\" id=\"overlay\"></div><div class=\"app\"><aside class=\"sidebar\"><div class=\"brand\"><div class=\"mark\">GS</div><div><strong>Green Spectrum</strong><span>Decision Engine MVP</span></div></div><nav class=\"nav\"><div class=\"nav-title\">Workspace</div><a class=\"nav-item\" href=\"#\"><span class=\"nav-icon\">◼</span>Dashboard</a><a class=\"nav-item\" href=\"#\"><span class=\"nav-icon\">01</span>Organisation Profile</a><a class=\"nav-item\" href=\"#\"><span class=\"nav-icon\">02</span>Evidence Upload</a><a class=\"nav-item\" href=\"#\"><span class=\"nav-icon\">03</span>Three Empathies</a><a class=\"nav-item active\" href=\"#\"><span class=\"nav-icon\">04</span>Maturity Assessment</a><a class=\"nav-item\" href=\"#\"><span class=\"nav-icon\">05</span>Problems</a><a class=\"nav-item\" href=\"#\"><span class=\"nav-icon\">06</span>Decision Cascade</a><a class=\"nav-item\" href=\"#\"><span class=\"nav-icon\">07</span>Opportunities</a><a class=\"nav-item\" href=\"#\"><span class=\"nav-icon\">08</span>Prototypes</a><a class=\"nav-item\" href=\"#\"><span class=\"nav-icon\">09</span>Business Case</a><a class=\"nav-item\" href=\"#\"><span class=\"nav-icon\">10</span>Export</a></nav><div class=\"side-foot\"><div class=\"workspace\"><strong>Assessment workspace</strong><p>Score 25 categories from White to Dark Green.</p></div></div></aside><main class=\"main\"><header class=\"topbar\"><div style=\"display:flex;align-items:center;gap:14px\"><button class=\"btn btn-ghost btn-sm mobile-menu\" id=\"menuBtn\">☰</button><div><div class=\"crumb\">Assessment / 25-category maturity scoring</div><h1 class=\"title\">25-Category Maturity Assessment</h1></div></div><div class=\"top-actions\"><button class=\"btn btn-ghost btn-sm\" id=\"collapseDone\">Collapse completed</button><button class=\"btn btn-secondary btn-sm\" id=\"saveBtn\">Save assessment</button><div class=\"avatar-pill\"><div class=\"avatar\">AM</div><div style=\"line-height:1.1\"><div style=\"font-weight:800;font-size:13px\">Amara Mensah</div><div style=\"color:var(--muted);font-size:12px\">Chief Sustainability Officer</div></div></div></div></header><div class=\"content\"><section class=\"hero\"><div><span class=\"eyebrow\"><span class=\"dot\"></span> Step 4 of 14</span><h2>Score maturity across the full Green Spectrum model.</h2><p>Assess 25 maturity categories without survey fatigue. Each score updates the preview, highlights confidence gaps, and prepares the priority problem engine.</p></div><span class=\"badge badge-warning\" id=\"pageStatus\">Assessment empty</span></section><div class=\"layout\"><div><section class=\"panel progress-panel\"><div class=\"progress-head\"><strong>Assessment completion</strong><span id=\"progressLabel\">0 / 25 scored · ~25 min remaining</span></div><div class=\"track\"><div class=\"fill\" id=\"progressFill\" style=\"width:0%\"></div></div></section><div class=\"tabs\"><button class=\"tab active\" data-filter=\"All\">All categories</button><button class=\"tab\" data-filter=\"Business\">Business</button><button class=\"tab\" data-filter=\"Human\">Human</button><button class=\"tab\" data-filter=\"Planetary\">Planetary</button><button class=\"tab\" data-filter=\"Priority\">Priority flagged</button></div><div id=\"groups\"></div><div class=\"actions\"><div class=\"action-copy\" id=\"actionCopy\">Score at least 15 categories to calculate a preliminary maturity profile.</div><div style=\"display:flex;gap:10px;flex-wrap:wrap\"><button class=\"btn btn-ghost\" id=\"validateBtn\">Validate</button><button class=\"btn btn-primary\" id=\"calculateBtn\" disabled>Calculate maturity profile</button></div></div></div><aside class=\"side\"><section class=\"panel side-card\"><h3>Score preview</h3><p>White = 0, Light Green = 1, Mid Green = 2, Dark Green = 3.</p><div class=\"metric\"><span>Categories scored</span><strong id=\"scoredMetric\">0</strong></div><div class=\"metric\"><span>Overall maturity</span><strong id=\"overallMetric\">—</strong></div><div class=\"metric\"><span>Human score</span><strong id=\"humanMetric\">—</strong></div><div class=\"metric\"><span>Business score</span><strong id=\"businessMetric\">—</strong></div><div class=\"metric\"><span>Planetary score</span><strong id=\"planetaryMetric\">—</strong></div><div class=\"metric\"><span>Priority flags</span><strong id=\"priorityMetric\">0</strong></div><div class=\"metric\"><span>Low confidence</span><strong id=\"lowMetric\">0</strong></div></section><section class=\"alert alert-info\"><span>ⓘ</span><div><strong>How the score is used</strong>Results feed maturity dashboard, problem flags, priority ranking, and prototype recommendations.</div></section><section class=\"alert alert-warning\" id=\"partialWarning\"><span>⚠</span><div><strong>Partial completion</strong>You can preview progress, but a credible profile requires broad category coverage.</div></section><section class=\"alert alert-warning\" id=\"lowWarning\"><span>⚠</span><div><strong>Low confidence warning</strong>Some categories may need stronger evidence notes before board-ready use.</div></section></aside></div></div></main></div><div class=\"toast-region\" id=\"toastRegion\"></div><script>\nconst categories=[['Strategy and Purpose Alignment','Business'],['Governance and Leadership','Business'],['Organisational Culture and Engagement','Human'],['Stakeholder Engagement and Co-Design','Human'],['Materiality and Systems Risk Mapping','Planetary'],['Transparency and Accountability','Planetary'],['Metrics and Impact Measurement','Planetary'],['Product and Service Innovation','Planetary'],['Operational Integration and Circularity','Planetary'],['Finance, Budgeting and Investment','Business'],['Data Systems and Digital Enablement','Business'],['Policy and Regulatory Alignment','Business'],['Collaboration and Ecosystem Partnerships','Business'],['Behavioural Change and Internal Incentives','Human'],['Customer Empowerment and Engagement','Human'],['Ecosystem Stewardship and Regeneration','Planetary'],['Value Chain Integration and Traceability','Planetary'],['Circular Design and Materials Strategy','Planetary'],['Climate and Biodiversity Integration','Planetary'],['Innovation Capacity and R&D Alignment','Business'],['Human and Community Wellbeing','Human'],['Learning and Adaptation Mechanisms','Business'],['Crisis Readiness and Resilience','Business'],['Equity, Justice and Inclusion','Human'],['Regenerative Business Identity and Influence','Business']];\nconst groups={Business:'Strategy, governance, finance, data, policy, partnerships, innovation and resilience.',Human:'Culture, stakeholder engagement, behaviour, customers, wellbeing, equity and justice.',Planetary:'Materiality, transparency, metrics, innovation, circularity, ecosystems, value chain and climate.'};\nconst levels=[['White','Awareness',0],['Light Green','Measure & Reduce',1],['Mid Green','Embed & Integrate',2],['Dark Green','Regenerate & Transform',3]];let filter='All';const state=categories.map((c,i)=>({id:i+1,name:c[0],domain:c[1],level:null,confidence:'',notes:'',priority:false}));\nfunction toast(t,m){const el=document.createElement('div');el.className='toast';el.innerHTML=`<div class=\"toast-dot\"></div><div><strong>${t}</strong><p style=\"margin:0;color:var(--muted);font-size:13px\">${m}</p></div>`;toastRegion.appendChild(el);setTimeout(()=>el.remove(),3600)}\nfunction badge(d){return `<span class=\"badge ${d==='Human'?'badge-info':d==='Business'?'badge-success':'badge-warning'}\">${d}</span>`}\nfunction render(){const root=document.getElementById('groups');root.innerHTML='';Object.keys(groups).forEach(g=>{let items=state.filter(x=>x.domain===g&&(filter==='All'||filter===g||(filter==='Priority'&&x.priority)));if(!items.length)return;const complete=items.every(x=>x.level!==null);const sec=document.createElement('section');sec.className='group open '+(complete?'done':'');sec.innerHTML=`<button class=\"group-head\"><div><div class=\"group-title\">${g} categories</div><div class=\"group-copy\">${groups[g]}</div></div><span class=\"badge ${complete?'badge-success':'badge-neutral'}\">${items.filter(x=>x.level!==null).length}/${items.length}</span></button><div class=\"group-body\">${items.map(catCard).join('')}</div>`;root.appendChild(sec)});update()}\nfunction catCard(c){return `<article class=\"cat-card ${c.priority?'priority':''}\" data-card=\"${c.id}\"><div class=\"cat-top\"><div><div class=\"cat-title\">${c.id}. ${c.name}</div><div class=\"cat-sub\">${badge(c.domain)}</div></div><span class=\"badge ${c.level!==null?'badge-success':'badge-neutral'}\">${c.level!==null?'Score '+c.level:'Unscored'}</span></div><div class=\"maturity\">${levels.map(l=>`<button class=\"maturity-btn ${c.level===l[2]?'selected':''}\" data-id=\"${c.id}\" data-level=\"${l[2]}\"><strong>${l[0]} = ${l[2]}</strong><span>${l[1]}</span></button>`).join('')}</div><div class=\"meta\"><div class=\"field\"><label>Evidence note</label><textarea class=\"textarea\" data-id=\"${c.id}\" data-field=\"notes\" placeholder=\"Add evidence, assumption, or gap for this category.\">${c.notes}</textarea></div><div class=\"field\"><label>Data confidence</label><select class=\"select\" data-id=\"${c.id}\" data-field=\"confidence\"><option value=\"\">Select</option><option ${c.confidence==='Low'?'selected':''}>Low</option><option ${c.confidence==='Medium'?'selected':''}>Medium</option><option ${c.confidence==='High'?'selected':''}>High</option></select></div><label class=\"toggle\"><input type=\"checkbox\" data-id=\"${c.id}\" data-field=\"priority\" ${c.priority?'checked':''}> Priority flag</label></div></article>`}\nfunction avg(arr){const v=arr.filter(x=>x.level!==null).map(x=>x.level);return v.length?(v.reduce((a,b)=>a+b,0)/v.length).toFixed(1)+' / 3':'—'}\nfunction update(){const scored=state.filter(x=>x.level!==null).length, pct=Math.round(scored/25*100), low=state.filter(x=>x.confidence==='Low').length, priority=state.filter(x=>x.priority).length;progressLabel.textContent=`${scored} / 25 scored · ~${Math.max(0,(25-scored))*2} min remaining`;progressFill.style.width=pct+'%';scoredMetric.textContent=scored;overallMetric.textContent=avg(state);humanMetric.textContent=avg(state.filter(x=>x.domain==='Human'));businessMetric.textContent=avg(state.filter(x=>x.domain==='Business'));planetaryMetric.textContent=avg(state.filter(x=>x.domain==='Planetary'));priorityMetric.textContent=priority;lowMetric.textContent=low;calculateBtn.disabled=scored<15;pageStatus.textContent=scored===0?'Assessment empty':scored<15?'Partial assessment':'Score preview ready';pageStatus.className='badge '+(scored>=15?'badge-success':scored?'badge-warning':'badge-neutral');actionCopy.textContent=scored>=15?'Enough categories scored for a preliminary maturity profile.':'Score at least 15 categories to calculate a preliminary maturity profile.';partialWarning.style.display=scored<25?'flex':'none';lowWarning.style.display=low?'flex':'none'}\ndocument.addEventListener('click',e=>{const mb=e.target.closest('.maturity-btn');if(mb){state[mb.dataset.id-1].level=Number(mb.dataset.level);render()}const gh=e.target.closest('.group-head');if(gh){gh.parentElement.classList.toggle('open')}});document.addEventListener('input',e=>{const id=e.target.dataset.id,field=e.target.dataset.field;if(id&&field){state[id-1][field]=e.target.value;update()}});document.addEventListener('change',e=>{const id=e.target.dataset.id,field=e.target.dataset.field;if(id&&field){state[id-1][field]=field==='priority'?e.target.checked:e.target.value;render()}});document.querySelectorAll('.tab').forEach(t=>t.onclick=()=>{document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));t.classList.add('active');filter=t.dataset.filter;render()});saveBtn.onclick=()=>toast('Assessment saved','Maturity responses are saved for this prototype session.');validateBtn.onclick=()=>{const scored=state.filter(x=>x.level!==null).length;toast(scored>=15?'Validation passed':'More scoring needed',scored>=15?'You can calculate a preliminary profile.':'Score at least 15 categories before calculation.')};calculateBtn.onclick=()=>toast('Maturity profile calculated','Score preview is ready for the maturity dashboard.');collapseDone.onclick=()=>{document.querySelectorAll('.group.done').forEach(g=>g.classList.remove('open'));toast('Completed sections collapsed','Assessment fatigue mitigation applied.')};menuBtn?.addEventListener('click',()=>document.body.classList.add('sidebar-open'));overlay.onclick=()=>document.body.classList.remove('sidebar-open');render();\n<\/script>\n<script id=\"gs-cohesive-router-bridge\">\n(function(){\n  const targets = [[/design system|foundation/i,0],[/landing|login|home|start/i,1],[/organisation profile|organization profile|profile setup/i,2],[/evidence upload|data upload|evidence tagging|upload/i,3],[/three empathies|empathies/i,4],[/maturity assessment|25-category|25 category/i,5],[/maturity dashboard|dashboard/i,6],[/priority problem|problems/i,7],[/cynefin|classifier|classification/i,8],[/decision cascade/i,9],[/opportunity mapping/i,10],[/opportunity portfolio|leverage points|opportunities/i,11],[/prototype recommendation|prototypes/i,12],[/experiment card/i,13],[/business case/i,14],[/export|pdf|action plan/i,15]];\n  function matchPage(text){ text=(text||'').replace(/\\s+/g,' ').trim(); for(const [rx,n] of targets){ if(rx.test(text)) return n; } return null; }\n  function go(n){ if(parent && parent.gsNavigate){ parent.gsNavigate(n); } }\n  document.querySelectorAll('a').forEach(a=>{ const n=matchPage(a.textContent||a.getAttribute('aria-label')||''); if(n!==null){ a.href='javascript:void(0)'; a.addEventListener('click',e=>{e.preventDefault();go(n);}); }});\n  const ctas=[[/start new assessment|use demo workspace|continue$/i,0],[/continue to evidence upload/i,3],[/continue to maturity assessment/i,5],[/review priority problems/i,7],[/continue to cynefin|cynefin classification/i,8],[/continue to decision cascade/i,9],[/begin opportunity mapping/i,10],[/generate opportunity portfolio/i,11],[/continue to prototype recommendations/i,12],[/generate experiment card/i,13],[/generate business case/i,14],[/add to export package|export package|export pdf/i,15]];\n  document.querySelectorAll('button').forEach(btn=>{ const txt=(btn.textContent||'').replace(/\\s+/g,' ').trim(); for(const [rx,n] of ctas){ if(rx.test(txt)){ btn.title=(btn.title?btn.title+' · ':'')+'Double-click to move to the linked step'; btn.addEventListener('dblclick',()=>{ if(!btn.disabled) go(n); }); break; } } });\n})();\n<\/script>\n\n</body></html>"}, {"n": 6, "title": "Green Spectrum — Maturity Dashboard", "html": "<!DOCTYPE html>\n<html lang=\"en\"><head><meta charset=\"UTF-8\"><meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\"><title>Green Spectrum — Maturity Dashboard</title><style>\n:root{--bg:#fff;--soft:#F7FAF7;--green:#1F7A4D;--dark:#0E3B2E;--mid:#5DBB7A;--light:#DFF3E6;--text:#17231D;--muted:#5B6B61;--border:#DDE7DF;--warn:#B7791F;--warnbg:#FFF7E6;--err:#B42318;--errbg:#FEF3F2;--succbg:#ECFDF3;--info:#2563EB;--infobg:#EFF6FF;--shadow:0 8px 24px rgba(14,59,46,.07);--r:12px;--rl:18px;--side:260px;--head:72px;--focus:0 0 0 3px rgba(31,122,77,.18);font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,\"Segoe UI\",sans-serif}*{box-sizing:border-box}body{margin:0;background:var(--soft);color:var(--text);font-family:inherit}button{font:inherit;cursor:pointer}a{text-decoration:none;color:inherit}:focus-visible{outline:none;box-shadow:var(--focus)}.app{display:grid;grid-template-columns:var(--side) 1fr;min-height:100vh}.sidebar{position:fixed;inset:0 auto 0 0;width:var(--side);background:#fff;border-right:1px solid var(--border);display:flex;flex-direction:column;z-index:40}.brand{height:var(--head);display:flex;align-items:center;gap:1 font-size:16px}.score{font-size:34px;font-weight:850;color:var(--dark);letter-spacing:-.04em}.track{height:9px;background:var(--soft);border:1px solid var(--border);border-radius:999px;overflow:hidden;margin-top:10px}.fill{height:100%;background:var(--green)}.layout{display:grid;grid-template-columns:minmax(0,1fr) 360px;gap:22px}.toolbar{display:flex;justify-content:space-between;gap:12px;align-items:center;padding:16px;margin-bottom:14px}.tabs{display:flex;gap:8px;flex-wrap:wrap}.tab{border:1px solid var(--border);background:white;border-radius:999px;padding:8px 11px;font-size:12px;font-weight:850;color:var(--muted)}.tab.active{background:var(--light);color:var(--dark);border-color:rgba(31,122,77,.3)}.heatmap{padding:16px}.grid-view{display:grid;grid-template-columns:repeat(5,minmax(0,1fr));gap:10px}.cat{border:1px solid var(--border);border-radius:14px;padding:12px;background:#fff;min-height:132px;text-align:left;transition:.15s ease}.cat:hover{transform:translateY(-1px);box-shadow:var(--shadow)}.cat.problem{border-color:#FED7AA;background:#FFFCF5}.cat.selected{border-color:var(--green);box-shadow:var(--focus)}.cat-title{font-size:12px;font-weight:850;line-height:1.3;margin:8px 0}.level-pill{width:32px;height:10px;border-radius:999px;border:1px solid var(--border)}.l0{background:#fff}.l1{background:var(--light)}.l2{background:var(--mid)}.l3{background:var(--dark)}.gap{font-size:11px;color:var(--warn);font-weight:850;margin-top:6px}.table-view{display:none;overflow:auto}.table-view table{width:100%;border-collapse:collapse;min-width:760px}.table-view th,.table-view td{padding:12px;border-bottom:1px solid var(--border);font-size:13px;text-align:left}.table-view th{background:var(--soft);color:var(--muted);font-size:11px;text-transform:uppercase;letter-spacing:.06em}.heatmap.table-mode .grid-view{display:none}.heatmap.table-mode .table-view{display:block}.side{display:grid;gap:14px;align-content:start}.side-card{padding:18px}.side-card h3{margin:0 0 10px;font-size:17px;letter-spacing:-.03em}.list{display:grid;gap:9px}.item{display:flex;justify-content:space-between;gap:10px;border:1px solid var(--border);border-radius:10px;background:var(--soft);padding:10px;font-size:13px}.item strong{color:var(--dark)}.alert{border-radius:var(--r);border:1px solid var(--border);padding:13px 14px;display:flex;gap:10px;font-size:13px;line-height:1.5}.alert-warning{background:var(--warnbg);border-color:#FED7AA;color:#7C2D12}.next{padding:18px;background:linear-gradient(180deg,#fff,var(--soft))}.drawer{position:fixed;right:0;top:0;bottom:0;width:min(440px,100%);background:white;border-left:1px solid var(--border);box-shadow:-20px 0 60px rgba(14,59,46,.16);transform:translateX(105%);transition:.18s ease;z-index:90;padding:22px;overflow:auto}.drawer.open{transform:translateX(0)}.drawer h2{margin:0 0 10px;color:var(--dark)}.toast-region{position:fixed;right:20px;bottom:20px;display:grid;gap:10px;z-index:120}.toast{width:min(390px,calc(100vw - 40px));border:1px solid var(--border);background:white;border-radius:var(--r);padding:13px 14px;box-shadow:0 10px 30px rgba(14,59,46,.08);display:flex;gap:12px}.toast-dot{width:10px;height:10px;border-radius:999px;background:var(--green);margin-top:5px}.loading,.empty{display:none;padding:26px;text-align:center;color:var(--muted)}.spinner{width:24px;height:24px;border:3px solid #CBE7D5;border-top-color:var(--green);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 10px}@keyframes spin{to{transform:rotate(360deg)}}\n@media(max-width:1240px){.summary{grid-template-columns:1fr 1fr}.layout{grid-template-columns:1fr}.grid-view{grid-template-columns:repeat(3,1fr)}}@media(max-width:860px){.app{grid-template-columns:1fr}.main{grid-column:1}.sidebar{transform:translateX(-100%);transition:.18s ease;box-shadow:var(--shadow)}body.sidebar-open .sidebar{transform:translateX(0)}body.sidebar-open .overlay{display:block}.mobile-menu{display:inline-flex}.topbar{padding:0 18px}.content{padding:24px 18px 42px}.avatar-pill{display:none}.summary{grid-template-columns:1fr}.grid-view{grid-template-columns:1fr 1fr}.hero{flex-direction:column;align-items:flex-start}.toolbar{flex-direction:column;align-items:flex-start}}@media(max-width:560px){.grid-view{grid-template-columns:1fr}.hero h2{font-size:28px}.top-actions .btn-ghost{display:none}}\n</style>\n\n<style id=\"gs-cohesive-inner-style\">\n  html, body { background:#F7FAF7 !important; min-width:0 !important; }\n  body { margin:0 !important; overflow-x:hidden !important; }\n  /* Hide original per-page chrome so the outer all-in-one shell is the only shell. */\n  .sidebar, aside.sidebar, .topbar, header.topbar, .overlay, .mobile-menu, .side-foot, .brand,\n  .skip-link, a[href=\"#main-content\"], body > header, .site-header, .app > aside:first-child,\n  .app-shell > aside:first-child, .mobile-overlay, .sidebar-footer, .side-footer {\n    display:none !important;\n  }\n  .app, .app-shell, .page { display:block !important; min-height:auto !important; grid-template-columns:1fr !important; }\n  .main, main.main, .main-wrapper { grid-column:1 !important; margin:0 !important; width:100% !important; min-width:0 !important; }\n  .content { padding:28px 34px 96px !important; max-width:1540px !important; margin:0 auto !important; }\n  .hero, .hero-panel { margin-top:0 !important; }\n  .hero-panel { grid-template-columns:minmax(0,1.35fr) minmax(280px,.65fr) !important; align-items:stretch !important; }\n  .section { scroll-margin-top:24px !important; }\n  .side, .rail, .preview-wrap, .section-nav, .checklist { top:18px !important; }\n  .toast-region { bottom:14px !important; right:14px !important; }\n  .drawer { top:0 !important; }\n  .token-grid { grid-template-columns:repeat(auto-fit,minmax(150px,1fr)) !important; }\n  .grid-4 { grid-template-columns:repeat(auto-fit,minmax(210px,1fr)) !important; }\n  .grid-3 { grid-template-columns:repeat(auto-fit,minmax(240px,1fr)) !important; }\n  .grid-2 { grid-template-columns:repeat(auto-fit,minmax(280px,1fr)) !important; }\n  table { min-width:720px; }\n  @media(max-width:1180px){ .hero-panel{grid-template-columns:1fr !important;} }\n  @media(max-width:900px){ .content{padding:22px 18px 96px !important;} .main,.main-wrapper{grid-column:1 !important;} }\n  @media(max-width:560px){ .content{padding:18px 14px 96px !important;} .hero-panel{padding:18px !important;} }\n  @media print{ .content{padding:0 !important;} }\n</style>\n\n\n</head><body><div class=\"overlay\" id=\"overlay\"></div><div class=\"app\"><aside class=\"sidebar\"><div class=\"brand\"><div class=\"mark\">GS</div><div><strong>Green Spectrum</strong><span>Decision Engine MVP</span></div></div><nav class=\"nav\"><div class=\"nav-title\">Workspace</div><a class=\"nav-item\" href=\"#\"><span class=\"nav-icon\">◼</span>Dashboard</a><a class=\"nav-item\" href=\"#\"><span class=\"nav-icon\">01</span>Organisation Profile</a><a class=\"nav-item\" href=\"#\"><span class=\"nav-icon\">02</span>Evidence Upload</a><a class=\"nav-item\" href=\"#\"><span class=\"nav-icon\">03</span>Three Empathies</a><a class=\"nav-item\" href=\"#\"><span class=\"nav-icon\">04</span>Maturity Assessment</a><a class=\"nav-item active\" href=\"#\"><span class=\"nav-icon\">05</span>Maturity Dashboard</a><a class=\"nav-item\" href=\"#\"><span class=\"nav-icon\">06</span>Problems</a><a class=\"nav-item\" href=\"#\"><span class=\"nav-icon\">07</span>Decision Cascade</a><a class=\"nav-item\" href=\"#\"><span class=\"nav-icon\">08</span>Opportunities</a><a class=\"nav-item\" href=\"#\"><span class=\"nav-icon\">09</span>Business Case</a><a class=\"nav-item\" href=\"#\"><span class=\"nav-icon\">10</span>Export</a></nav><div class=\"side-foot\"><div class=\"workspace\"><strong>Dashboard output</strong><p>Board-friendly score view generated from 25 categories.</p></div></div></aside><main class=\"main\"><header class=\"topbar\"><div style=\"display:flex;align-items:center;gap:14px\"><button class=\"btn btn-ghost btn-sm mobile-menu\" id=\"menuBtn\">☰</button><div><div class=\"crumb\">Assessment results / Maturity dashboard</div><h1 class=\"title\">Maturity Dashboard</h1></div></div><div class=\"top-actions\"><button class=\"btn btn-ghost btn-sm\" id=\"loadBtn\">Loading state</button><button class=\"btn btn-secondary btn-sm\" id=\"exportBtn\">Export summary</button><div class=\"avatar-pill\"><div class=\"avatar\">AM</div><div style=\"line-height:1.1\"><div style=\"font-weight:800;font-size:13px\">Amara Mensah</div><div style=\"color:var(--muted);font-size:12px\">Chief Sustainability Officer</div></div></div></div></header><div class=\"content\"><section class=\"hero\"><div><span class=\"eyebrow\"><span class=\"dot\"></span> Step 5 of 14</span><h2>See where the organisation sits on the Green Spectrum.</h2><p>Review overall maturity, empathy-domain scores, category-level gaps, confidence warnings, and the recommended path into priority problem selection.</p></div><span class=\"badge badge-warning\">Confidence 76%</span></section><div class=\"loading panel\" id=\"loading\"><div class=\"spinner\"></div>Calculating maturity profile…</div><div class=\"empty panel\" id=\"empty\">No assessment data available. Complete the 25-category assessment to generate this dashboard.</div><section id=\"dashboard\"><div class=\"summary\"><article class=\"panel exec\"><span class=\"badge badge-success\">Executive summary</span><div class=\"big-score\">2.1</div><h3>Mid Green — Embed & Integrate</h3><p>The organisation is moving beyond compliance into integrated sustainability practice, but value-chain traceability, circularity, and human adoption mechanisms require focused attention before transformation can scale.</p><button class=\"btn btn-primary\" id=\"reviewBtn\">Review priority problems</button></article><article class=\"panel score-card\"><span class=\"badge badge-info\">Human Empathy</span><div class=\"score\">1.8</div><p style=\"color:var(--muted);font-size:13px\">Culture improving; incentives lag.</p><div class=\"track\"><div class=\"fill\" style=\"width:60%\"></div></div></article><article class=\"panel score-card\"><span class=\"badge badge-success\">Business Empathy</span><div class=\"score\">2.4</div><p style=\"color:var(--muted);font-size:13px\">Strong governance and funding signals.</p><div class=\"track\"><div class=\"fill\" style=\"width:80%\"></div></div></article><article class=\"panel score-card\"><span class=\"badge badge-warning\">Planetary Empathy</span><div class=\"score\">1.6</div><p style=\"color:var(--muted);font-size:13px\">Scope 3 and circularity gaps remain.</p><div class=\"track\"><div class=\"fill\" style=\"width:53%\"></div></div></article></div><div class=\"layout\"><div><section class=\"panel toolbar\"><div><strong>25-category heatmap</strong><div style=\"color:var(--muted);font-size:13px;margin-top:3px\">Click a weak category to inspect details and mark it as a problem candidate.</div></div><div class=\"tabs\"><button class=\"tab active\" data-filter=\"All\">All</button><button class=\"tab\" data-filter=\"Human\">Human</button><button class=\"tab\" data-filter=\"Business\">Business</button><button class=\"tab\" data-filter=\"Planetary\">Planetary</button><button class=\"tab\" id=\"viewToggle\">Table view</button></div></section><section class=\"panel heatmap\" id=\"heatmap\"><div class=\"grid-view\" id=\"grid\"></div><div class=\"table-view\"><table><thead><tr><th>Category</th><th>Domain</th><th>Score</th><th>Level</th><th>Gap</th></tr></thead><tbody id=\"rows\"></tbody></table></div></section></div><aside class=\"side\"><section class=\"panel side-card\"><h3>Lowest-scoring categories</h3><div class=\"list\" id=\"lowest\"></div></section><section class=\"panel side-card\"><h3>Highest-scoring categories</h3><div class=\"list\" id=\"highest\"></div></section><section class=\"panel side-card\"><h3>Largest maturity gaps</h3><div class=\"list\" id=\"gaps\"></div></section><section class=\"panel side-card\"><h3>Priority improvement areas</h3><div class=\"list\"><div class=\"item\"><span>Value chain traceability</span><strong>High</strong></div><div class=\"item\"><span>Circular design</span><strong>High</strong></div><div class=\"item\"><span>Internal incentives</span><strong>Medium</strong></div></div></section><section class=\"panel next\"><h3 style=\"margin:0 0 8px\">Recommended next action</h3><p style=\"color:var(--muted);font-size:13px;line-height:1.55\">Move into the priority problem list to classify weak categories by urgency, impact, feasibility, and confidence.</p><button class=\"btn btn-primary\" style=\"width:100%\" id=\"reviewBtn2\">Review priority problems</button></section><section class=\"alert alert-warning\"><span>⚠</span><div><strong>Low confidence assessment warning</strong>Some planetary scores rely on incomplete supplier evidence.</div></section></aside></div></section></div></main></div><aside class=\"drawer\" id=\"drawer\"><button class=\"btn btn-ghost btn-sm\" id=\"closeDrawer\">Close</button><h2 id=\"drawerTitle\">Category detail</h2><div id=\"drawerBody\"></div></aside><div class=\"toast-region\" id=\"toastRegion\"></div><script>\nconst cats=[['Strategy and Purpose Alignment','Business',2],['Governance and Leadership','Business',3],['Organisational Culture and Engagement','Human',2],['Stakeholder Engagement and Co-Design','Human',1],['Materiality and Systems Risk Mapping','Planetary',2],['Transparency and Accountability','Planetary',2],['Metrics and Impact Measurement','Planetary',2],['Product and Service Innovation','Planetary',2],['Operational Integration and Circularity','Planetary',1],['Finance, Budgeting and Investment','Business',2],['Data Systems and Digital Enablement','Business',2],['Policy and Regulatory Alignment','Business',3],['Collaboration and Ecosystem Partnerships','Business',2],['Behavioural Change and Internal Incentives','Human',1],['Customer Empowerment and Engagement','Human',2],['Ecosystem Stewardship and Regeneration','Planetary',1],['Value Chain Integration and Traceability','Planetary',1],['Circular Design and Materials Strategy','Planetary',1],['Climate and Biodiversity Integration','Planetary',2],['Innovation Capacity and R&D Alignment','Business',2],['Human and Community Wellbeing','Human',2],['Learning and Adaptation Mechanisms','Business',3],['Crisis Readiness and Resilience','Business',2],['Equity, Justice and Inclusion','Human',1],['Regenerative Business Identity and Influence','Business',2]].map((x,i)=>({id:i+1,name:x[0],domain:x[1],score:x[2],target:x[2]<2?3:3,candidate:false}));let filter='All';function level(s){return ['White / Awareness','Light Green / Measure & Reduce','Mid Green / Embed & Integrate','Dark Green / Regenerate & Transform'][s]}function badge(d){return `<span class=\"badge ${d==='Human'?'badge-info':d==='Business'?'badge-success':'badge-warning'}\">${d}</span>`}function toast(t,m){const el=document.createElement('div');el.className='toast';el.innerHTML=`<div class=\"toast-dot\"></div><div><strong>${t}</strong><p style=\"margin:0;color:var(--muted);font-size:13px\">${m}</p></div>`;toastRegion.appendChild(el);setTimeout(()=>el.remove(),3600)}function render(){let data=cats.filter(c=>filter==='All'||c.domain===filter);grid.innerHTML=data.map(c=>`<button class=\"cat ${c.score<2?'problem':''} ${c.candidate?'selected':''}\" data-id=\"${c.id}\"><div class=\"level-pill l${c.score}\"></div><div class=\"cat-title\">${c.id}. ${c.name}</div>${badge(c.domain)}<div class=\"gap\">Gap to target: ${c.target-c.score}</div></button>`).join('');rows.innerHTML=data.map(c=>`<tr data-id=\"${c.id}\"><td>${c.name}</td><td>${badge(c.domain)}</td><td>${c.score}/3</td><td>${level(c.score)}</td><td>${c.target-c.score}</td></tr>`).join('');renderInsights()}function renderInsights(){const low=[...cats].sort((a,b)=>a.score-b.score).slice(0,4), high=[...cats].sort((a,b)=>b.score-a.score).slice(0,4), gaps=[...cats].sort((a,b)=>(b.target-b.score)-(a.target-a.score)).slice(0,4);lowest.innerHTML=low.map(x=>`<div class=\"item\"><span>${x.name}</span><strong>${x.score}/3</strong></div>`).join('');highest.innerHTML=high.map(x=>`<div class=\"item\"><span>${x.name}</span><strong>${x.score}/3</strong></div>`).join('');document.getElementById('gaps').innerHTML=gaps.map(x=>`<div class=\"item\"><span>${x.name}</span><strong>+${x.target-x.score}</strong></div>`).join('')}function openDrawer(id){const c=cats.find(x=>x.id==id);drawerTitle.textContent=c.name;drawerBody.innerHTML=`<p>${badge(c.domain)}</p><p><strong>Current level:</strong> ${level(c.score)} (${c.score}/3)</p><p><strong>Gap indicator:</strong> ${c.target-c.score} level(s) to target maturity.</p><p style=\"color:var(--muted);line-height:1.55\">This category is ${c.score<2?'a weak category and should be reviewed as a possible priority problem.':'a relative strength that can support improvement elsewhere.'}</p><button class=\"btn btn-secondary\" onclick=\"markCandidate(${c.id})\">Mark as problem candidate</button>`;drawer.classList.add('open')}function markCandidate(id){cats.find(x=>x.id==id).candidate=true;toast('Problem candidate marked','This weak category has been highlighted for priority problem review.');render()}document.addEventListener('click',e=>{const cat=e.target.closest('.cat');if(cat)openDrawer(cat.dataset.id);const tr=e.target.closest('tr[data-id]');if(tr)openDrawer(tr.dataset.id)});document.querySelectorAll('.tab[data-filter]').forEach(t=>t.onclick=()=>{document.querySelectorAll('.tab[data-filter]').forEach(x=>x.classList.remove('active'));t.classList.add('active');filter=t.dataset.filter;render()});viewToggle.onclick=()=>{heatmap.classList.toggle('table-mode');viewToggle.textContent=heatmap.classList.contains('table-mode')?'Grid view':'Table view'};exportBtn.onclick=()=>toast('Summary exported','Maturity dashboard summary has been prepared for the export package.');reviewBtn.onclick=reviewBtn2.onclick=()=>toast('Next step ready','Priority problem review is ready to open.');loadBtn.onclick=()=>{dashboard.style.display='none';loading.style.display='block';setTimeout(()=>{loading.style.display='none';dashboard.style.display='block';toast('Scores loaded','Maturity dashboard has been recalculated.')},1200)};closeDrawer.onclick=()=>drawer.classList.remove('open');menuBtn?.addEventListener('click',()=>document.body.classList.add('sidebar-open'));overlay.onclick=()=>document.body.classList.remove('sidebar-open');render();\n<\/script>\n<script id=\"gs-cohesive-router-bridge\">\n(function(){\n  const targets = [[/design system|foundation/i,0],[/landing|login|home|start/i,1],[/organisation profile|organization profile|profile setup/i,2],[/evidence upload|data upload|evidence tagging|upload/i,3],[/three empathies|empathies/i,4],[/maturity assessment|25-category|25 category/i,5],[/maturity dashboard|dashboard/i,6],[/priority problem|problems/i,7],[/cynefin|classifier|classification/i,8],[/decision cascade/i,9],[/opportunity mapping/i,10],[/opportunity portfolio|leverage points|opportunities/i,11],[/prototype recommendation|prototypes/i,12],[/experiment card/i,13],[/business case/i,14],[/export|pdf|action plan/i,15]];\n  function matchPage(text){ text=(text||'').replace(/\\s+/g,' ').trim(); for(const [rx,n] of targets){ if(rx.test(text)) return n; } return null; }\n  function go(n){ if(parent && parent.gsNavigate){ parent.gsNavigate(n); } }\n  document.querySelectorAll('a').forEach(a=>{ const n=matchPage(a.textContent||a.getAttribute('aria-label')||''); if(n!==null){ a.href='javascript:void(0)'; a.addEventListener('click',e=>{e.preventDefault();go(n);}); }});\n  const ctas=[[/start new assessment|use demo workspace|continue$/i,0],[/continue to evidence upload/i,3],[/continue to maturity assessment/i,5],[/review priority problems/i,7],[/continue to cynefin|cynefin classification/i,8],[/continue to decision cascade/i,9],[/begin opportunity mapping/i,10],[/generate opportunity portfolio/i,11],[/continue to prototype recommendations/i,12],[/generate experiment card/i,13],[/generate business case/i,14],[/add to export package|export package|export pdf/i,15]];\n  document.querySelectorAll('button').forEach(btn=>{ const txt=(btn.textContent||'').replace(/\\s+/g,' ').trim(); for(const [rx,n] of ctas){ if(rx.test(txt)){ btn.title=(btn.title?btn.title+' · ':'')+'Double-click to move to the linked step'; btn.addEventListener('dblclick',()=>{ if(!btn.disabled) go(n); }); break; } } });\n})();\n<\/script>\n\n</body></html>"}, {"n": 7, "title": "Green Spectrum — Priority Problem List", "html": "<!DOCTYPE html>\n<html lang=\"en\"><head><meta charset=\"UTF-8\"><meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\"><title>Green Spectrum — Priority Problem List</title><style>\n:root{--bg:#fff;--soft:#F7FAF7;--green:#1F7A4D;--dark:#0E3B2E;--mid:#5DBB7A;--light:#DFF3E6;--text:#17231D;--muted:#5B6B61;--border:#DDE7DF;--warn:#B7791F;--warnbg:#FFF7E6;--err:#B42318;--errbg:#FEF3F2;--succbg:#ECFDF3;--info:#2563EB;--infobg:#EFF6FF;--shadow:0 8px 24px rgba(14,59,46,.07);--r:12px;--rl:18px;--side:260px;--head:72px;--focus:0 0 0 3px rgba(31,122,77,.18);font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,\"Segoe UI\",sans-serif}*{box-sizing:border-box}body{margin:0;background:var(--soft);color:var(--text);font-family:inherit}button,select{font:inherit}button{cursor:pointer}a{text-decoration:none;color:inherit}:focus-visible{outline:none;box-shadow:var(--focus)}.app{display:grid;grid-template-columns:var(--side) 1fr;min-height:100vh}.sidebar{position:fixed;inset:0 auto 0 0;width:var(--side);background:#fff;border-right:1px solid var(--border);display:flex;flex-direction:column;z-index:40}.brand{height:var(--head);display:flex;align-items:center;gap:12px;padding:0 22px;border-bottom:1px solid var(--border)}.mark{width:38px;height:38px;border-radius:12px;background:var(--dark);color:white;display:grid;place-items:center;font-weight:850}.brand strong{display:block;font-size:15px}.brand span{display:block;color:var(--muted);font-size:12px}.nav{padding:16px 12px;
