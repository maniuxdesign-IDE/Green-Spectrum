ay:none}.overlay{display:none;position:fixed;inset:0;background:rgba(14,59,46,.28);z-index:35}.content{padding:34px 40px 54px;max-width:1580px;margin:0 auto}.hero{display:flex;justify-content:space-between;gap:20px;align-items:flex-end;margin-bottom:18px}.eyebrow{display:inline-flex;gap:8px;align-items:center;background:var(--light);color:var(--dark);border-radius:999px;padding:6px 10px;font-size:12px;font-weight:850;margin-bottom:12px}.dot{width:8px;height:8px;border-radius:999px;background:var(--green)}.hero h2{font-size:34px;line-height:1.08;letter-spacing:-.055em;color:var(--dark);margin:0 0 8px}.hero p{margin:0;color:var(--muted);font-size:15px;line-height:1.6;max-width:880px}.badge{display:inline-flex;align-items:center;gap:6px;border-radius:999px;padding:5px 9px;font-size:12px;font-weight:850;border:1px solid transparent;white-space:nowrap}.badge-success{background:var(--succbg);color:var(--green);border-color:#BBF7D0}.badge-warning{background:var(--warnbg);color:var(--warn);border-color:#FED7AA}.badge-error{background:var(--errbg);color:var(--err);border-color:#FECDCA}.badge-info{background:var(--infobg);color:var(--info);border-color:#BFDBFE}.badge-neutral{background:var(--soft);color:var(--muted);border-color:var(--border)}.badge-dark{background:var(--dark);color:white}.btn{border:1px solid transparent;border-radius:10px;padding:10px 14px;display:inline-flex;align-items:center;justify-content:center;gap:8px;font-weight:800;font-size:14px;min-height:40px}.btn-primary{background:var(--green);color:white}.btn-primary:disabled{opacity:.5;cursor:not-allowed}.btn-secondary{background:var(--light);color:var(--dark);border-color:rgba(31,122,77,.16)}.btn-ghost{background:white;color:var(--text);border-color:var(--border)}.btn-sm{min-height:34px;padding:7px 10px;font-size:13px}.panel{background:white;border:1px solid var(--border);border-radius:var(--rl);box-shadow:var(--shadow)}.context{padding:18px;margin-bottom:18px;display:grid;grid-template-columns:1fr auto;gap:18px}.context h3{margin:0 0 8px;color:var(--dark);font-size:20px}.context p{margin:0;color:var(--muted);font-size:14px;line-height:1.55}.progress{padding:18px;margin-bottom:18px}.progress-head{display:flex;justify-content:space-between;margin-bottom:10px;color:var(--muted);font-size:13px}.track{height:10px;background:var(--soft);border:1px solid var(--border);border-radius:999px;overflow:hidden}.fill{height:100%;background:var(--green);transition:.22s}.layout{display:grid;grid-template-columns:300px minmax(0,1fr) 370px;gap:18px}.question-nav{position:sticky;top:94px;align-self:start;padding:14px;max-height:calc(100vh - 120px);overflow:auto}.qnav{display:grid;gap:8px}.qnav button{border:1px solid var(--border);border-radius:10px;background:var(--soft);padding:10px;text-align:left;font-size:12px;color:var(--muted);font-weight:750}.qnav button.active{background:var(--light);border-color:rgba(31,122,77,.35);color:var(--dark)}.qnav button.done{background:var(--succbg);border-color:#BBF7D0;color:var(--green)}.answer-panel{padding:22px}.answer-panel h3{margin:0 0 8px;font-size:24px;color:var(--dark);letter-spacing:-.04em}.answer-panel p{margin:0 0 18px;color:var(--muted);line-height:1.55}.textarea{width:100%;border:1px solid var(--border);border-radius:14px;padding:14px;min-height:230px;resize:vertical;line-height:1.55}.textarea:focus{outline:none;border-color:var(--green);box-shadow:var(--focus)}.answer-actions{display:flex;justify-content:space-between;gap:10px;margin-top:16px;flex-wrap:wrap}.hint-row{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:14px}.hint{border:1px solid var(--border);background:var(--soft);border-radius:999px;padding:7px 10px;font-size:12px;color:var(--muted);font-weight:750}.insights{position:sticky;top:94px;display:grid;gap:14px;align-self:start}.insight-card{padding:18px}.insight-card h3{margin:0 0 10px;font-size:17px;letter-spacing:-.03em}.insight-card p{margin:0;color:var(--muted);font-size:13px;line-height:1.55}.insight-list{display:grid;gap:8px;margin-top:12px}.insight{border:1px solid var(--border);background:var(--soft);border-radius:10px;padding:10px;font-size:13px;color:var(--muted);line-height:1.45}.insight strong{display:block;color:var(--dark);margin-bottom:3px}.metric{display:flex;justify-content:space-between;border-bottom:1px solid var(--border);padding:9px 0;color:var(--muted);font-size:13px}.metric:last-child{border:0}.metric strong{color:var(--dark)}.alert{border-radius:var(--r);border:1px solid var(--border);padding:13px 14px;display:flex;gap:10px;font-size:13px;line-height:1.5}.alert-warning{background:var(--warnbg);border-color:#FED7AA;color:#7C2D12}.alert-info{background:var(--infobg);border-color:#BFDBFE;color:#1E3A8A}.alert-success{background:var(--succbg);border-color:#BBF7D0;color:#14532D}.generated{display:none}.generated.show{display:block}.empty-state{display:none;padding:14px;border:1px dashed var(--border);border-radius:12px;background:var(--soft);color:var(--muted);font-size:13px;line-height:1.5;margin-top:12px}.empty-state.show{display:block}.toast-region{position:fixed;right:20px;bottom:20px;display:grid;gap:10px;z-index:120}.toast{width:min(390px,calc(100vw - 40px));border:1px solid var(--border);background:white;border-radius:var(--r);padding:13px 14px;box-shadow:0 10px 30px rgba(14,59,46,.08);display:flex;gap:12px}.toast-dot{width:10px;height:10px;border-radius:999px;background:var(--green);margin-top:5px}\n@media(max-width:1320px){.layout{grid-template-columns:1fr}.question-nav,.insights{position:static}.qnav{grid-template-columns:repeat(2,1fr)}}@media(max-width:900px){.app{grid-template-columns:1fr}.main{grid-column:1}.sidebar{transform:translateX(-100%);transition:.18s ease;box-shadow:var(--shadow)}body.sidebar-open .sidebar{transform:translateX(0)}body.sidebar-open .overlay{display:block}.mobile-menu{display:inline-flex}.topbar{padding:0 18px}.content{padding:24px 18px 42px}.avatar-pill{display:none}.hero,.context{display:flex;flex-direction:column;align-items:flex-start}.qnav{grid-template-columns:1fr}.answer-actions .btn{width:100%}}@media(max-width:560px){.hero h2{font-size:28px}.top-actions .btn-ghost{display:none}}\n</style>\n\n<style id=\"gs-cohesive-inner-style\">\n  html, body { background:#F7FAF7 !important; min-width:0 !important; }\n  body { margin:0 !important; overflow-x:hidden !important; }\n  /* Hide original per-page chrome so the outer all-in-one shell is the only shell. */\n  .sidebar, aside.sidebar, .topbar, header.topbar, .overlay, .mobile-menu, .side-foot, .brand,\n  .skip-link, a[href=\"#main-content\"], body > header, .site-header, .app > aside:first-child,\n  .app-shell > aside:first-child, .mobile-overlay, .sidebar-footer, .side-footer {\n    display:none !important;\n  }\n  .app, .app-shell, .page { display:block !important; min-height:auto !important; grid-template-columns:1fr !important; }\n  .main, main.main, .main-wrapper { grid-column:1 !important; margin:0 !important; width:100% !important; min-width:0 !important; }\n  .content { padding:28px 34px 96px !important; max-width:1540px !important; margin:0 auto !important; }\n  .hero, .hero-panel { margin-top:0 !important; }\n  .hero-panel { grid-template-columns:minmax(0,1.35fr) minmax(280px,.65fr) !important; align-items:stretch !important; }\n  .section { scroll-margin-top:24px !important; }\n  .side, .rail, .preview-wrap, .section-nav, .checklist { top:18px !important; }\n  .toast-region { bottom:14px !important; right:14px !important; }\n  .drawer { top:0 !important; }\n  .token-grid { grid-template-columns:repeat(auto-fit,minmax(150px,1fr)) !important; }\n  .grid-4 { grid-template-columns:repeat(auto-fit,minmax(210px,1fr)) !important; }\n  .grid-3 { grid-template-columns:repeat(auto-fit,minmax(240px,1fr)) !important; }\n  .grid-2 { grid-template-columns:repeat(auto-fit,minmax(280px,1fr)) !important; }\n  table { min-width:720px; }\n  @media(max-width:1180px){ .hero-panel{grid-template-columns:1fr !important;} }\n  @media(max-width:900px){ .content{padding:22px 18px 96px !important;} .main,.main-wrapper{grid-column:1 !important;} }\n  @media(max-width:560px){ .content{padding:18px 14px 96px !important;} .hero-panel{padding:18px !important;} }\n  @media print{ .content{padding:0 !important;} }\n</style>\n\n\n</head><body><div class=\"overlay\" id=\"overlay\"></div><div class=\"app\"><aside class=\"sidebar\"><div class=\"brand\"><div class=\"mark\">GS</div><div><strong>Green Spectrum</strong><span>Decision Engine MVP</span></div></div><nav class=\"nav\"><div class=\"nav-title\">Workspace</div><a class=\"nav-item\" href=\"#\"><span class=\"nav-icon\">◼</span>Dashboard</a><a class=\"nav-item\" href=\"#\"><span class=\"nav-icon\">01</span>Organisation Profile</a><a class=\"nav-item\" href=\"#\"><span class=\"nav-icon\">02</span>Evidence Upload</a><a class=\"nav-item\" href=\"#\"><span class=\"nav-icon\">03</span>Three Empathies</a><a class=\"nav-item\" href=\"#\"><span class=\"nav-icon\">04</span>Maturity Assessment</a><a class=\"nav-item\" href=\"#\"><span class=\"nav-icon\">05</span>Maturity Dashboard</a><a class=\"nav-item\" href=\"#\"><span class=\"nav-icon\">06</span>Problems</a><a class=\"nav-item\" href=\"#\"><span class=\"nav-icon\">07</span>Decision Cascade</a><a class=\"nav-item active\" href=\"#\"><span class=\"nav-icon\">08</span>Opportunity Mapping</a><a class=\"nav-item\" href=\"#\"><span class=\"nav-icon\">09</span>Prototypes</a><a class=\"nav-item\" href=\"#\"><span class=\"nav-icon\">10</span>Export</a></nav><div class=\"side-foot\"><div class=\"workspace\"><strong>Opportunity engine</strong><p>Map causes, barriers, resources and testable interventions.</p></div></div></aside><main class=\"main\"><header class=\"topbar\"><div style=\"display:flex;align-items:center;gap:14px\"><button class=\"btn btn-ghost btn-sm mobile-menu\" id=\"menuBtn\">☰</button><div><div class=\"crumb\">Decision pathway / Opportunity mapping</div><h1 class=\"title\">Opportunity Mapping</h1></div></div><div class=\"top-actions\"><button class=\"btn btn-ghost btn-sm\" id=\"validateBtn\">Validate</button><button class=\"btn btn-secondary btn-sm\" id=\"saveTop\">Save answer</button><div class=\"avatar-pill\"><div class=\"avatar\">AM</div><div style=\"line-height:1.1\"><div style=\"font-weight:800;font-size:13px\">Amara Mensah</div><div style=\"color:var(--muted);font-size:12px\">Chief Sustainability Officer</div></div></div></div></header><div class=\"content\"><section class=\"hero\"><div><span class=\"eyebrow\"><span class=\"dot\"></span> Step 9 of 14</span><h2>Map the opportunity behind the problem.</h2><p>Move from problem understanding to intervention directions by identifying root causes, affected stakeholders, barriers, incentives, resources, and testable evidence.</p></div><span class=\"badge badge-warning\" id=\"statusBadge\">Mapping incomplete</span></section><section class=\"panel context\"><div><span class=\"badge badge-warning\">Selected problem · Complex</span><h3>Value chain traceability is insufficient for Scope 3 confidence</h3><p>The decision cascade recommends a low-risk supplier traceability pilot, starting with evidence gaps, stakeholder alignment, and a testable intervention path.</p></div><button class=\"btn btn-ghost\" id=\"summaryBtn\">Cascade summary</button></section><section class=\"panel progress\"><div class=\"progress-head\"><strong>Opportunity mapping progress</strong><span id=\"progressText\">0 / 20 answered · 0%</span></div><div class=\"track\"><div class=\"fill\" id=\"progressFill\" style=\"width:0%\"></div></div></section><div class=\"layout\"><aside class=\"panel question-nav\"><h3 style=\"margin:0 0 12px;font-size:16px\">Question list</h3><div class=\"qnav\" id=\"qnav\"></div></aside><section class=\"panel answer-panel\"><span class=\"badge badge-info\" id=\"qCounter\">Question 1 of 20</span><h3 id=\"questionTitle\"></h3><p id=\"questionHelp\"></p><div class=\"hint-row\" id=\"hints\"></div><textarea class=\"textarea\" id=\"answer\" placeholder=\"Write a concise, evidence-led answer. Include assumptions or follow-up needs where useful.\"></textarea><div class=\"empty-state\" id=\"emptyWarning\">This answer is required before generating the opportunity portfolio.</div><div class=\"answer-actions\"><button class=\"btn btn-ghost\" id=\"prevBtn\">Back</button><div style=\"display:flex;gap:10px;flex-wrap:wrap\"><button class=\"btn btn-secondary\" id=\"saveBtn\">Save answer</button><button class=\"btn btn-primary\" id=\"nextBtn\">Next</button></div></div></section><aside class=\"insights\"><section class=\"panel insight-card\"><h3>Emerging insights</h3><p>Insights update as answers accumulate. They will become the opportunity portfolio inputs.</p><div class=\"empty-state show\" id=\"insightEmpty\">No insights yet. Save answers to generate signals.</div><div class=\"insight-list\" id=\"insightList\"></div></section><section class=\"panel insight-card\"><h3>Mapping summary</h3><div class=\"metric\"><span>Answers saved</span><strong id=\"answeredMetric\">0</strong></div><div class=\"metric\"><span>Root cause signals</span><strong id=\"rootMetric\">0</strong></div><div class=\"metric\"><span>Intervention ideas</span><strong id=\"interventionMetric\">0</strong></div><div class=\"metric\"><span>Evidence needs</span><strong id=\"evidenceMetric\">0</strong></div></section><section class=\"alert alert-warning\" id=\"incompleteWarning\"><span>⚠</span><div><strong>Incomplete mapping warning</strong>Complete more answers before generating a credible opportunity portfolio.</div></section><section class=\"alert alert-success generated\" id=\"generatedState\"><span>✓</span><div><strong>Generated insights state</strong>Opportunity portfolio inputs are ready for review.</div></section><button class=\"btn btn-primary\" id=\"generateBtn\" disabled>Generate opportunity portfolio</button></aside></div></div></main></div><div class=\"toast-region\" id=\"toastRegion\"></div><script>\nconst questions=['What problem are we trying to shift?','Who is affected?','Where does the problem happen?','What causes it?','What behaviours maintain it?','What incentives maintain it?','What financial pressures maintain it?','What environmental impacts are connected?','What existing initiatives already exist?','What barriers prevent change?','What resources are available?','What decision-makers are needed?','What data is missing?','What would a low-risk intervention look like?','What would a high-impact intervention look like?','What could be tested immediately?','What could be tested in 3 months?','What could be tested in 6 months?','What evidence would prove value?','What would make this scalable?'];\nconst help=['Define the shift in plain language.','List internal and external stakeholders affected by the problem.','Locate the process, function, market, geography, or value-chain point.','Identify root causes, not only symptoms.','Describe routines, habits, decisions, or workarounds that keep it in place.','Identify rewards, KPIs, procurement rules, or governance incentives.','Clarify cost pressures, margin constraints, funding gaps, or investment logic.','Connect the problem to emissions, resource use, waste, biodiversity, or pollution.','Avoid duplicating work; identify pilots, reports, or partnerships already active.','Name constraints, blockers, politics, capability gaps, or evidence gaps.','List people, budget, data, tools, partners, and time available.','Identify who can approve, block, fund, or champion change.','Be specific about missing data and confidence gaps.','Describe a safe first test with limited risk.','Describe the more ambitious intervention if evidence supports it.','Name a 0–4 week learning test.','Name a structured pilot with measurable learning.','Name a larger transformation experiment.','Define what evidence would convince leadership.','Describe conditions required to scale beyond pilot.'];\nconst hints=[['Scope 3 confidence','Supplier traceability','Disclosure readiness'],['Procurement','Suppliers','Finance','Sustainability team'],['Supplier onboarding','Procurement systems','Reporting cycle'],['Data quality','Supplier incentives','Ownership gaps'],['Manual spreadsheets','Late supplier responses','Low accountability'],['Cost priority','Supplier scorecards','Buyer KPIs'],['Audit cost','Supplier burden','Budget uncertainty'],['Emissions','Materials','Logistics','Waste'],['Supplier code','Carbon report','Procurement policy'],['Data access','Supplier trust','System fragmentation'],['Procurement team','ESG data','Supplier relationships'],['CSO','Procurement Lead','Finance','Board sponsor'],['Supplier category data','Assurance criteria','Response rates'],['Questionnaire test','Data audit','Dashboard mock-up'],['Traceability operating model','Supplier partnership'],['Interview sprint','Data sample audit','Comms test'],['Supplier traceability pilot','Procurement nudge'],['Cross-functional operating model','Supplier platform pilot'],['Confidence score','Supplier response rate','Decision usefulness'],['Governance owner','Budget','Repeatable data model']];\nconst answers=Array(20).fill('');let current=0;function toast(t,m){const el=document.createElement('div');el.className='toast';el.innerHTML=`<div class=\"toast-dot\"></div><div><strong>${t}</strong><p style=\"margin:0;color:var(--muted);font-size:13px\">${m}</p></div>`;toastRegion.appendChild(el);setTimeout(()=>el.remove(),3600)}function renderNav(){qnav.innerHTML=questions.map((q,i)=>`<button class=\"${i===current?'active':''} ${answers[i].trim()?'done':''}\" onclick=\"go(${i})\">${i+1}. ${q}</button>`).join('')}function renderQuestion(){qCounter.textContent=`Question ${current+1} of 20`;questionTitle.textContent=questions[current];questionHelp.textContent=help[current];hints.innerHTML=hints[current].map(h=>`<span class=\"hint\">${h}</span>`).join('');answer.value=answers[current];prevBtn.disabled=current===0;nextBtn.textContent=current===19?'Finish':'Next';emptyWarning.classList.remove('show');renderNav();update()}function save(){answers[current]=answer.value.trim();if(!answers[current]){emptyWarning.classList.add('show');toast('Empty answer state','Add an answer before saving this question.');return false}toast('Answer saved','Opportunity mapping answer saved for this prototype session.');renderQuestion();return true}function go(i){answers[current]=answer.value.trim();current=i;renderQuestion()}function update(){const count=answers.filter(a=>a.trim()).length,pct=Math.round(count/20*100);progressText.textContent=`${count} / 20 answered · ${pct}%`;progressFill.style.width=pct+'%';answeredMetric.textContent=count;rootMetric.textContent=answers.slice(3,10).filter(a=>a).length;interventionMetric.textContent=answers.slice(13,18).filter(a=>a).length;evidenceMetric.textContent=answers.slice(12,20).filter(a=>a).length;statusBadge.textContent=count>=15?'Ready to generate':'Mapping incomplete';statusBadge.className='badge '+(count>=15?'badge-success':'badge-warning');generateBtn.disabled=count<15;incompleteWarning.style.display=count<15?'flex':'none';renderInsights(count)}function renderInsights(count){insightList.innerHTML='';insightEmpty.classList.toggle('show',count===0);if(count>=3)insightList.innerHTML+=`<div class=\"insight\"><strong>Stakeholder signal</strong>Procurement and suppliers are central to the intervention pathway.</div>`;if(count>=6)insightList.innerHTML+=`<div class=\"insight\"><strong>Root cause signal</strong>Data quality, accountability, and incentives appear to maintain the traceability gap.</div>`;if(count>=10)insightList.innerHTML+=`<div class=\"insight\"><strong>Barrier signal</strong>Supplier burden and fragmented systems may limit adoption unless the test is lightweight.</div>`;if(count>=15)insightList.innerHTML+=`<div class=\"insight\"><strong>Intervention signal</strong>A low-risk supplier data audit and dashboard mock-up are strong immediate prototype candidates.</div>`}saveBtn.onclick=save;saveTop.onclick=save;nextBtn.onclick=()=>{answers[current]=answer.value.trim();if(!answers[current]){emptyWarning.classList.add('show');toast('Validation warning','Answer this required question before moving forward.');return}if(current<19){current++;renderQuestion()}else toast('Mapping complete','All 20 opportunity mapping questions have been reviewed.')};prevBtn.onclick=()=>{answers[current]=answer.value.trim();if(current>0){current--;renderQuestion()}};validateBtn.onclick=()=>{const count=answers.filter(a=>a.trim()).length;toast(count>=15?'Validation passed':'Incomplete mapping',count>=15?'Enough answers to generate an opportunity portfolio.':'Answer at least 15 questions first.')};generateBtn.onclick=()=>{generatedState.classList.add('show');toast('Opportunity portfolio generated','Emerging insights have been converted into portfolio inputs.')};summaryBtn.onclick=()=>toast('Cascade summary','Complex response: map supplier traceability, test a low-risk data audit, collect evidence, and iterate.');menuBtn?.addEventListener('click',()=>document.body.classList.add('sidebar-open'));overlay.onclick=()=>document.body.classList.remove('sidebar-open');renderQuestion();\n<\/script>\n<script id=\"gs-cohesive-router-bridge\">\n(function(){\n  const targets = [[/design system|foundation/i,0],[/landing|login|home|start/i,1],[/organisation profile|organization profile|profile setup/i,2],[/evidence upload|data upload|evidence tagging|upload/i,3],[/three empathies|empathies/i,4],[/maturity assessment|25-category|25 category/i,5],[/maturity dashboard|dashboard/i,6],[/priority problem|problems/i,7],[/cynefin|classifier|classification/i,8],[/decision cascade/i,9],[/opportunity mapping/i,10],[/opportunity portfolio|leverage points|opportunities/i,11],[/prototype recommendation|prototypes/i,12],[/experiment card/i,13],[/business case/i,14],[/export|pdf|action plan/i,15]];\n  function matchPage(text){ text=(text||'').replace(/\\s+/g,' ').trim(); for(const [rx,n] of targets){ if(rx.test(text)) return n; } return null; }\n  function go(n){ if(parent && parent.gsNavigate){ parent.gsNavigate(n); } }\n  document.querySelectorAll('a').forEach(a=>{ const n=matchPage(a.textContent||a.getAttribute('aria-label')||''); if(n!==null){ a.href='javascript:void(0)'; a.addEventListener('click',e=>{e.preventDefault();go(n);}); }});\n  const ctas=[[/start new assessment|use demo workspace|continue$/i,0],[/continue to evidence upload/i,3],[/continue to maturity assessment/i,5],[/review priority problems/i,7],[/continue to cynefin|cynefin classification/i,8],[/continue to decision cascade/i,9],[/begin opportunity mapping/i,10],[/generate opportunity portfolio/i,11],[/continue to prototype recommendations/i,12],[/generate experiment card/i,13],[/generate business case/i,14],[/add to export package|export package|export pdf/i,15]];\n  document.querySelectorAll('button').forEach(btn=>{ const txt=(btn.textContent||'').replace(/\\s+/g,' ').trim(); for(const [rx,n] of ctas){ if(rx.test(txt)){ btn.title=(btn.title?btn.title+' · ':'')+'Double-click to move to the linked step'; btn.addEventListener('dblclick',()=>{ if(!btn.disabled) go(n); }); break; } } });\n})();\n<\/script>\n\n</body></html>"}, {"n": 11, "title": "Green Spectrum — Opportunity Portfolio", "html": "<!DOCTYPE html><html lang=\"en\"><head><meta charset=\"UTF-8\"><meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\"><title>Green Spectrum — Opportunity Portfolio</title><style>\n:root{--soft:#F7FAF7;--green:#1F7A4D;--dark:#0E3B2E;--mid:#5DBB7A;--light:#DFF3E6;--text:#17231D;--muted:#5B6B61;--border:#DDE7DF;--warn:#B7791F;--warnbg:#FFF7E6;--err:#B42318;--errbg:#FEF3F2;--succbg:#ECFDF3;--info:#2563EB;--infobg:#EFF6FF;--shadow:0 8px 24px rgba(14,59,46,.07);--r:12px;--rl:18px;--side:260px;--head:72px;--focus:0 0 0 3px rgba(31,122,77,.18);font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,\"Segoe UI\",sans-serif}*{box-sizing:border-box}body{margin:0;background:var(--soft);color:var(--text);font-family:inherit}button,select{fon s=\"nav-item active\" href=\"#\"><span class=\"nav-icon\">09</span>Opportunity Portfolio</a><a class=\"nav-item\" href=\"#\"><span class=\"nav-icon\">10</span>Prototypes</a></nav><div class=\"side-foot\"><div class=\"workspace\"><strong>Opportunity engine</strong><p>Rank leverage points into prototype-ready opportunities.</p></div></div></aside><main class=\"main\"><header class=\"topbar\"><div style=\"display:flex;align-items:center;gap:14px\"><button class=\"btn btn-ghost btn-sm mobile-menu\" id=\"menuBtn\">☰</button><div><div class=\"crumb\">Opportunity engine / Portfolio</div><h1 class=\"title\">Leverage Points & Opportunity Portfolio</h1></div></div><div class=\"top-actions\"><button class=\"btn btn-ghost btn-sm\" id=\"emptyBtn\">No opportunities state</button><button class=\"btn btn-secondary btn-sm\" id=\"resetBtn\">Reset filters</button><div class=\"avatar-pill\"><div class=\"avatar\">AM</div><div style=\"line-height:1.1\"><div style=\"font-weight:800;font-size:13px\">Amara Mensah</div><div style=\"color:var(--muted);font-size:12px\">Chief Sustainability Officer</div></div></div></div></header><div class=\"content\"><section class=\"hero\"><div><span class=\"eyebrow\"><span class=\"dot\"></span> Step 10 of 14</span><h2>Select the strongest intervention direction.</h2><p>Review ranked opportunities generated from mapping answers. Compare impact, feasibility, risk, leverage type, value logic, and evidence needs before moving into prototype recommendations.</p></div><span class=\"badge badge-success\" id=\"statusBadge\">Portfolio generated</span></section><section class=\"summary\"><div class=\"panel metric\"><span>Total opportunities</span><strong id=\"totalMetric\">6</strong></div><div class=\"panel metric\"><span>Highest impact</span><strong id=\"impactMetric\">Traceability OS</strong></div><div class=\"panel metric\"><span>Fastest to test</span><strong id=\"fastMetric\">Data audit</strong></div><div class=\"panel metric\"><span>Lowest risk</span><strong id=\"riskMetric\">Comms test</strong></div><div class=\"panel metric\"><span>Best strategic fit</span><strong id=\"fitMetric\">Supplier pilot</strong></div></section><div class=\"layout\"><div><section class=\"panel filters\"><div class=\"panel-head\"><div><h3>Filter portfolio</h3><p>Focus by timeline, risk, impact, or leverage type.</p></div><span class=\"badge badge-neutral\" id=\"resultCount\">6 results</span></div><div class=\"filter-grid\"><div class=\"field\"><label>Timeline</label><select class=\"select filter\" data-field=\"timeline\"><option>All</option><option>Immediate</option><option>3 months</option><option>6 months</option></select></div><div class=\"field\"><label>Risk</label><select class=\"select filter\" data-field=\"risk\"><option>All</option><option>Low</option><option>Medium</option><option>High</option></select></div><div class=\"field\"><label>Impact</label><select class=\"select filter\" data-field=\"impactBand\"><option>All</option><option>High</option><option>Medium</option></select></div><div class=\"field\"><label>Leverage type</label><select class=\"select filter\" data-field=\"type\"><option>All</option><option>Low-hanging fruit</option><option>High-potency low-risk</option><option>Strategic leverage</option><option>Transformational leverage</option></select></div></div></section><div class=\"tabs\"><button class=\"tab active\" id=\"allTab\">Opportunity cards</button><button class=\"tab\" id=\"compareTab\">Comparison mode</button></div><section class=\"empty panel\" id=\"emptyState\"><h3>No opportunities generated</h3><p>Return to opportunity mapping and answer more questions to generate a portfolio.</p></section><section class=\"cards\" id=\"cards\"></section><section class=\"panel matrix\"><div class=\"panel-head\"><div><h3>Impact vs feasibility matrix</h3><p>CSS-based 2x2 view of opportunity position.</p></div><span class=\"badge badge-info\">Portfolio view</span></div><div class=\"matrix-grid\" id=\"matrix\"><div class=\"quad\"><h4>High impact / High feasibility</h4></div><div class=\"quad\"><h4>High impact / Lower feasibility</h4></div><div class=\"quad\"><h4>Lower impact / High feasibility</h4></div><div class=\"quad\"><h4>Lower impact / Lower feasibility</h4></div></div></section></div><aside class=\"side\"><section class=\"panel side-card\"><h3>Selected opportunity</h3><div class=\"selected-box\" id=\"selectedBox\">No opportunity selected yet. Choose one card to continue.</div><button class=\"btn btn-primary\" id=\"continueBtn\" disabled style=\"width:100%;margin-top:12px\">Continue to prototype recommendations</button></section><section class=\"panel side-card\"><h3>Compare opportunities</h3><p>Select “Compare” on up to three opportunity cards.</p><div class=\"compare-list\" id=\"compareBox\"><div class=\"compare-box\">No opportunities selected for comparison.</div></div></section><section class=\"panel side-card\"><h3>Leverage point coverage</h3><div class=\"chip-row\" id=\"coverage\"></div></section><section class=\"alert alert-warning\"><span>⚠</span><div><strong>Too many low-confidence opportunities</strong>Two opportunities rely on medium-confidence supplier evidence and should be validated before scaling.</div></section><section class=\"alert alert-info\"><span>ⓘ</span><div><strong>Selection guidance</strong>Prioritise high impact, feasible, strategically relevant opportunities that can be tested safely.</div></section></aside></div></div></main></div><div class=\"toast-region\" id=\"toastRegion\"></div><script>\nconst opportunities=[\n{title:'Supplier traceability data audit sprint',type:'High-potency low-risk',timeline:'Immediate',risk:'Low',impact:8,feasibility:9,fit:9,confidence:'High',stakeholders:['Procurement','Sustainability','Priority suppliers'],roots:['Data quality gaps','Unclear ownership','Supplier response friction'],leverage:['Information flows','Operational processes','Supplier behaviours'],ideas:['Audit top supplier category','Create confidence score','Map data ownership'],evidence:['Completeness rate','Supplier response rate','Data confidence'],human:'Reduces ambiguity for teams and suppliers.',business:'Creates decision-ready evidence for disclosure and investment.',planetary:'Improves Scope 3 hotspot visibility.',next:'Run a 4-week supplier data audit with 10 priority suppliers.'},\n{title:'Procurement incentive and scorecard redesign',type:'Strategic leverage',timeline:'3 months',risk:'Medium',impact:8,feasibility:7,fit:8,confidence:'Medium',stakeholders:['Procurement Lead','Finance','Category managers'],roots:['Buyer KPIs','Cost-first routines','Weak sustainability incentives'],leverage:['Incentives','Rules','Goals','Procurement choices'],ideas:['Add traceability KPI','Revise category scorecards','Pilot buyer nudges'],evidence:['Buyer adoption','Supplier data quality','Cost impact'],human:'Aligns buyer behaviour with sustainability priorities.',business:'Links procurement performance to risk and resilience.',planetary:'Shifts supplier choices toward lower-impact options.',next:'Prototype a revised scorecard in one category.'},\n{title:'Supplier traceability dashboard mock-up',type:'Low-hanging fruit',timeline:'Immediate',risk:'Low',impact:6,feasibility:9,fit:7,confidence:'High',stakeholders:['Sustainability team','Data team','Procurement'],roots:['Fragmented data','Low visibility','Slow reporting cycles'],leverage:['Technology systems','Information flows','Feedback loops'],ideas:['Dashboard wireframe','Confidence heatmap','Gap alerts'],evidence:['Decision usefulness','Time saved','Confidence score'],human:'Gives teams a shared picture of data gaps.',business:'Improves reporting readiness and prioritisation speed.',planetary:'Makes emissions evidence gaps visible.',next:'Create dashboard prototype from existing supplier data.'},\n{title:'Regenerative supplier partnership pilot',type:'Transformational leverage',timeline:'6 months',risk:'High',impact:10,feasibility:5,fit:8,confidence:'Medium',stakeholders:['Strategic suppliers','CSO','Procurement','NGO partner'],roots:['Transactional supplier model','Limited shared value','Weak ecosystem focus'],leverage:['Relationships','Power structures','Resource flows','Supplier behaviours'],ideas:['Co-investment model','Shared targets','Nature-positive sourcing'],evidence:['Supplier commitment','Impact metrics','Cost/risk model'],human:'Builds trust and shared ownership with suppliers.',business:'Creates resilient partnerships and differentiation.',planetary:'Moves from harm reduction toward ecosystem benefit.',next:'Identify one strategic supplier for co-design exploration.'},\n{title:'Internal narrative and decision memo test',type:'Low-hanging fruit',timeline:'Immediate',risk:'Low',impact:5,feasibility:10,fit:6,confidence:'High',stakeholders:['CSO','Executive team','Communications'],roots:['Board uncertainty','Narrative gap','Competing priorities'],leverage:['Mindsets','Customer behaviours','Narrative','Governance mechanisms'],ideas:['Decision memo','Executive briefing','Message test'],evidence:['Leadership clarity','Decision confidence','Follow-up action'],human:'Creates shared understanding and reduces confusion.',business:'Improves executive alignment for investment decisions.',planetary:'Frames traceability as climate decision infrastructure.',next:'Test a one-page decision memo with the executive sponsor.'},\n{title:'Cross-functional traceability operating model',type:'Strategic leverage',timeline:'6 months',risk:'Medium',impact:9,feasibility:6,fit:9,confidence:'Medium',stakeholders:['Procurement','Data','Finance','Operations','Legal'],roots:['Siloed ownership','Weak governance','Disconnected systems'],leverage:['Governance mechanisms','Rules','Operational processes','Resource flows'],ideas:['RACI model','Decision gates','Monthly traceability forum'],evidence:['Ownership clarity','Cycle time','Data quality trend'],human:'Clarifies roles and reduces cross-functional friction.',business:'Creates repeatable governance for traceability decisions.',planetary:'Improves consistency of environmental data management.',next:'Run an operating model workshop and test one governance cycle.'}\n];let filters={},selected=null,compareMode=false,empty=false;opportunities.forEach((o,i)=>o.id=i+1);function band(o){return o.impact>=8?'High':'Medium'}function toast(t,m){const el=document.createElement('div');el.className='toast';el.innerHTML=`<div class=\"toast-dot\"></div><div><strong>${t}</strong><p style=\"margin:0;color:var(--muted);font-size:13px\">${m}</p></div>`;toastRegion.appendChild(el);setTimeout(()=>el.remove(),3600)}function badge(v){let cls=v==='Low'||v==='High'?'badge-success':v==='Medium'?'badge-warning':v==='High-potency low-risk'?'badge-success':v==='Transformational leverage'?'badge-dark':v==='Strategic leverage'?'badge-info':'badge-neutral';return `<span class=\"badge ${cls}\">${v}</span>`}function data(){if(empty)return[];return opportunities.filter(o=>Object.entries(filters).every(([k,v])=>!v||v==='All'||(k==='impactBand'?band(o)===v:o[k]===v)))}function render(){const d=compareMode?opportunities.filter(o=>o.compare):data();resultCount.textContent=data().length+' results';totalMetric.textContent=data().length;emptyState.style.display=d.length?'none':'block';cards.style.display=d.length?'grid':'none';cards.innerHTML=d.map(card).join('');renderMatrix();renderSide()}function card(o){return `<article class=\"panel card ${selected===o.id?'selected':''} ${o.compare?'compare':''}\"><div style=\"display:flex;justify-content:space-between;gap:10px\"><div>${badge(o.type)} ${badge(o.timeline)}</div><span class=\"badge ${o.confidence==='High'?'badge-success':'badge-warning'}\">${o.confidence} confidence</span></div><h4>${o.title}</h4><p><strong>Problem statement:</strong> Value-chain traceability is not yet strong enough for Scope 3 confidence.</p><div class=\"section-title\">Affected stakeholders</div><div class=\"chip-row\">${o.stakeholders.map(badge).join('')}</div><div class=\"section-title\">Root causes</div>< ass=\"nav-icon\">◼</span>Dashboard</a><a class=\"nav-item\" href=\"#\"><span class=\"nav-icon\">01</span>Organisation Profile</a><a class=\"nav-item\" href=\"#\"><span class=\"nav-icon\">02</span>Evidence Upload</a><a class=\"nav-item\" href=\"#\"><span class=\"nav-icon\">03</span>Three Empathies</a><a class=\"nav-item\" href=\"#\"><span class=\"nav-icon\">04</span>Maturity Assessment</a><a class=\"nav-item\" href=\"#\"><span class=\"nav-icon\">05</span>Maturity Dashboard</a><a class=\"nav-item\" href=\"#\"><span class=\"nav-icon\">06</span>Problems</a><a class=\"nav-item\" href=\"#\"><span class=\"nav-icon\">07</span>Decision Cascade</a><a class=\"nav-item\" href=\"#\"><span class=\"nav-icon\">08</span>Opportunities</a><a class=\"nav-item active\" href=\"#\"><span class=\"nav-icon\">09</span>Prototypes</a><a class=\"nav-item\" href=\"#\"><span class=\"nav-icon\">10</span>Experiment Card</a></nav><div class=\"side-foot\"><div class=\"workspace\"><strong>Prototype engine</strong><p>Match prototypes by maturity, complexity, and empathy domain.</p></div></div></aside><main class=\"main\"><header class=\"topbar\"><div style=\"display:flex;align-items:center;gap:14px\"><button class=\"btn btn-ghost btn-sm mobile-menu\" id=\"menuBtn\">☰</button><div><div class=\"crumb\">Prototype engine / Recommendations</div><h1 class=\"title\">Prototype Recommendation Engine</h1></div></div><div class=\"top-actions\"><button class=\"btn btn-ghost btn-sm\" id=\"emptyBtn\">No match state</button><button class=\"btn btn-secondary btn-sm\" id=\"resetBtn\">Reset filters</button><div class=\"avatar-pill\"><div class=\"avatar\">AM</div><div style=\"line-height:1.1\"><div style=\"font-weight:800;font-size:13px\">Amara Mensah</div><div style=\"color:var(--muted);font-size:12px\">Chief Sustainability Officer</div></div></div></div></header><div class=\"content\"><section class=\"hero\"><div><span class=\"eyebrow\"><span class=\"dot\"></span> Step 11 of 14</span><h2>Decide what to test first.</h2><p>Prototype recommendations are matched to the selected opportunity, Light Green maturity level, Complex Cynefin classification, and Planetary empathy domain.</p></div><span class=\"badge badge-success\" id=\"statusBadge\">Recommendations matched</span></section><section class=\"panel context\"><div><span class=\"badge badge-warning\">Selected opportunity</span><h3>Supplier traceability data audit sprint</h3><p>High-potency low-risk opportunity. Matched because it can generate evidence quickly, fits a Complex problem response, and improves confidence in Scope 3 supplier data.</p></div><button class=\"btn btn-ghost\" id=\"whyTop\">Why matched?</button></section><section class=\"summary\"><div class=\"panel metric\"><span>Maturity</span><strong>Light Green</strong></div><div class=\"panel metric\"><span>Cynefin</span><strong>Complex</strong></div><div class=\"panel metric\"><span>Empathy</span><strong>Planetary</strong></div><div class=\"panel metric\"><span>Recommended</span><strong id=\"countMetric\">7</strong></div><div class=\"panel metric\"><span>Selected</span><strong id=\"selectedMetric\">0</strong></div><div class=\"panel metric\"><span>Compare</span><strong id=\"compareMetric\">0 / 3</strong></div></section><div class=\"layout\"><div><section class=\"panel filters\"><div class=\"panel-head\"><div><h3>Filter prototype options</h3><p>Focus by horizon, cost, risk, or evidence generated.</p></div><span class=\"badge badge-neutral\" id=\"resultCount\">7 results</span></div><div class=\"filter-grid\"><div class=\"field\"><label>Horizon</label><select class=\"select filter\" data-field=\"horizon\"><option>All</option><option>Immediate</option><option>3-month</option><option>6-month</option></select></div><div class=\"field\"><label>Cost</label><select class=\"select filter\" data-field=\"cost\"><option>All</option><option>Low</option><option>Medium</option><option>High</option></select></div><div class=\"field\"><label>Risk</label><select class=\"select filter\" data-field=\"risk\"><option>All</option><option>Low</option><option>Medium</option><option>High</option></select></div><div class=\"field\"><label>Evidence type</label><select class=\"select filter\" data-field=\"evidenceType\"><option>All</option><option>Data quality</option><option>Behaviour</option><option>Governance</option><option>Business case</option></select></div></div></section><div class=\"tabs\"><button class=\"tab active\" id=\"allTab\">Recommendation cards</button><button class=\"tab\" id=\"compareTab\">Comparison panel</button></div><section class=\"empty panel\" id=\"emptyState\"><h3>No matched prototype</h3><p>Adjust filters or return to opportunity portfolio to select a different opportunity.</p></section><div id=\"horizons\"></div></div><aside class=\"side\"><section class=\"panel side-card\"><h3>Selected prototypes</h3><div class=\"selected-box\" id=\"selectedBox\">No prototype selected yet. Select one or more pathways.</div><button class=\"btn btn-primary\" id=\"generateBtn\" disabled style=\"width:100%;margin-top:12px\">Generate experiment card</button></section><section class=\"panel side-card\"><h3>Comparison panel</h3><p>Compare up to three prototype options.</p><div class=\"compare-list\" id=\"compareBox\"><div class=\"compare-box\">No prototypes selected for comparison.</div></div></section><section class=\"panel side-card\"><h3>Why these were matched</h3><p>Matches prioritise low-risk learning, evidence generation, maturity fit, and suitability for Complex problems.</p><div class=\"chip-row\"><span class=\"badge badge-info\">Complex → pilot/prototype</span><span class=\"badge badge-warning\">Light Green → foundations</span><span class=\"badge badge-success\">Planetary → data evidence</span></div></section><section class=\"alert alert-warning\"><span>⚠</span><div><strong>High-risk prototype warning</strong>6-month transformational options require leadership alignment before launch.</div></section><section class=\"alert alert-warning\"><span>⚠</span><div><strong>Low-data-confidence warning</strong>Supplier data quality must be tested before scaling recommendations.</div></section></aside></div></div></main></div><div class=\"toast-region\" id=\"toastRegion\"></div><script>\nconst prototypes=[\n{name:'Supplier data quality audit',category:'Data prototype',horizon:'Immediate',cost:'Low',risk:'Low',evidenceType:'Data quality',impact:8,feasibility:9,desirability:8,viability:8,scalability:7,adaptability:8,purpose:'Test whether supplier data is complete, comparable, and decision-useful.',when:'Use before investing in full traceability systems.',how:'Sample 10 priority suppliers, request core data, score completeness and confidence.',time:'0–4 weeks',people:'CSO, Procurement Lead, Sustainability Analyst, 10 suppliers',data:'Supplier emissions, category spend, response quality, confidence notes',evidence:'Completeness rate, confidence score, supplier response rate',metrics:'80% supplier response; confidence score above 70%; clear gap map.'},\n{name:'Traceability dashboard mock-up',category:'Data prototype',horizon:'Immediate',cost:'Low',risk:'Low',evidenceType:'Data quality',impact:7,feasibility:9,desirability:8,viability:7,scalability:8,adaptability:8,purpose:'Visualise supplier evidence gaps and decision confidence.',when:'Use when teams need a shared picture before system investment.',how:'Create no-code dashboard screens from sample supplier data.',time:'2–3 weeks',people:'Sustainability team, data analyst, procurement users',data:'Supplier categories, confidence scores, missing fields',evidence:'Decision usefulness feedback and time-to-insight.',metrics:'Users identify top gaps in under 10 minutes.'},\n{name:'Supplier questionnaire and response test',category:'Communication prototype',horizon:'Immediate',cost:'Low',risk:'Low',evidenceType:'Behaviour',impact:6,feasibility:9,desirability:7,viability:8,scalability:7,adaptability:9,purpose:'Test supplier willingness and clarity of data requests.',when:'Use when supplier burden or response quality is uncertain.',how:'Send two versions of a concise data request to a small supplier group.',time:'2 weeks',people:'Procurement, suppliers, communications support',data:'Response rate, question clarity, follow-up burden',evidence:'Supplier response behaviour and friction points.',metrics:'50%+ response rate; fewer than three clarification loops.'},\n{name:'Procurement scorecard behaviour pilot',category:'Behavioural prototype',horizon:'3-month',cost:'Medium',risk:'Medium',evidenceType:'Behaviour',impact:8,feasibility:7,desirability:7,viability:8,scalability:8,adaptability:7,purpose:'Test whether buyer incentives improve traceability outcomes.',when:'Use once baseline data gaps are visible.',how:'Add traceability KPI to one category scorecard and observe buyer decisions.',time:'3 months',people:'Procurement Lead, category managers, finance partner',data:'Buyer actions, supplier response quality, cost impact',evidence:'Behavioural shift and procurement decision evidence.',metrics:'KPI adoption; supplier data quality improvement; no major cost shock.'},\n{name:'Traceability governance sprint',category:'Governance prototype',horizon:'3-month',cost:'Medium',risk:'Medium',evidenceType:'Governance',impact:8,feasibility:7,desirability:7,viability:8,scalability:8,adaptability:7,purpose:'Clarify ownership and decision rights for supplier evidence.',when:'Use where data gaps persist due to unclear accountability.',how:'Run three governance cycles with RACI, escalation and data-quality gates.',time:'8–12 weeks',people:'CSO, procurement, data, finance, legal/compliance',data:'Decision cycle time, issue resolution, ownership clarity',evidence:'Governance effectiveness and repeatability.',metrics:'Clear owner for 90% of data gaps; monthly decision rhythm established.'},\n{name:'Supplier partnership operating model',category:'System prototype',horizon:'6-month',cost:'High',risk:'High',evidenceType:'Governance',impact:10,feasibility:5,desirability:8,viability:6,scalability:7,adaptability:6,purpose:'Test a deeper partnership model for strategic supplier traceability.',when:'Use after early data tests prove value and leadership appetite exists.',how:'Co-design shared targets, data routines and value exchange with one supplier.',time:'6 months',people:'Strategic supplier, CSO, procurement, finance, NGO/technical advisor',data:'Shared target progress, data transparency, cost/risk model',evidence:'Partnership viability and scalable operating model.',metrics:'Signed joint roadmap; measurable data quality improvement; business case validated.'},\n{name:'Internal decision narrative prototype',category:'Narrative prototype',horizon:'Immediate',cost:'Low',risk:'Low',evidenceType:'Business case',impact:5,feasibility:10,desirability:8,viability:8,scalability:8,adaptability:9,purpose:'Test the executive story for why traceability matters now.',when:'Use before requesting investment or board attention.',how:'Create one-page memo and test clarity with executive sponsor.',time:'1 week',people:'CSO, communications, executive sponsor',data:'Leadership questions, decision confidence, requested changes',evidence:'Board-readiness of narrative and investment logic.',metrics:'Sponsor can explain problem, action and value without rework.'}\n];let filters={},selected=[],compare=[],compareMode=false,empty=false;prototypes.forEach((p,i)=>p.id=i+1);function toast(t,m){const el=document.createElement('div');el.className='toast';el.innerHTML=`<div class=\"toast-dot\"></div><div><strong>${t}</strong><p style=\"margin:0;color:var(--muted);font-size:13px\">${m}</p></div>`;toastRegion.appendChild(el);setTimeout(()=>el.remove(),3600)}function badge(v){let cls=v==='Low'||v==='Immediate'||v.includes('Data')?'badge-success':v==='Medium'||v==='3-month'?'badge-warning':v==='High'||v==='6-month'?'badge-error':'badge-info';return `<span class=\"badge ${cls}\">${v}</span>`}function data(){if(empty)return[];return prototypes.filter(p=>Object.entries(filters).every(([k,v])=>!v||v==='All'||p[k]===v))}function render(){const d=compareMode?prototypes.filter(p=>compare.includes(p.id)):data();resultCount.textContent=data().length+' results';countMetric.textContent=data().length;selectedMetric.textContent=selected.length;compareMetric.textContent=compare.length+' / 3';emptyState.style.display=d.length?'none':'block';horizons.style.display=d.length?'block':'none';horizons.innerHTML='';['Immediate','3-month','6-month'].forEach(h=>{const list=d.filter(p=>p.horizon===h);if(!list.length)return;const sec=document.createElement('section');sec.className='panel horizon';sec.innerHTML=`<div class=\"horizon-head\"><h3>${h==='Immediate'?'Immediate: 0–4 weeks':h+' prototype'}</h3><span class=\"badge badge-neutral\">${list.length} options</span></div><div class=\"cards\">${list.map(card).join('')}</div>`;horizons.appendChild(sec)});renderSide()}function card(p){return `<article class=\"card ${selected.includes(p.id)?'selected':''} ${compare.includes(p.id)?'compare':''}\"><div>${badge(p.category)} ${badge(p.horizon)} ${badge(p.risk+' risk')}</div><h4>${p.name}</h4><p>${p.purpose}</p><div class=\"section-title\">Why matched</div><p>Fits Complex response through test-and-learn evidence; matches Light Green maturity by strengthening foundations before scale.</p><div class=\"dim-grid\">${['impact','feasibility','desirability','viability','scalability','adaptability'].map(k=>`<div class=\"dim\"><span>${k[0].toUpperCase()+k.slice(1)}</span><strong>${p[k]}/10</strong></div>`).join('')}</div><div class=\"section-title\">Prototype details</div><div class=\"details\" id=\"details-${p.id}\"><p><strong>When to use:</strong> ${p.when}</p><p><strong>How to run:</strong> ${p.how}</p><p><strong>Time required:</strong> ${p.time}</p><p><strong>People required:</strong> ${p.people}</p><p><strong>Data required:</strong> ${p.data}</p><p><strong>Cost level:</strong> ${p.cost} · <strong>Risk:</strong> ${p.risk}</p><p><strong>Evidence generated:</strong> ${p.evidence}</p><p><strong>Success metrics:</strong> ${p.metrics}</p></div><div style=\"display:flex;gap:8px;flex-wrap:wrap;margin-top:14px\"><button class=\"btn btn-primary btn-sm\" onclick=\"selectProto(${p.id})\">${selected.includes(p.id)?'Selected':'Select'}</button><button class=\"btn btn-secondary btn-sm\" onclick=\"toggleCompare(${p.id})\">${compare.includes(p.id)?'Remove compare':'Compare'}</button><button class=\"btn btn-ghost btn-sm\" onclick=\"toggleDetails(${p.id})\">Expand details</button></div></article>`}function renderSide(){selectedBox.innerHTML=selected.length?selected.map(id=>{const p=prototypes.find(x=>x.id===id);return `<div class=\"selected-box\" style=\"margin-bottom:8px\"><strong>${p.name}</strong><br>${badge(p.horizon)} ${badge(p.cost+' cost')} ${badge(p.risk+' risk')}</div>`}).join(''):'No prototype selected yet. Select one or more pathways.';generateBtn.disabled=!selected.length;compareBox.innerHTML=compare.length?compare.map(id=>{const p=prototypes.find(x=>x.id===id);return `<div class=\"compare-box\"><strong>${p.name}</strong><br>${badge(p.category)} ${badge(p.horizon)}<br>Impact ${p.impact}/10 · Feasibility ${p.feasibility}/10</div>`}).join(''):'<div class=\"compare-box\">No prototypes selected for comparison.</div>'}function selectProto(id){selected=selected.includes(id)?selected.filter(x=>x!==id):[...selected,id];toast('Prototype selection updated','Selected pathways will feed the experiment card generator.');render()}function toggleCompare(id){if(!compare.includes(id)&&compare.length>=3){toast('Compare limit reached','Remove one prototype before adding another.');return}compare=compare.includes(id)?compare.filter(x=>x!==id):[...compare,id];render()}function toggleDetails(id){document.getElementById('details-'+id)?.classList.toggle('open')}document.querySelectorAll('.filter').forEach(f=>f.onchange=()=>{filters[f.dataset.field]=f.value;render()});resetBtn.onclick=()=>{filters={};document.querySelectorAll('.filter').forEach(f=>f.value='All');render();toast('Filters reset','All matched prototype options are visible again.')};emptyBtn.onclick=()=>{empty=!empty;statusBadge.textContent=empty?'No matched prototype':'Recommendations matched';statusBadge.className='badge '+(empty?'badge-warning':'badge-success');render()};whyTop.onclick=()=>toast('Why matched','Selected opportunity is Complex, Light Green and Planetary, so low-risk evidence prototypes are prioritised.');generateBtn.onclick=()=>toast('Experiment card ready','Selected prototype pathways will generate the experiment card draft.');allTab.onclick=()=>{compareMode=false;allTab.classList.add('active');compareTab.classList.remove('active');render()};compareTab.onclick=()=>{compareMode=true;compareTab.classList.add('active');allTab.classList.remove('active');render()};menuBtn?.addEventListener('click',()=>document.body.classList.add('sidebar-open'));overlay.onclick=()=>document.body.classList.remove('sidebar-open');render();\n<\/script>\n<script id=\"gs-cohesive-router-bridge\">\n(function(){\n  const targets = [[/design system|foundation/i,0],[/landing|login|home|start/i,1],[/organisation profile|organization profile|profile setup/i,2],[/evidence upload|data upload|evidence tagging|upload/i,3],[/three empathies|empathies/i,4],[/maturity assessment|25-category|25 category/i,5],[/maturity dashboard|dashboard/i,6],[/priority problem|problems/i,7],[/cynefin|classifier|classification/i,8],[/decision cascade/i,9],[/opportunity mapping/i,10],[/opportunity portfolio|leverage points|opportunities/i,11],[/prototype recommendation|prototypes/i,12],[/experiment card/i,13],[/business case/i,14],[/export|pdf|action plan/i,15]];\n  function matchPage(text){ text=(text||'').replace(/\\s+/g,' ').trim(); for(const [rx,n] of targets){ if(rx.test(text)) return n; } return null; }\n  function go(n){ if(parent && parent.gsNavigate){ parent.gsNavigate(n); } }\n  document.querySelectorAll('a').forEach(a=>{ const n=matchPage(a.textContent||a.getAttribute('aria-label')||''); if(n!==null){ a.href='javascript:void(0)'; a.addEventListener('click',e=>{e.preventDefault();go(n);}); }});\n  const ctas=[[/start new assessment|use demo workspace|continue$/i,0],[/continue to evidence upload/i,3],[/continue to maturity assessment/i,5],[/review priority problems/i,7],[/continue to cynefin|cynefin classification/i,8],[/continue to decision cascade/i,9],[/begin opportunity mapping/i,10],[/generate opportunity portfolio/i,11],[/continue to prototype recommendations/i,12],[/generate experiment card/i,13],[/generate business case/i,14],[/add to export package|export package|export pdf/i,15]];\n  document.querySelectorAll('button').forEach(btn=>{ const txt=(btn.textContent||'').replace(/\\s+/g,' ').trim(); for(const [rx,n] of ctas){ if(rx.test(txt)){ btn.title=(btn.title?btn.title+' · ':'')+'Double-click to move to the linked step'; btn.addEventListener('dblclick',()=>{ if(!btn.disabled) go(n); }); break; } } });\n})();\n<\/script>\n\n</body></html>"}, {"n": 13, "title": "Green Spectrum — Experiment Card Generator", "html": "<!DOCTYPE html>\n<html lang=\"en\"><head><meta charset=\"UTF-8\"><meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\"><title>Green Spectrum — Experiment Card Generator</title><style>\n:root{--soft:#F7FAF7;--green:#1F7A4D;--dark:#0E3B2E;--light:#DFF3E6;--text:#17231D;--muted:#5B6B61;--border:#DDE7DF;--warn:#B7791F;--warnbg:#FFF7E6;--err:#B42318;--errbg:#FEF3F2;--succbg:#ECFDF3;--info:#2563EB;--infobg:#EFF6FF;--shadow:0 8px 24px rgba(14,59,46,.07);--r:12px;--rl:18px;--side:260px;--head:72px;--focus:0 0 0 3px rgba(31,122,77,.18);font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,\"Segoe UI\",sans-serif}*{box-sizing:border-box}body{margin:0;background:var(--soft);color:var(--text);font-family:inherit}button,input,textarea,select{font:inherit}button{cursor:pointer}a{text-decoration:none;color:inherit}:focus-visible{outline:none;box-shadow:var(--focus)}.app{display:grid;grid-template-column none}.decision{grid-template-columns:1fr}}</style>\n\n<style id=\"gs-cohesive-inner-style\">\n  html, body { background:#F7FAF7 !important; min-width:0 !important; }\n  body { margin:0 !important; overflow-x:hidden !important; }\n  /* Hide original per-page chrome so the outer all-in-one shell is the only shell. */\n  .sidebar, aside.sidebar, .topbar, header.topbar, .overlay, .mobile-menu, .side-foot, .brand,\n  .skip-link, a[href=\"#main-content\"], body > header, .site-header, .app > aside:first-child,\n  .app-shell > aside:first-child, .mobile-overlay, .sidebar-footer, .side-footer {\n    display:none !important;\n  }\n  .app, .app-shell, .page { display:block !important; min-height:auto !important; grid-template-columns:1fr !important; }\n  .main, main.main, .main-wrapper { grid-column:1 !important; margin:0 !important; width:100% !important; min-width:0 !important; }\n  .content { padding:28px 34px 96px !important; max-width:1540px !important; margin:0 auto !important; }\n  .hero, .hero-panel { margin-top:0 !important; }\n  .hero-panel { grid-template-columns:minmax(0,1.35fr) minmax(280px,.65fr) !important; align-items:stretch !important; }\n  .section { scroll-margin-top:24px !important; }\n  .side, .rail, .preview-wrap, .section-nav, .checklist { top:18px !important; }\n  .toast-region { bottom:14px !important; right:14px !important; }\n  .drawer { top:0 !important; }\n  .token-grid { grid-template-columns:repeat(auto-fit,minmax(150px,1fr)) !important; }\n  .grid-4 { grid-template-columns:repeat(auto-fit,minmax(210px,1fr)) !important; }\n  .grid-3 { grid-template-columns:repeat(auto-fit,minmax(240px,1fr)) !important; }\n  .grid-2 { grid-template-columns:repeat(auto-fit,minmax(280px,1fr)) !important; }\n  table { min-width:720px; }\n  @media(max-width:1180px){ .hero-panel{grid-template-columns:1fr !important;} }\n  @media(max-width:900px){ .content{padding:22px 18px 96px !important;} .main,.main-wrapper{grid-column:1 !important;} }\n  @media(max-width:560px){ .content{padding:18px 14px 96px !important;} .hero-panel{padding:18px !important;} }\n  @media print{ .content{padding:0 !important;} }\n</style>\n\n\n</head><body><div class=\"overlay\" id=\"overlay\"></div><div class=\"app\"><aside class=\"sidebar\"><div class=\"brand\"><div class=\"mark\">GS</div><div><strong>Green Spectrum</strong><span>Decision Engine MVP</span></div></div><nav class=\"nav\"><div class=\"nav-title\">Workspace</div><a class=\"nav-item\" href=\"#\"><span class=\"nav-icon\">◼</span>Dashboard</a><a class=\"nav-item\" href=\"#\"><span class=\"nav-icon\">01</span>Organisation Profile</a><a class=\"nav-item\" href=\"#\"><span class=\"nav-icon\">02</span>Evidence Upload</a><a class=\"nav-item\" href=\"#\"><span class=\"nav-icon\">03</span>Three Empathies</a><a class=\"nav-item\" href=\"#\"><span class=\"nav-icon\">04</span>Maturity Assessment</a><a class=\"nav-item\" href=\"#\"><span class=\"nav-icon\">05</span>Maturity Dashboard</a><a class=\"nav-item\" href=\"#\"><span class=\"nav-icon\">06</span>Problems</a><a class=\"nav-item\" href=\"#\"><span class=\"nav-icon\">07</span>Decision Cascade</a><a class=\"nav-item\" href=\"#\"><span class=\"nav-icon\">08</span>Opportunities</a><a class=\"nav-item\" href=\"#\"><span class=\"nav-icon\">09</span>Prototypes</a><a class=\"nav-item active\" href=\"#\"><span class=\"nav-icon\">10</span>Experiment Card</a><a class=\"nav-item\" href=\"#\"><span class=\"nav-icon\">11</span>Business Case</a></nav><div class=\"side-foot\"><div class=\"workspace\"><strong>Experiment generator</strong><p>Convert selected prototype into a testable plan.</p></div></div></aside><main class=\"main\"><header class=\"topbar\"><div style=\"display:flex;align-items:center;gap:14px\"><button class=\"btn btn-ghost btn-sm mobile-menu\" id=\"menuBtn\">☰</button><div><div class=\"crumb\">Prototype engine / Experiment card</div><h1 class=\"title\">Experiment Card Generator</h1></div></div><div class=\"top-actions\"><button class=\"btn btn-ghost btn-sm\" id=\"emptyBtn\">Empty draft</button><button class=\"btn btn-secondary btn-sm\" id=\"sampleBtn\">Generate sample content</button><div class=\"avatar-pill\"><div class=\"avatar\">AM</div><div style=\"line-height:1.1\"><div style=\"font-weight:800;font-size:13px\">Amara Mensah</div><div style=\"color:var(--muted);font-size:12px\">Chief Sustainability Officer</div></div></div></div></header><div class=\"content\"><section class=\"hero\"><div><span class=\"eyebrow\"><span class=\"dot\"></span> Step 12 of 14</span><h2>Generate a practical experiment plan.</h2><p>Turn the selected supplier data quality audit prototype into a clear experiment card that the sustainability team can run, learn from, and defend to leadership.</p></div><span class=\"badge badge-warning\" id=\"statusBadge\">Draft in progress</span></section><section class=\"panel context\"><div><span class=\"badge badge-success\">Selected prototype</span><h3>Supplier data quality audit</h3><p>Immediate 0–4 week data prototype. Purpose: test whether supplier data is complete, comparable, and decision-useful before investing in broader traceability infrastructure.</p></div><button class=\"btn btn-ghost\" id=\"exportBtn\">Export preview</button></section><div class=\"layout\"><section class=\"panel form\"><div class=\"status-row\"><div><strong>Editable experiment card</strong><div style=\"color:var(--muted);font-size:13px;margin-top:3px\">Fields update the live preview immediately.</div></div><span class=\"badge badge-neutral\" id=\"completionBadge\">0% complete</span></div><div class=\"empty\" id=\"emptyState\">Empty generated draft. Use “Generate sample content” or complete the fields manually.</div><div class=\"form-grid\" id=\"formGrid\"></div><div class=\"actions\"><div style=\"color:var(--muted);font-size:13px\" id=\"actionCopy\">Complete critical fields before approval or business case generation.</div><div style=\"display:flex;gap:10px;flex-wrap:wrap\"><button class=\"btn btn-ghost\" id=\"validateBtn\">Validate</button><button class=\"btn btn-secondary\" id=\"approveBtn\">Mark approved</button><button class=\"btn btn-primary\" id=\"businessBtn\" disabled>Generate business case</button></div></div></section><aside class=\"preview-wrap\"><section class=\"alert alert-warning\" id=\"hypothesisWarning\"><span>⚠</span><div><strong>Missing hypothesis warning</strong>A defensible experiment card needs a clear hypothesis and success metrics.</div></section><section class=\"alert alert-success\" id=\"approvedState\" style=\"display:none\"><span>✓</span><div><strong>Approved state</strong>This experiment card has been approved for business case generation.</div></section><section class=\"panel preview\" id=\"preview\"></section></aside></div></div></main></div><div class=\"toast-region\" id=\"toastRegion\"></div><script>\nconst fields=[['title','Experiment title','input','Supplier Traceability Data Quality Audit'],['problem','Problem addressed','textarea','Value-chain traceability is insufficient for Scope 3 confidence.'],['maturity','Maturity level','input','Light Green — Measure & Reduce'],['cynefin','Cynefin classification','input','Complex'],['domain','Empathy domain','input','Planetary with Business dependencies'],['hypothesis','Hypothesis','textarea','If we audit data quality across 10 priority suppliers, then we can identify the highest-confidence traceability pathway and reduce uncertainty before investing in a full supplier platform.'],['stakeholders','Target users / stakeholders','textarea','CSO, Procurement Lead, Sustainability Analyst, priority suppliers, Finance Partner.'],['intervention','Intervention description','textarea','Run a structured 4-week supplier data audit using a lightweight request template, confidence scoring, and a gap heatmap.'],['why','Why this intervention','textarea','It is low-risk, fast to run, and directly tests whether supplier data is decision-useful.'],['impact','Expected impact','textarea','Improved Scope 3 confidence, clearer supplier segmentation, faster disclosure readiness, and prioritised investment decisions.'],['risks','Risks','textarea','Low supplier response rate, inconsistent data formats, overconfidence in partial data, procurement capacity constraints.'],['assumptions','Assumptions','textarea','Priority suppliers will respond; existing spend/category data is available; procurement can support outreach.'],['data','Data required','textarea','Supplier emissions data, spend/category data, supplier contacts, reporting templates, confidence scoring notes.'],['participants','Participants required','textarea','CSO sponsor, procurement owner, sustainability analyst, data support, 10 supplier contacts.'],['budget','Budget estimate','input','£15k–£30k'],['immediate','Immediate actions','textarea','Confirm supplier sample, finalise data request, align procurement owner, send request.'],['threeMonth','3-month actions','textarea','Use audit findings to design supplier scorecard and dashboard prototype.'],['sixMonth','6-month actions','textarea','Scale traceability operating model to additional supplier categories.'],['metrics','Success metrics','textarea','80% supplier response; 70%+ average data confidence; top 5 evidence gaps identified; decision memo accepted by sponsor.'],['failure','Failure signals','textarea','Supplier response below 30%; data fields unusable; no clear owner for follow-up actions.'],['learning','Learning questions','textarea','Which suppliers can provide reliable data? Which fields create friction? What evidence changes decisions?'],['evidence','Evidence collection method','textarea','Response tracking, confidence scoring, supplier feedback, audit log, decision usefulness review.'],['gate','Decision gate','select','Adapt'],['business','Business case summary','textarea','A small audit reduces risk before larger investment and creates board-ready evidence for supplier traceability.'],['cases','Relevant case studies placeholder','textarea','Placeholder: sector supplier traceability pilot; ESG data quality assurance example.'],['next','Next steps','textarea','Approve audit sprint, brief procurement team, send supplier requests, review evidence in 4 weeks.']];\nconst state={};fields.forEach(f=>state[f[0]]='');let approved=false;function toast(t,m){const el=document.createElement('div');el.className='toast';el.innerHTML=`<div class=\"toast-dot\"></div><div><strong>${t}</strong><p style=\"margin:0;color:var(--muted);font-size:13px\">${m}</p></div>`;toastRegion.appendChild(el);setTimeout(()=>el.remove(),3600)}function renderForm(){formGrid.innerHTML='';fields.forEach((f,i)=>{if([0,5,15,18,23].includes(i)){const s=document.createElement('div');s.className='section-title';s.textContent=['Core context','Experiment logic','Timeline','Learning and evidence','Outputs and next steps'][[0,5,15,18,23].indexOf(i)];formGrid.appendChild(s)}const wrap=document.createElement('div');wrap.className='field '+(f[2]==='textarea'?'full':'');wrap.innerHTML=`<label>${f[1]}</label>${f[2]==='textarea'?`<textarea class=\"textarea\" data-key=\"${f[0]}\">${state[f[0]]}</textarea>`:f[2]==='select'?`<select class=\"select\" data-key=\"${f[0]}\"><option ${state[f[0]]==='Scale'?'selected':''}>Scale</option><option ${state[f[0]]==='Adapt'?'selected':''}>Adapt</option><option ${state[f[0]]==='Stop'?'selected':''}>Stop</option></select>`:`<input class=\"input\" data-key=\"${f[0]}\" value=\"${state[f[0]]}\">`}<div class=\"error\">Required field missing.</div>`;formGrid.appendChild(wrap)});update()}function update(){const filled=Object.values(state).filter(v=>v.trim()).length,pct=Math.round(filled/fields.length*100);completionBadge.textContent=pct+'% complete';statusBadge.textContent=approved?'Approved':pct?'Draft in progress':'Empty draft';statusBadge.className='badge '+(approved?'badge-success':pct?'badge-warning':'badge-neutral');emptyState.classList.toggle('show',filled===0);hypothesisWarning.style.display=state.hypothesis&&state.metrics?'none':'flex';businessBtn.disabled=!approved;preview.innerHTML=`<span class=\"badge ${approved?'badge-success':'badge-warning'}\">${approved?'Approved':'Draft'}</span><h2>${state.title||'Untitled experiment card'}</h2><div class=\"preview-meta\"><span class=\"badge badge-warning\">${state.maturity||'Maturity not set'}</span><span class=\"badge badge-info\">${state.cynefin||'Cynefin not set'}</span><span class=\"badge badge-success\">${state.domain||'Domain not set'}</span></div>${section('Problem addressed',state.problem)}${section('Hypothesis',state.hypothesis)}${section('Intervention description',state.intervention)}${section('Why this intervention',state.why)}${section('Expected impact',state.impact)}<div class=\"preview-section\"><h3>Timeline visual</h3><div class=\"timeline\"><div class=\"timebox\"><strong>Immediate</strong><p>${state.immediate||'Not defined'}</p></div><div class=\"timebox\"><strong>3 months</strong><p>${state.threeMonth||'Not defined'}</p></div><div class=\"timebox\"><strong>6 months</strong><p>${state.sixMonth||'Not defined'}</p></div></div></div>${section('Success metrics',state.metrics)}${section('Failure signals',state.failure)}${section('Learning questions',state.learning)}${section('Evidence collection method',state.evidence)}<div class=\"preview-section\"><h3>Decision gate</h3><div class=\"decision\"><div class=\"gate ${state.gate==='Scale'?'active':''}\">Scale</div><div class=\"gate ${state.gate==='Adapt'?'active':''}\">Adapt</div><div class=\"gate ${state.gate==='Stop'?'active':''}\">Stop</div></div></div>${section('Risks',state.risks)}${section('Assumptions',state.assumptions)}${section('Data required',state.data)}${section('Participants required',state.participants)}${section('Budget estimate',state.budget)}${section('Business case summary',state.business)}${section('Relevant case studies placeholder',state.cases)}${section('Next steps',state.next)}`;}function section(t,v){return `<div class=\"preview-section\"><h3>${t}</h3><p>${v||'Not yet defined.'}</p></div>`}document.addEventListener('input',e=>{const k=e.target.dataset.key;if(k){state[k]=e.target.value;approved=false;approvedState.style.display='none';update()}});document.addEventListener('change',e=>{const k=e.target.dataset.key;if(k){state[k]=e.target.value;approved=false;approvedState.style.display='none';update()}});sampleBtn.onclick=()=>{fields.forEach(f=>state[f[0]]=f[3]);renderForm();toast('Sample content generated','Experiment card draft populated from the selected prototype.');};emptyBtn.onclick=()=>{fields.forEach(f=>state[f[0]]='');approved=false;approvedState.style.display='none';renderForm();toast('Empty generated draft','Draft cleared. Add content manually or generate sample content.');};function validate(){let ok=true;['title','problem','hypothesis','intervention','metrics'].forEach(k=>{const el=document.querySelector(`[data-key=\"${k}\"]`);if(!state[k].trim()){el.classList.add('error');el.parentElement.querySelector('.error').classList.add('show');ok=false}else{el.classList.remove('error');el.parentElement.querySelector('.error').classList.remove('show')}});toast(ok?'Validation passed':'Missing critical fields',ok?'Experiment card has the minimum required fields.':'Complete title, problem, hypothesis, intervention and success metrics.');return ok}validateBtn.onclick=validate;approveBtn.onclick=()=>{if(!validate())return;approved=true;approvedState.style.display='flex';update();toast('Experiment card approved','Approved state applied. Business case generation is now available.');};businessBtn.onclick=()=>toast('Business case generation ready','The approved experiment card will feed the business case generator.');exportBtn.onclick=()=>toast('Export success','Experiment card preview exported for the prototype session.');menuBtn?.addEventListener('click',()=>document.body.classList.add('sidebar-open'));overlay.onclick=()=>document.body.classList.remove('sidebar-open');renderForm();<\/script>\n<script id=\"gs-cohesive-router-bridge\">\n(function(){\n  const targets = [[/design system|foundation/i,0],[/landing|login|home|start/i,1],[/organisation profile|organization profile|profile setup/i,2],[/evidence upload|data upload|evidence tagging|upload/i,3],[/three empathies|empathies/i,4],[/maturity assessment|25-category|25 category/i,5],[/maturity dashboard|dashboard/i,6],[/priority problem|problems/i,7],[/cynefin|classifier|classification/i,8],[/decision cascade/i,9],[/opportunity mapping/i,10],[/opportunity portfolio|leverage points|opportunities/i,11],[/prototype recommendation|prototypes/i,12],[/experiment card/i,13],[/business case/i,14],[/export|pdf|action plan/i,15]];\n  function matchPage(text){ text=(text||'').replace(/\\s+/g,' ').trim(); for(const [rx,n] of targets){ if(rx.test(text)) return n; } return null; }\n  function go(n){ if(parent && parent.gsNavigate){ parent.gsNavigate(n); } }\n  document.querySelectorAll('a').forEach(a=>{ const n=matchPage(a.textContent||a.getAttribute('aria-label')||''); if(n!==null){ a.href='javascript:void(0)'; a.addEventListener('click',e=>{e.preventDefault();go(n);}); }});\n  const ctas=[[/start new assessment|use demo workspace|continue$/i,0],[/continue to evidence upload/i,3],[/continue to maturity assessment/i,5],[/review priority problems/i,7],[/continue to cynefin|cynefin classification/i,8],[/continue to decision cascade/i,9],[/begin opportunity mapping/i,10],[/generate opportunity portfolio/i,11],[/continue to prototype recommendations/i,12],[/generate experiment card/i,13],[/generate business case/i,14],[/add to export package|export package|export pdf/i,15]];\n  document.querySelectorAll('button').forEach(btn=>{ const txt=(btn.textContent||'').replace(/\\s+/g,' ').trim(); for(const [rx,n] of ctas){ if(rx.test(txt)){ btn.title=(btn.title?btn.title+' · ':'')+'Double-click to move to the linked step'; btn.addEventListener('dblclick',()=>{ if(!btn.disabled) go(n); }); break; } } });\n})();\n<\/script>\n\n</body></html>"}, {"n": 14, "title": "Green Spectrum — Business Case Gen --warnbg);color:var(--warn);border-color:#FED7AA}.badge-error{background:var(--errbg);color:var(--err);border-color:#FECDCA}.badge-info{background:var(--infobg);color:var(--info);border-color:#BFDBFE}.badge-neutral{background:var(--soft);color:var(--muted);border-color:var(--border)}.badge-dark{background:var(--dark);color:#fff}.btn{border:1px solid transparent;border-radius:10px;padding:10px 14px;display:inline-flex;align-items:center;justify-content:center;gap:8px;font-weight:800;font-size:14px;min-height:40px}.btn-primary{background:var(--green);color:#fff}.btn-primary:disabled{opacity:.5;cursor:not-allowed}.btn-secondary{background:var(--light);color:var(--dark);border-color:rgba(31,122,77,.16)}.btn-ghost{background:#fff;color:var(--text);border-color:var(--border)}.btn-danger{background:var(--errbg);color:var(--err);border-color:#FECDCA}.btn-sm{min-height:34px;padding:7px 10px;font-size:13px}.panel{background:white;border:1px solid var(--border);border-radius:var(--rl);box-shadow:var(--shadow)}.context{padding:18px;margin-bottom:18px;display:grid;grid-template-columns:1fr auto;gap:18px}.context h3{margin:0 0 8px;color:var(--dark);font-size:20px}.context p{margin:0;color:var(--muted);font-size:14px;line-height:1.55}.layout{display:grid;grid-template-columns:minmax(0,1fr) 540px;gap:22px;align-items:start}.editor{padding:18px}.editor-head{display:flex;justify-content:space-between;gap:12px;align-items:center;margin-bottom:14px}.tabs{display:flex;gap:10px;flex-wrap:wrap}.tab{border:1px solid var(--border);background:white;border-radius:999px;padding:8px 11px;font-size:12px;font-weight:850;color:var(--muted)}.tab.active{background:var(--light);color:var(--dark);border-color:rgba(31,122,77,.3)}.form-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px}.field{display:grid;gap:6px}.field.full{grid-column:1/-1}.field label{font-size:12px;font-weight:850;color:var(--text)}.input,.textarea,.select{width:100%;border:1px solid var(--border);border-radius:10px;back
